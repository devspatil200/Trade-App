<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Trading Saathi Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#1e293b}
button,input,select{font-family:inherit}
.hdr{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 16px;position:sticky;top:0;z-index:99}
.logo{width:36px;height:36px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:10px;color:#fff;font-size:18px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;margin-right:10px}
.hi{display:inline-block;vertical-align:middle}
.hi h1{font-size:16px;font-weight:800;color:#0f172a}
.hi p{font-size:9px;color:#94a3b8}
.lb{float:right;background:#dcfce7;color:#16a34a;border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;margin-top:4px}
.tabs{display:flex;background:#f1f5f9;border-radius:10px;padding:3px;gap:2px;margin-top:10px}
.tab{flex:1;border:none;border-radius:8px;padding:8px 4px;font-size:11px;cursor:pointer;color:#64748b;background:transparent;font-weight:500}
.tab.on{background:#fff;font-weight:700;color:#1e293b;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.pg{display:none;padding:14px;min-height:80vh}
.pg.on{display:block}
.seg{display:flex;gap:8px;margin-bottom:14px}
.seg button{flex:1;border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #e5e7eb;background:#fff;color:#374151}
.seg button.on{background:#3b82f6;color:#fff;border-color:#3b82f6}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px;margin-bottom:10px}
.clist-hdr{padding:12px 14px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center}
.coin-row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #f9fafb;cursor:pointer}
.coin-row:last-child{border-bottom:none}
.cico{width:36px;height:36px;background:linear-gradient(135deg,#dbeafe,#ede9fe);border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#3b82f6;font-size:11px;margin-right:12px;flex-shrink:0}
.pill-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.pill{flex-shrink:0;border:1px solid #e5e7eb;border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;background:#fff;color:#374151;white-space:nowrap}
.pill.on{background:#3b82f6;color:#fff;border-color:#3b82f6;font-weight:700}
.inp{width:100%;border:1px solid #e5e7eb;border-radius:9px;padding:10px 12px;font-size:14px;font-weight:700;color:#1e293b;outline:none;background:#f8fafc}
.bb{width:100%;border:none;border-radius:13px;padding:16px;color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-bottom:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.lv{background:#f8fafc;border:1px solid #e5e7eb;border-radius:11px;padding:12px;text-align:center}
.ind{background:#f8fafc;border-radius:10px;padding:10px;text-align:center}
.rr{display:flex;height:22px;border-radius:6px;overflow:hidden;gap:2px;margin-bottom:8px}
.sr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.tc{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;margin-bottom:10px}
.pnlr{display:flex;justify-content:space-between;align-items:center;border-radius:8px;padding:8px 12px;margin-bottom:8px}
.stat{border-radius:12px;padding:12px;text-align:center}
.tt-btn{border-radius:9px;padding:9px 4px;border:1px solid #e5e7eb;background:#f8fafc;color:#6b7280;cursor:pointer;width:100%}
.tt-btn.on{background:#eff6ff;border-color:#3b82f6;color:#1d4ed8}
</style>
</head>
<body>
<div id="app" style="max-width:480px;margin:0 auto">
  <div class="hdr">
    <div>
      <div class="logo">T</div>
      <div class="hi"><h1>Trading Saathi Pro</h1><p>PROFESSIONAL TRADING TOOL</p></div>
      <span class="lb">LIVE</span>
    </div>
    <div class="tabs">
      <button class="tab on" id="tab-market">Market</button>
      <button class="tab" id="tab-analyse">Analyse</button>
      <button class="tab" id="tab-tracker">Tracker</button>
    </div>
  </div>
  <div id="pg-market" class="pg on">
    <div class="seg">
      <button id="ms-SPOT" class="on">SPOT</button>
      <button id="ms-FUTURES">FUTURES</button>
    </div>
    <div style="background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;margin-bottom:12px">
      <div class="clist-hdr">
        <span style="font-size:13px;font-weight:700" id="mTitle">SPOT Coins</span>
        <div style="display:flex;gap:6px">
          <button id="scanBtn" style="background:#16a34a;color:#fff;border:none;border-radius:8px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer">Smart Scan</button>
          <button id="addBtn" style="background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer">+ Add</button>
        </div>
      </div>
      <div id="addRow" style="display:none;padding:10px 14px;background:#f8fafc;border-bottom:1px solid #f1f5f9">
        <div style="display:flex;gap:8px">
          <input id="ncInp" placeholder="Symbol (e.g. NEAR)" maxlength="10" class="inp" style="flex:1;font-size:13px">
          <button id="doAddBtn" style="background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-weight:700;cursor:pointer">Add</button>
          <button id="hideAddBtn" style="background:#f3f4f6;border:none;border-radius:8px;padding:8px 10px;cursor:pointer">X</button>
        </div>
      </div>
      <div id="scanSummary"></div>
      <div id="coinList"></div>
    </div>
    <div id="pfolio" style="display:none" class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">Portfolio</div>
      <div class="g3" id="pStats"></div>
    </div>
    <div style="height:30px"></div>
  </div>
  <div id="pg-analyse" class="pg">
    <div class="seg">
      <button id="as-SPOT">SPOT</button>
      <button id="as-FUTURES" class="on">FUTURES</button>
    </div>
    <div id="pillRow" class="pill-row"></div>
    <div class="card" style="margin-bottom:12px">
      <div class="g2" style="margin-bottom:10px">
        <div>
          <div style="font-size:10px;color:#94a3b8;font-weight:600;margin-bottom:5px">CAPITAL (INR)</div>
          <input type="number" id="capInp" placeholder="Capital enter kara" class="inp">
          <div id="capHint" style="font-size:10px;color:#6b7280;margin-top:3px"></div>
        </div>
        <div id="levDiv">
          <div style="font-size:10px;color:#94a3b8;font-weight:600;margin-bottom:5px">LEVERAGE</div>
          <select id="levSel" class="inp" style="cursor:pointer">
            <option value="2">2x</option><option value="5">5x</option>
            <option value="10" selected>10x</option><option value="20">20x</option>
            <option value="25">25x</option><option value="50">50x</option>
          </select>
        </div>
      </div>
      <div class="g3">
        <button class="tt-btn on" id="tt-swing">Swing<br><small>2-5 divas</small></button>
        <button class="tt-btn" id="tt-intraday">Intraday<br><small>Aajach</small></button>
        <button class="tt-btn" id="tt-positional">Hold<br><small>Aathvade</small></button>
      </div>
    </div>
    <div id="autoAnalyseHint" style="display:none;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:8px 14px;margin-bottom:10px;font-size:11px;color:#1d4ed8;font-weight:600;text-align:center">Market Scan madhe ya coin la signal ahe - Auto analyse chalu ahe...</div>
  <button class="bb" id="aBtn" style="background:linear-gradient(135deg,#3b82f6,#8b5cf6)">Vishleshan Kara</button>
    <div id="result"></div>
  </div>
  <div id="pg-tracker" class="pg">
    <div id="tStats" style="display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px"></div>
    <div id="tRefBar" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:8px 14px;margin-bottom:10px;display:none;justify-content:space-between;align-items:center">
      <span style="font-size:11px;color:#16a34a;font-weight:600">Live prices every 20s</span>
      <button id="tRefBtn" style="background:#dcfce7;border:none;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;color:#16a34a;cursor:pointer">Refresh</button>
    </div>
    <div id="tList"></div>
    <div style="height:30px"></div>
  </div>
</div>
<script>
var USD=83.5;
var SPOT_DEF=["BTC","ETH","SOL","BNB","XRP","DOGE","ADA","AVAX","LINK","DOT"];
var FUT_DEF=["BTC","ETH","SOL","BNB","XRP","DOGE","ADA","AVAX","LINK","MATIC"];
var CAPS={BTC:"bitcoin",ETH:"ethereum",SOL:"solana",BNB:"binance-coin",XRP:"xrp",DOGE:"dogecoin",ADA:"cardano",AVAX:"avalanche",DOT:"polkadot",LINK:"chainlink",MATIC:"polygon"};

var mSeg="SPOT", aSeg="FUTURES", selCoin="BTC", tt="swing";
var prices={}, res=null, mTmr=null, tTmr=null, tFilter='ACTIVE', realSigs={}, scanning=false;

function gSC(){try{var d=JSON.parse(localStorage.getItem("sc")||"null");return d&&d.length?d:SPOT_DEF.slice();}catch(e){return SPOT_DEF.slice();}}
function gFC(){try{var d=JSON.parse(localStorage.getItem("fc")||"null");return d&&d.length?d:FUT_DEF.slice();}catch(e){return FUT_DEF.slice();}}
function sSC(a){try{localStorage.setItem("sc",JSON.stringify(a));}catch(e){}}
function sFC(a){try{localStorage.setItem("fc",JSON.stringify(a));}catch(e){}}
function gTr(){try{return JSON.parse(localStorage.getItem("tr")||"[]");}catch(e){return[];}}
function sTr(a){try{localStorage.setItem("tr",JSON.stringify(a));}catch(e){}}

function fP(p){if(!p||isNaN(p)||p<=0)return"--";if(p>=1000)return"$"+Math.round(p).toLocaleString("en-US");if(p>=1)return"$"+p.toFixed(2);if(p>=0.01)return"$"+p.toFixed(4);return"$"+p.toFixed(6);}
function fINR(n){if(!n||isNaN(n))return"--";var a=Math.abs(n),s=n<0?"-":"";if(a>=10000000)return s+"Rs"+(a/10000000).toFixed(2)+"Cr";if(a>=100000)return s+"Rs"+(a/100000).toFixed(2)+"L";if(a>=1000)return s+"Rs"+Math.round(a).toLocaleString("en-IN");return s+"Rs"+a.toFixed(0);}
function fI(u){return fINR(u*USD);}
function fPct(v){if(isNaN(v))return"--";return(v>=0?"+":"")+v.toFixed(2)+"%";}
function capId(s){return CAPS[s.toUpperCase()]||s.toLowerCase();}

function mkEl(tag,style,text){var el=document.createElement(tag);if(style)el.style.cssText=style;if(text!==undefined)el.textContent=text;return el;}

function fetchCoin(coin,isFut,cb){
  var xhr=new XMLHttpRequest();
  var url=isFut?"https://fapi.binance.com/fapi/v1/ticker/24hr?symbol="+coin+"USDT":"https://api.coincap.io/v2/assets/"+capId(coin);
  xhr.open("GET",url);
  xhr.timeout=6000;
  xhr.onload=function(){
    try{
      var d=JSON.parse(xhr.responseText);
      if(isFut&&d&&d.lastPrice&&parseFloat(d.lastPrice)>0){cb({p:parseFloat(d.lastPrice),c:parseFloat(d.priceChangePercent||0),isFut:true});return;}
      if(!isFut&&d&&d.data&&parseFloat(d.data.priceUsd)>0){cb({p:parseFloat(d.data.priceUsd),c:parseFloat(d.data.changePercent24Hr||0),isFut:false});return;}
    }catch(e){}
    fetchBin(coin,isFut,cb);
  };
  xhr.onerror=xhr.ontimeout=function(){fetchBin(coin,isFut,cb);};
  xhr.send();
}

function fetchBin(coin,isFut,cb){
  var xhr=new XMLHttpRequest();
  xhr.open("GET","https://api.binance.com/api/v3/ticker/24hr?symbol="+coin+"USDT");
  xhr.timeout=6000;
  xhr.onload=function(){
    try{var d=JSON.parse(xhr.responseText);if(d&&d.lastPrice&&parseFloat(d.lastPrice)>0){cb({p:parseFloat(d.lastPrice),c:parseFloat(d.priceChangePercent||0),isFut:false});return;}}catch(e){}
    cb(null);
  };
  xhr.onerror=xhr.ontimeout=function(){cb(null);};
  xhr.send();
}

function calcSig(price,chg){
  var rsi=Math.min(83,Math.max(17,Math.round(50+chg*2.5)));
  var ema20=price*(1-chg*0.002);
  var macd=parseFloat((chg*price*0.0001).toFixed(8));
  var v=Math.max(Math.min(Math.abs(chg)/100,0.03),0.012);
  var s1=Math.max(price*(1-v*1.2),price*0.001),s2=Math.max(price*(1-v*2.4),price*0.001);
  var r1=price*(1+v*1.2),r2=price*(1+v*2.4);
  var sig,conf,trend;
  if(rsi<30){sig="BUY";conf="HIGH";trend="BULLISH";}
  else if(rsi>70){sig="SELL";conf="HIGH";trend="BEARISH";}
  else if(chg>1.5&&price>ema20){sig="BUY";conf="MEDIUM";trend="BULLISH";}
  else if(chg<-1.5&&price<ema20){sig="HOLD";conf="MEDIUM";trend="BEARISH";}
  else{sig="HOLD";conf="LOW";trend="SIDEWAYS";}
  var sl,t1,t2,risk;
  if(sig==="SELL"){sl=r1;risk=sl-price;t1=Math.max(price-risk*2,price*0.001);t2=Math.max(price-risk*3.5,price*0.001);}
  else{sl=s1;risk=price-sl;t1=price+risk*2;t2=price+risk*3.5;}
  return{rsi:rsi,ema20:ema20,macd:macd,sr:{s1:s1,s2:s2,r1:r1,r2:r2},sig:sig,conf:conf,trend:trend,ep:price,sl:sl,t1:t1,t2:t2,risk:risk};
}

function goPage(p){
  ["market","analyse","tracker"].forEach(function(x){
    document.getElementById("pg-"+x).classList.toggle("on",x===p);
    document.getElementById("tab-"+x).classList.toggle("on",x===p);
  });
  if(p==="market"){renderCoins();startMFetch();}
  else if(p==="tracker"){renderTracker();startTFetch();}
  else{if(tTmr){clearInterval(tTmr);tTmr=null;}renderPills();}
}

function setMSeg(s){
  mSeg=s;
  realSigs={};  // Clear scan results when switching segment
  document.getElementById("ms-SPOT").classList.toggle("on",s==="SPOT");
  document.getElementById("ms-FUTURES").classList.toggle("on",s==="FUTURES");
  document.getElementById("mTitle").textContent=s+" Coins";
  var scanBtn=document.getElementById("scanBtn");
  if(scanBtn){scanBtn.textContent="Smart Scan";scanBtn.style.background="#16a34a";}
  renderCoins();startMFetch();
}

function setASeg(s){
  aSeg=s;
  document.getElementById("as-SPOT").classList.toggle("on",s==="SPOT");
  document.getElementById("as-FUTURES").classList.toggle("on",s==="FUTURES");
  document.getElementById("levDiv").style.display=s==="FUTURES"?"block":"none";
  renderPills();updateCapHint();
}

function setTT(t){
  tt=t;
  ["swing","intraday","positional"].forEach(function(x){
    document.getElementById("tt-"+x).classList.toggle("on",x===t);
  });
}

function updateCapHint(){
  var cap=parseFloat(document.getElementById("capInp").value)||0;
  var lev=parseInt(document.getElementById("levSel").value)||1;
  var h=document.getElementById("capHint");
  h.textContent=cap>0&&aSeg==="FUTURES"?"Effective: "+fINR(cap*lev)+" | Max Loss: "+fINR(cap*0.02):"";
}

function renderCoins(){
  var list=mSeg==="SPOT"?gSC():gFC();
  var cont=document.getElementById("coinList");
  cont.innerHTML="";
  // Sort: HIGH signals first, then MEDIUM, then HOLD
  var sorted=list.slice().sort(function(a,b){
    var ra=realSigs[a], rb=realSigs[b];
    var pa=ra?(ra.conf==="HIGH"?3:ra.conf==="MEDIUM"&&ra.sig!=="HOLD"?2:1):1;
    var pb=rb?(rb.conf==="HIGH"?3:rb.conf==="MEDIUM"&&rb.sig!=="HOLD"?2:1):1;
    if(ra&&ra.trap)pa=0; if(rb&&rb.trap)pb=0;
    return pb-pa;
  });
  sorted.forEach(function(coin){
    var pr=prices[coin];
    var s=pr?calcSig(pr.p,pr.c):null;
    var rs = realSigs[coin]; // Real scan result if available
    var dispSig = rs ? rs.sig : (s ? s.sig : null);
    var dispConf = rs ? rs.conf : null;
    var isHighlight = rs && (rs.sig==="BUY"||rs.sig==="SELL") && rs.conf==="HIGH";
    var isMed = rs && (rs.sig==="BUY"||rs.sig==="SELL") && rs.conf==="MEDIUM";
    var rowBg = isHighlight ? (rs.sig==="BUY"?"#f0fdf4":"#fef2f2") : isMed ? (rs.sig==="BUY"?"#f8fff8":"#fff8f8") : "#fff";

    var row=mkEl("div","display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #f9fafb;cursor:pointer");
    row.style.background = rowBg;

    var ico=mkEl("div","width:36px;height:36px;background:linear-gradient(135deg,#dbeafe,#ede9fe);border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#3b82f6;font-size:11px;margin-right:12px;flex-shrink:0",coin.substring(0,3));
    row.appendChild(ico);

    var info=mkEl("div","flex:1");
    var nameRow=mkEl("div","display:flex;align-items:center;gap:6px");
    nameRow.appendChild(mkEl("span","font-weight:700;font-size:14px",coin));
    if(rs && rs.realRSI) { var rtag=mkEl("span","font-size:9px;background:#ede9fe;color:#7c3aed;border-radius:4px;padding:1px 5px","RSI:"+rs.rsi); nameRow.appendChild(rtag); }
    if(rs && rs.trap) { var ttag=mkEl("span","font-size:9px;background:#fef2f2;color:#dc2626;border-radius:4px;padding:1px 5px","TRAP"); nameRow.appendChild(ttag); }
    info.appendChild(nameRow);
    info.appendChild(mkEl("div","font-size:11px;color:#94a3b8",pr?fI(pr.p):"Loading..."));
    row.appendChild(info);

    var priceDiv=mkEl("div","text-align:right;margin-right:8px");
    priceDiv.appendChild(mkEl("div","font-weight:700;font-size:14px",pr?fP(pr.p):"--"));
    var chgEl=mkEl("div","font-size:11px;font-weight:600",pr?fPct(pr.c):"");
    chgEl.style.color=pr&&pr.c>=0?"#16a34a":"#dc2626";
    priceDiv.appendChild(chgEl);
    row.appendChild(priceDiv);

    if(dispSig) {
      var sigC2=dispSig==="BUY"?"#16a34a":dispSig==="SELL"?"#dc2626":"#6b7280";
      var sigBg2=dispSig==="BUY"?"#dcfce7":dispSig==="SELL"?"#fee2e2":"#f3f4f6";
      var sigLabel = dispSig==="HOLD"?"HOLD":(dispConf==="HIGH"?dispSig+" ★★":(dispConf==="MEDIUM"?dispSig+" ★":dispSig));
      var sigEl=mkEl("div","border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;min-width:38px;text-align:center;margin-right:6px",sigLabel);
      sigEl.style.background=sigBg2; sigEl.style.color=sigC2;
      if(isHighlight) sigEl.style.boxShadow="0 0 0 2px "+sigC2;
      row.appendChild(sigEl);
    }

    var rmBtn=mkEl("button","background:transparent;border:none;color:#d1d5db;cursor:pointer;font-size:16px;padding:0 4px","x");
    rmBtn.addEventListener("click",function(e){e.stopPropagation();removeCoin(coin);});
    row.appendChild(rmBtn);

    row.addEventListener("click",function(){
    selCoin=coin;
    setASeg(mSeg);
    goPage("analyse");
    // Auto-analyse if scan result exists for this coin
    if(realSigs[coin]) {
      var hint=document.getElementById("autoAnalyseHint");
      if(hint) hint.style.display="block";
      setTimeout(function(){
        var capVal=parseFloat(document.getElementById("capInp").value)||0;
        if(hint) hint.style.display="none";
        if(capVal>0) doAnalyse();
      }, 800);
    }
  });
    cont.appendChild(row);
  });
  renderPfolio();
}

function removeCoin(coin){
  if(mSeg==="SPOT"){sFC(gSC().filter(function(x){return x!==coin;}));sFC=sFC;}
  if(mSeg==="SPOT"){var a=gSC().filter(function(x){return x!==coin;});sFC(a);}
  else{var b=gFC().filter(function(x){return x!==coin;});sFC(b);}
  renderCoins();
}

function removeCoin(coin){
  if(mSeg==="SPOT"){var a=gSC().filter(function(c){return c!==coin;});sFC(a);}
  else{var b=gFC().filter(function(c){return c!==coin;});sFC(b);}
  renderCoins();
}

function renderPfolio(){
  var tr=gTr();
  var pf=document.getElementById("pfolio");
  if(!tr.length){pf.style.display="none";return;}
  var actT=0,hitT=0,stpT=0;
  tr.forEach(function(t){if(t.status==="ACTIVE")actT++;else if(t.status==="TARGET HIT")hitT++;else if(t.status==="STOP LOSS")stpT++;});
  pf.style.display="block";
  document.getElementById("pStats").innerHTML=
    "<div style='background:#eff6ff;border-radius:9px;padding:8px;text-align:center'><div style='font-size:14px;font-weight:800;color:#3b82f6'>"+actT+" Active</div></div>"+
    "<div style='background:#f0fdf4;border-radius:9px;padding:8px;text-align:center'><div style='font-size:14px;font-weight:800;color:#16a34a'>"+hitT+" Hit</div></div>"+
    "<div style='background:#fef2f2;border-radius:9px;padding:8px;text-align:center'><div style='font-size:14px;font-weight:800;color:#dc2626'>"+stpT+" SL</div></div>";
}

function renderPills(){
  var list=aSeg==="SPOT"?gSC():gFC();
  var row=document.getElementById("pillRow");
  row.innerHTML="";

function getTFSignal(candles) {
  if(!candles||candles.length<10) return null;
  var period = Math.min(14, candles.length-1);
  if(period < 5) return null;
  var rsi = calcRealRSI(candles, period);
  if(rsi===null) rsi = Math.round(50 + (parseFloat(candles[candles.length-1][4]) - parseFloat(candles[0][4])) / parseFloat(candles[0][4]) * 100);
  rsi = Math.min(83, Math.max(17, rsi));
  var ema20 = calcEMACandles(candles, Math.min(20, candles.length));
  var close = parseFloat(candles[candles.length-1][4]);
  var sig;
  if(rsi < 35) sig="BUY";
  else if(rsi > 65) sig="SELL";
  else if(ema20 && close > ema20) sig="BUY";
  else if(ema20 && close < ema20) sig="SELL";
  else sig="HOLD";
  return {sig:sig, rsi:rsi, ema:ema20};
}

function smartScan() {
  if(scanning) return;
  scanning = true;
  var list = mSeg==="SPOT" ? gSC() : gFC();
  var isFut = mSeg==="FUTURES";
  var btn = document.getElementById("scanBtn");
  if(btn) { btn.textContent="Scanning..."; btn.style.background="#94a3b8"; btn.disabled=true; }
  var done = 0;
  realSigs = {};
  // Fetch BTC trend first
  fetchBTCTrend(function(btcData) {
    function scanNext(i) {
      if(i >= list.length) {
        scanning = false;
        if(btn){ btn.textContent="Scan Results"; btn.style.background="#16a34a"; btn.disabled=false; }
        renderCoins();
        return;
      }
      var coin = list[i];
      fetchCandles(coin, isFut, function(candles) {
        var pr = prices[coin];
        if(candles && pr && pr.p > 0) {
          var realRSI = calcRealRSI(candles, 14);
          var realEMA = calcEMACandles(candles, 20);
          var volData = analyzeVolume(candles);
          var rsi = realRSI !== null ? realRSI : Math.min(83,Math.max(17,Math.round(50+pr.c*2.5)));
          var ema20 = realEMA !== null ? realEMA : pr.p*(1-pr.c*0.002);
          var sig, conf;
          if(rsi < 30) { sig="BUY"; conf="HIGH"; }
          else if(rsi > 70) { sig="SELL"; conf="HIGH"; }
          else if(pr.c > 1.5 && pr.p > ema20) { sig="BUY"; conf="MEDIUM"; }
          else if(pr.c < -1.5 && pr.p < ema20) { sig="SELL"; conf="MEDIUM"; }
          else { sig="HOLD"; conf="LOW"; }
          // Adjust for BTC trend
          if(btcData && btcData.isDown && sig==="BUY" && coin!=="BTC") {
            if(conf==="MEDIUM") conf="LOW";
          }
          // Volume downgrade
          if(volData && volData.ratio < 0.5 && conf==="HIGH") conf="MEDIUM";
          // Trap check
          var trap = Math.abs(pr.c) > 8 && volData && volData.ratio < 0.8;
          realSigs[coin] = { sig:sig, conf:conf, rsi:rsi, vol:volData?volData.ratio:null, trap:trap, realRSI:realRSI!==null, scannedAt:Date.now() };
        }
        // Update UI progressively
        renderCoins();
        setTimeout(function(){ scanNext(i+1); }, 400);
      });
    }
    scanNext(0);
  });
}

function calcRealRSI(candles, period) {
  if(!candles||candles.length<period+2) return null;
  var closes = [];
  for(var i=0;i<candles.length;i++) closes.push(parseFloat(candles[i][4]));
  var n = closes.length;
  var gains=0, losses=0;
  for(var j=n-period;j<n;j++) {
    var diff = closes[j]-closes[j-1];
    if(diff>0) gains+=diff; else losses+=Math.abs(diff);
  }
  var ag=gains/period, al=losses/period;
  if(al===0) return 100;
  return Math.round(100-(100/(1+ag/al)));
}

function calcEMACandles(candles, period) {
  if(!candles||candles.length<period) return null;
  var closes = [];
  for(var i=candles.length-period;i<candles.length;i++) closes.push(parseFloat(candles[i][4]));
  var k=2/(period+1), ema=closes[0];
  for(var i=1;i<closes.length;i++) ema=closes[i]*k+ema*(1-k);
  return ema;
}

function analyzeVolume(candles) {
  if(!candles||candles.length<15) return null;
  var n=candles.length;
  var recent = parseFloat(candles[n-1][5]);
  var sum=0;
  for(var i=n-15;i<n-1;i++) sum+=parseFloat(candles[i][5]);
  var avg=sum/14;
  if(avg<=0) return null;
  return {ratio: recent/avg, recent: recent, avg: avg};
}

function getTypeLevels(price, sig, tradeType) {
  var slPct, t1Pct, t2Pct;
  if(tradeType==="intraday")      {slPct=0.015;t1Pct=0.030;t2Pct=0.050;}
  else if(tradeType==="swing")    {slPct=0.035;t1Pct=0.070;t2Pct=0.120;}
  else                            {slPct=0.080;t1Pct=0.160;t2Pct=0.250;}
  var sl, t1, t2;
  if(sig==="SELL") {
    sl=price*(1+slPct);
    t1=Math.max(price*(1-t1Pct),price*0.001);
    t2=Math.max(price*(1-t2Pct),price*0.001);
  } else {
    sl=price*(1-slPct);
    t1=price*(1+t1Pct);
    t2=price*(1+t2Pct);
  }
  return {sl:sl, t1:t1, t2:t2, slPct:slPct*100, t1Pct:t1Pct*100};
}

function getExpiryTs(tradeType) {
  var now=new Date(), exp=new Date(now);
  if(tradeType==="intraday")   {exp.setHours(23,59,0,0);}
  else if(tradeType==="swing") {exp.setDate(exp.getDate()+5);exp.setHours(23,59,0,0);}
  else                         {exp.setDate(exp.getDate()+21);exp.setHours(23,59,0,0);}
  return exp.getTime();
}

function getTimeLeft(ts) {
  if(!ts) return null;
  var diff=ts-Date.now();
  if(diff<=0) return "EXPIRED";
  var h=Math.floor(diff/3600000);
  if(h<24) return h+"h shillak";
  return Math.floor(h/24)+"d "+(h%24)+"h shillak";
}

function addTrade(){
  if(!res||!res.ep||res.ep<=0){alert("Puha Analyse kara.");return;}
  var tr=gTr();
  tr.unshift({
    id:Date.now(),coin:res.coin,segment:res.seg,
    side:res.sig==="BUY"?"BUY":"SELL",
    entry:res.ep,sl:res.sl,t1:res.t1,t2:res.t2,
    capital:res.capitalINR,leverage:res.leverage,
    status:"ACTIVE",currentPrice:res.ep,
    tradeType:res.tradeType,
    expiryTs:res.expiryTs,
    expiryLabel:res.expiryLabel
  });
  sTr(tr);updateBadge();goPage("tracker");
}

function updateBadge(){
  var tr=gTr();
  var actT=tr.filter(function(t){return t.status==="ACTIVE";}).length;
  document.getElementById("tab-tracker").textContent="Tracker"+(actT>0?" ("+actT+")":"");
}

function getStatus(t){
  // Already locked - never change back
  if(t.status==="TARGET HIT"||t.status==="STOP LOSS"||t.status==="CLOSED")return t.status;
  var cur=prices[t.coin]&&prices[t.coin].p>0?prices[t.coin].p:(t.currentPrice||t.entry);
  var newStatus=null;
  if(t.side==="BUY"){if(cur>=t.t1)newStatus="TARGET HIT";else if(cur<=t.sl)newStatus="STOP LOSS";}
  else{if(cur<=t.t1)newStatus="TARGET HIT";else if(cur>=t.sl)newStatus="STOP LOSS";}
  if(newStatus){
    // LOCK permanently in localStorage
    var tr=gTr();
    for(var i=0;i<tr.length;i++){
      if(tr[i].id===t.id){tr[i].status=newStatus;tr[i].closedAt=new Date().toLocaleString("en-IN");tr[i].closePrice=cur;break;}
    }
    sTr(tr);
    return newStatus;
  }
  return"ACTIVE";
}

function getPnL(t){
  var cur=prices[t.coin]&&prices[t.coin].p>0?prices[t.coin].p:(t.currentPrice||t.entry);
  var pct=0;
  if(t.entry>0&&cur>0){if(t.side==="BUY")pct=((cur-t.entry)/t.entry)*100*t.leverage;else pct=((t.entry-cur)/t.entry)*100*t.leverage;}
  return{cur:cur,pct:pct,inr:t.capital*pct/100};
}

function renderTracker(){
  var tr=gTr();
  var actT=0,hitT=0,stpT=0,clsT=0;
  tr.forEach(function(t){
    if(t.status==="ACTIVE")actT++;
    else if(t.status==="TARGET HIT")hitT++;
    else if(t.status==="STOP LOSS")stpT++;
    else if(t.status==="CLOSED")clsT++;
  });
  // Render clickable filter tabs
  var statsEl=document.getElementById("tStats");
  statsEl.innerHTML="";
  var tabs=[
    {key:"ACTIVE",label:"Active",count:actT,bg:"#eff6ff",border:"#3b82f6",color:"#3b82f6"},
    {key:"TARGET HIT",label:"Target Hit",count:hitT,bg:"#f0fdf4",border:"#16a34a",color:"#16a34a"},
    {key:"STOP LOSS",label:"Stop Loss",count:stpT,bg:"#fef2f2",border:"#dc2626",color:"#dc2626"},
    {key:"CLOSED",label:"Closed",count:clsT,bg:"#f8fafc",border:"#94a3b8",color:"#6b7280"}
  ];
  tabs.forEach(function(tab){
    var btn=mkEl("div","flex-shrink:0;border-radius:14px;padding:10px 16px;text-align:center;cursor:pointer;transition:all .2s;min-width:76px");
    var isActive=tFilter===tab.key;
    btn.style.background=isActive?tab.color:"#fff";
    btn.style.border="2px solid "+(isActive?tab.color:tab.border+"40");
    btn.style.boxShadow=isActive?"0 2px 8px "+tab.color+"40":"none";
    var countEl=mkEl("div","font-size:22px;font-weight:800",tab.count);
    countEl.style.color=isActive?"#fff":tab.color;
    btn.appendChild(countEl);
    var labelEl=mkEl("div","font-size:10px;font-weight:600;margin-top:2px",tab.label);
    labelEl.style.color=isActive?"rgba(255,255,255,.85)":tab.color;
    btn.appendChild(labelEl);
    btn.addEventListener("click",function(){tFilter=tab.key;renderTracker();});
    statsEl.appendChild(btn);
  });
  var rb=document.getElementById("tRefBar");
  rb.style.display=actT>0?"flex":"none";
  var cont=document.getElementById("tList");
  cont.innerHTML="";
  if(!tr.length){
    var msg=mkEl("div","background:#fff;border-radius:16px;border:1px solid #e5e7eb;padding:40px;text-align:center");
    msg.appendChild(mkEl("div","font-size:16px;font-weight:700;margin-bottom:12px","Konatyahi Trade nahi"));
    var goBtn=mkEl("button","background:#3b82f6;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer","Analyse kara");
    goBtn.addEventListener("click",function(){goPage("analyse");});
    msg.appendChild(goBtn);
    cont.appendChild(msg);
    return;
  }
  // Show filtered trades
  var filtered=tr.filter(function(t){return t.status===tFilter;});
  var hit=tr.filter(function(t){return t.status==="TARGET HIT";});
  var stop=tr.filter(function(t){return t.status==="STOP LOSS";});
  var finished=hit.concat(stop);

  // Success ratio (always visible if any completed)
  if(finished.length>0){
    var pct=Math.round((hit.length/finished.length)*100);
    var ratio=mkEl("div","background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:12px 14px;margin-bottom:12px");
    ratio.innerHTML="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px'><span style='font-size:13px;font-weight:700'>Success Ratio</span><span style='font-size:14px;font-weight:800;color:"+(pct>=50?"#16a34a":"#dc2626")+"'>"+pct+"%</span></div><div style='height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden;margin-bottom:6px'><div style='height:100%;width:"+pct+"%;background:"+(pct>=50?"#16a34a":"#dc2626")+";border-radius:4px'></div></div><div style='display:flex;justify-content:space-between;font-size:10px;color:#64748b'><span style='color:#16a34a;font-weight:600'>Target Hit: "+hit.length+"</span><span style='color:#dc2626;font-weight:600'>Stop Loss: "+stop.length+"</span><span style='font-weight:600'>Total: "+finished.length+"</span></div>";
    cont.appendChild(ratio);
  }

  if(!filtered.length){
    var empty=mkEl("div","background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:32px;text-align:center;color:#94a3b8");
    // no msgs needed
    empty.innerHTML="<div style='font-size:32px;margin-bottom:10px'>"+(tFilter==="TARGET HIT"?"[T]":tFilter==="STOP LOSS"?"[S]":tFilter==="CLOSED"?"[C]":"[~]")+"</div><div style='font-size:14px;font-weight:600;margin-bottom:8px'>"+(tFilter==="ACTIVE"?"Konatyahi active trade nahi":tFilter==="TARGET HIT"?"Target hit trades nahi yet":tFilter==="STOP LOSS"?"Stop loss trades nahi yet":"Closed trades nahi yet")+"</div>";
    if(tFilter==="ACTIVE"){
      var goBtn=mkEl("button","background:#3b82f6;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px","Analyse kara");
      goBtn.addEventListener("click",function(){goPage("analyse");});
      empty.appendChild(goBtn);
    }
    cont.appendChild(empty);
  } else {
    filtered.forEach(function(t){cont.appendChild(mkTradeCard(t));});
  }
  updateBadge();

function mkTradeCard(t){
  var status=getStatus(t);
  var pnl=getPnL(t);
  var sc=status==="TARGET HIT"?"#16a34a":status==="STOP LOSS"?"#dc2626":status==="CLOSED"?"#6b7280":"#3b82f6";
  var sbg=status==="TARGET HIT"?"#dcfce7":status==="STOP LOSS"?"#fee2e2":status==="CLOSED"?"#f3f4f6":"#dbeafe";
  var isHit=status!=="ACTIVE";

  var card=mkEl("div","background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)");

  // Header row
  var hrow=mkEl("div","display:flex;justify-content:space-between;align-items:center;margin-bottom:"+(t.closedAt?"4px":"8px"));
  var left=mkEl("div","display:flex;align-items:center;gap:6px");
  var sideEl=mkEl("span","border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700",t.side);
  sideEl.style.background=t.side==="BUY"?"#dcfce7":"#fee2e2";
  sideEl.style.color=t.side==="BUY"?"#16a34a":"#dc2626";
  left.appendChild(sideEl);
  left.appendChild(mkEl("span","font-weight:800;font-size:15px",t.coin));
  if(t.leverage>1){var lv2=mkEl("span","background:#dbeafe;color:#1d4ed8;border-radius:5px;padding:2px 6px;font-size:10px;font-weight:700",t.leverage+"x");left.appendChild(lv2);}
  left.appendChild(mkEl("span","font-size:10px;color:#9ca3af",t.segment));
  hrow.appendChild(left);
  var statEl=mkEl("span","border-radius:6px;padding:4px 9px;font-size:10px;font-weight:700",status);
  statEl.style.background=sbg;statEl.style.color=sc;
  hrow.appendChild(statEl);
  card.appendChild(hrow);

  // Show expiry for active trades or close info for completed
  if(t.status==="ACTIVE"&&t.expiryTs){
    var tl=getTimeLeft(t.expiryTs);
    var expired=tl==="EXPIRED";
    var expEl=mkEl("div","display:flex;justify-content:space-between;align-items:center;background:"+(expired?"#fef2f2":"#f8fafc")+";border-radius:7px;padding:6px 10px;margin-bottom:8px");
    expEl.appendChild(mkEl("span","font-size:10px;color:#94a3b8;font-weight:600",(t.tradeType?t.tradeType.toUpperCase():"")+" | Expiry:"));
    var tlEl=mkEl("span","font-size:10px;font-weight:700",tl||"");
    tlEl.style.color=expired?"#dc2626":"#374151";
    expEl.appendChild(tlEl);
    card.appendChild(expEl);
  }
  if(t.closedAt){
    var closeInfo=mkEl("div","font-size:10px;color:#94a3b8;margin-bottom:8px","Closed: "+t.closedAt+(t.closePrice?" @ "+fP(t.closePrice):""));
    card.appendChild(closeInfo);
  }

  // Levels grid
  var grid=mkEl("div","display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px");
  [[" Entry",fP(t.entry),fI(t.entry),"#374151"],["Stop Loss",fP(t.sl),fI(t.sl)+(t.side==="BUY"?" kh":" v"),"#dc2626"],["Target 1",fP(t.t1),fI(t.t1)+(t.side==="BUY"?" v":" kh"),"#16a34a"]].forEach(function(a){
    var box=mkEl("div","background:#f9fafb;border-radius:8px;padding:7px;text-align:center");
    box.appendChild(mkEl("div","font-size:9px;color:#9ca3af;font-weight:600;margin-bottom:2px",a[0]));
    var vEl=mkEl("div","font-size:12px;font-weight:800",a[1]);vEl.style.color=a[3];box.appendChild(vEl);
    box.appendChild(mkEl("div","font-size:9px;color:#9ca3af;margin-top:1px",a[2]));
    grid.appendChild(box);
  });
  card.appendChild(grid);

  // PnL row
  var pnlBg=pnl.pct>=0?"#f0fdf4":"#fef2f2";
  var pnlC=pnl.pct>=0?"#16a34a":"#dc2626";
  var prow=mkEl("div","display:flex;justify-content:space-between;align-items:center;border-radius:8px;padding:8px 12px;margin-bottom:"+(isHit?"0":"8px"));
  prow.style.background=pnlBg;
  var pleft=mkEl("div");
  pleft.appendChild(mkEl("div","font-size:9px;color:#9ca3af;font-weight:600",prices[t.coin]&&prices[t.coin].p>0?"Live P&L":"P&L"));
  var pvalEl=mkEl("div","font-size:14px;font-weight:800",(pnl.pct>=0?"+":"")+pnl.pct.toFixed(2)+"% ("+(pnl.inr>=0?"+":"")+fINR(pnl.inr)+")");
  pvalEl.style.color=pnlC;pleft.appendChild(pvalEl);
  prow.appendChild(pleft);
  var pright=mkEl("div","text-align:right");
  pright.appendChild(mkEl("div","font-size:9px;color:#9ca3af;font-weight:600","Current"));
  pright.appendChild(mkEl("div","font-size:12px;font-weight:700",fP(pnl.cur)));
  prow.appendChild(pright);
  card.appendChild(prow);

  if(!isHit){
    var btnRow=mkEl("div","display:flex;gap:6px;margin-top:0");
    var mpInp=mkEl("input","flex:1;border:1px solid #e5e7eb;border-radius:8px;padding:7px 10px;font-size:12px;outline:none");
    mpInp.type="number";mpInp.placeholder="Manual price";
    btnRow.appendChild(mpInp);
    var upBtn=mkEl("button","background:#3b82f6;border:none;border-radius:8px;padding:7px 10px;font-size:11px;font-weight:700;color:#fff;cursor:pointer","Update");
    upBtn.addEventListener("click",function(){var v=parseFloat(mpInp.value);if(v>0){var tr=gTr();for(var i=0;i<tr.length;i++){if(tr[i].id===t.id){tr[i].currentPrice=v;break;}}sTr(tr);mpInp.value="";renderTracker();}});
    btnRow.appendChild(upBtn);
    var clBtn=mkEl("button","background:#f3f4f6;border:none;border-radius:8px;padding:7px 10px;font-size:11px;font-weight:700;color:#6b7280;cursor:pointer","Close");
    clBtn.addEventListener("click",function(){var tr=gTr();for(var i=0;i<tr.length;i++){if(tr[i].id===t.id){tr[i].status="CLOSED";break;}}sTr(tr);renderTracker();});
    btnRow.appendChild(clBtn);
    card.appendChild(btnRow);
  } else {
    var rmRow=mkEl("div","display:flex;justify-content:flex-end;margin-top:8px");
    var rmBtn=mkEl("button","background:transparent;border:1px solid #fecaca;border-radius:8px;padding:5px 12px;font-size:11px;color:#dc2626;cursor:pointer","Remove");
    rmBtn.addEventListener("click",function(){sTr(gTr().filter(function(x){return x.id!==t.id;}));renderTracker();});
    rmRow.appendChild(rmBtn);card.appendChild(rmRow);
  }
  return card;
}

function refreshT(){
  var tr=gTr().filter(function(t){return t.status==="ACTIVE";});
  var seen={};
  tr.forEach(function(t){seen[t.coin]=t.segment==="FUTURES";});
  Object.keys(seen).forEach(function(coin){
    fetchCoin(coin,seen[coin],function(pr){if(pr&&pr.p>0){prices[coin]=pr;renderTracker();}});
  });
}

function startTFetch(){
  if(tTmr)clearInterval(tTmr);
  refreshT();
  tTmr=setInterval(refreshT,20000);
}

// === INIT ===
document.getElementById("tab-market").addEventListener("click",function(){goPage("market");});
document.getElementById("tab-analyse").addEventListener("click",function(){goPage("analyse");});
document.getElementById("tab-tracker").addEventListener("click",function(){goPage("tracker");});
document.getElementById("ms-SPOT").addEventListener("click",function(){setMSeg("SPOT");});
document.getElementById("ms-FUTURES").addEventListener("click",function(){setMSeg("FUTURES");});
document.getElementById("as-SPOT").addEventListener("click",function(){setASeg("SPOT");});
document.getElementById("as-FUTURES").addEventListener("click",function(){setASeg("FUTURES");});
document.getElementById("tt-swing").addEventListener("click",function(){setTT("swing");});
document.getElementById("tt-intraday").addEventListener("click",function(){setTT("intraday");});
document.getElementById("tt-positional").addEventListener("click",function(){setTT("positional");});
document.getElementById("scanBtn").addEventListener("click",smartScan);
document.getElementById("addBtn").addEventListener("click",function(){var r=document.getElementById("addRow");r.style.display=r.style.display==="none"?"block":"none";});
document.getElementById("doAddBtn").addEventListener("click",function(){
  var c=document.getElementById("ncInp").value.trim().toUpperCase();
  if(!c)return;
  if(mSeg==="SPOT"){var a=gSC();if(a.indexOf(c)>=0){alert(c+" already exists!");return;}a.push(c);sFC(a);}
  else{var b=gFC();if(b.indexOf(c)>=0){alert(c+" already exists!");return;}b.push(c);sFC(b);}
  document.getElementById("ncInp").value="";
  document.getElementById("addRow").style.display="none";
  renderCoins();startMFetch();
});
document.getElementById("hideAddBtn").addEventListener("click",function(){document.getElementById("addRow").style.display="none";});
document.getElementById("aBtn").addEventListener("click",doAnalyse);
document.getElementById("tRefBtn").addEventListener("click",refreshT);
document.getElementById("capInp").addEventListener("input",updateCapHint);
document.getElementById("levSel").addEventListener("change",updateCapHint);

setASeg("FUTURES");
renderCoins();
renderPills();
updateBadge();
renderTracker();
startMFetch();
</script>
