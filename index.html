<script type="text/babel" data-presets="react">
const {useState,useEffect,useCallback,useRef} = React;

const CAPS={BTC:"bitcoin",ETH:"ethereum",SOL:"solana",BNB:"binance-coin",XRP:"xrp",DOGE:"dogecoin",ADA:"cardano",AVAX:"avalanche",DOT:"polkadot",LINK:"chainlink",MATIC:"polygon"};
const SPOT_COINS=["BTC","ETH","SOL","BNB","XRP","DOGE","ADA","AVAX","LINK","DOT"];
const FUT_COINS=["BTC","ETH","SOL","BNB","XRP","DOGE","ADA","AVAX","LINK","MATIC"];
const LEV_OPTS=[2,5,10,20,25,50];

function capId(s){return CAPS[s.toUpperCase()]||s.toLowerCase();}
function fP(p){if(!p||isNaN(p))return"--";if(p>=1000)return"$"+Math.round(p).toLocaleString("en-US");if(p>=1)return"$"+Number(p).toFixed(2);return"$"+Number(p).toFixed(4);}
function fI(u){if(!u||isNaN(u))return"--";const n=u*83.5;if(n>=10000000)return"Rs"+(n/10000000).toFixed(2)+"Cr";if(n>=100000)return"Rs"+(n/100000).toFixed(2)+"L";if(n>=1000)return"Rs"+Math.round(n).toLocaleString("en-IN");return"Rs"+n.toFixed(2);}
function fPct(v){if(v===undefined||v===null||isNaN(v))return"--";return(v>=0?"+":"")+Number(v).toFixed(2)+"%";}

// Fast fetch with timeout
async function ft(url,ms=6000){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),ms);
  try{const r=await fetch(url,{signal:ctrl.signal,cache:"no-store"});clearTimeout(tid);return r;}
  catch(e){clearTimeout(tid);throw e;}
}

// Get FUTURES price from Binance (most accurate for futures)
async function getFutPrice(coin){
  const sym=coin.toUpperCase()+"USDT";
  try{
    // Binance USDT-M Futures ticker - real futures price with funding rate
    const r=await ft("https://fapi.binance.com/fapi/v1/ticker/24hr?symbol="+sym,5000);
    if(r.ok){
      const d=await r.json();
      if(d&&d.lastPrice&&parseFloat(d.lastPrice)>0){
        return{
          p:parseFloat(d.lastPrice),
          c:parseFloat(d.priceChangePercent||0),
          high:parseFloat(d.highPrice||0),
          low:parseFloat(d.lowPrice||0),
          vol:parseFloat(d.quoteVolume||0),
          isFut:true
        };
      }
    }
  }catch(e){}
  return null;
}

// Get SPOT price - parallel from two sources
async function getSpotPrice(coin){
  const id=capId(coin);
  const sym=coin.toUpperCase()+"USDT";
  // Try both in parallel, take first success
  const results=await Promise.allSettled([
    ft("https://api.coincap.io/v2/assets/"+id,5000).then(r=>r.json()),
    ft("https://api.binance.com/api/v3/ticker/24hr?symbol="+sym,5000).then(r=>r.json())
  ]);
  // CoinCap result
  const cc=results[0];
  if(cc.status==="fulfilled"&&cc.value&&cc.value.data&&parseFloat(cc.value.data.priceUsd)>0){
    return{p:parseFloat(cc.value.data.priceUsd),c:parseFloat(cc.value.data.changePercent24Hr||0),isFut:false};
  }
  // Binance spot result
  const bn=results[1];
  if(bn.status==="fulfilled"&&bn.value&&bn.value.lastPrice&&parseFloat(bn.value.lastPrice)>0){
    return{p:parseFloat(bn.value.lastPrice),c:parseFloat(bn.value.priceChangePercent||0),isFut:false};
  }
  return null;
}

// Universal price getter
async function getPrice(coin,isFutures){
  if(isFutures){
    const fp=await getFutPrice(coin);
    if(fp)return fp;
    // Fallback to spot if futures fails
    return await getSpotPrice(coin);
  }
  return await getSpotPrice(coin);
}

function calcAll(price,chg){
  // RSI estimate from 24h change — clamp strictly
  const rsi=Math.min(83,Math.max(17,Math.round(50+chg*2.5)));

  // EMA20 estimate
  const ema20=price*(1-chg*0.002);

  // MACD estimate
  const macd=parseFloat((chg*price*0.0001).toFixed(6));

  // ── VOLATILITY: use PERCENTAGE of price, NOT the change value ──
  // Max 3% for SR calculation to avoid wild numbers
  const volPct=Math.min(Math.abs(chg)/100, 0.03);
  const minVolPct=0.012; // minimum 1.2% range
  const v=Math.max(volPct, minVolPct);

  // Support & Resistance — always positive, always relative to current price
  const sr={
    s1: Math.max(price*(1-v*1.2), 0.0001),
    s2: Math.max(price*(1-v*2.4), 0.0001),
    r1: price*(1+v*1.2),
    r2: price*(1+v*2.4)
  };

  // Signal
  let sig,conf,trend;
  if(rsi<30){sig="BUY";conf="HIGH";trend="BULLISH";}
  else if(rsi>70){sig="SELL";conf="HIGH";trend="BEARISH";}
  else if(chg>1.5&&price>ema20){sig="BUY";conf="MEDIUM";trend="BULLISH";}
  else if(chg<-1.5&&price<ema20){sig="HOLD";conf="MEDIUM";trend="BEARISH";}
  else{sig="HOLD";conf="LOW";trend="SIDEWAYS";}

  const ep=price;

  // ── CRITICAL FIX: BUY vs SELL correct levels ──
  // BUY:  SL below entry (support), Target above entry (resistance)
  // SELL: SL above entry (resistance), Target below entry (support)
  let sl,t1,t2,risk;

  if(sig==="SELL"){
    sl=sr.r1;                              // SL above entry
    risk=Math.abs(sl-ep);                  // risk = how much price goes UP before exit
    t1=Math.max(ep-risk*2, 0.0001);       // Target below entry (2x reward)
    t2=Math.max(ep-risk*3.5, 0.0001);     // Extended target (3.5x reward)
  } else {
    // BUY or HOLD — use BUY levels
    sl=Math.max(sr.s1, ep*0.001);         // SL below entry
    risk=Math.abs(ep-sl);                  // risk = how much price goes DOWN before exit
    t1=ep+risk*2;                          // Target above entry (2x reward)
    t2=ep+risk*3.5;                        // Extended target (3.5x reward)
  }

  return{rsi,ema20,macd,sr,sig,conf,trend,ep,sl,t1,t2,risk};
}

// localStorage helpers
function saveTrades(trades){
  try{localStorage.setItem("ts_trades",JSON.stringify(trades));}catch(e){}
}
function loadTrades(){
  try{const s=localStorage.getItem("ts_trades");return s?JSON.parse(s):[];}catch(e){return[];}
}
// Custom coins management
const DEFAULT_SPOT=["BTC","ETH","SOL","BNB","XRP","DOGE","ADA","AVAX","LINK","DOT"];
const DEFAULT_FUT=["BTC","ETH","SOL","BNB","XRP","DOGE","ADA","AVAX","LINK","MATIC"];
function saveCustomCoins(spot,fut){
  try{localStorage.setItem("ts_coins",JSON.stringify({spot,fut}));}catch(e){}
}
function loadCustomCoins(){
  try{
    const s=localStorage.getItem("ts_coins");
    if(s){const d=JSON.parse(s);return{spot:d.spot||DEFAULT_SPOT,fut:d.fut||DEFAULT_FUT};}
  }catch(e){}
  return{spot:DEFAULT_SPOT,fut:DEFAULT_FUT};
}

function TradeCard({trade,onUpdate,lp}){
  const[mp,setMp]=useState("");

  // Get live price for THIS specific coin
  const livePr=lp&&lp[trade.coin]&&parseFloat(lp[trade.coin].p)>0?parseFloat(lp[trade.coin].p):null;
  const manualPr=trade.currentPrice&&parseFloat(trade.currentPrice)>0?parseFloat(trade.currentPrice):null;
  const cur=livePr||manualPr||trade.entry;

  // ── P&L CALCULATION (correct for BUY and SELL) ──
  // BUY:  profit when cur > entry
  // SELL: profit when cur < entry
  const entryOk=trade.entry&&trade.entry>0;
  const curOk=cur&&cur>0;
  let pnlPct=0,pnlINR=0,profitLoss=0;
  if(entryOk&&curOk){
    if(trade.side==="BUY"){
      // % gain on entry price × leverage
      pnlPct=((cur-trade.entry)/trade.entry)*100*trade.leverage;
    } else {
      // SELL: profit when price falls
      pnlPct=((trade.entry-cur)/trade.entry)*100*trade.leverage;
    }
    // INR P&L = capital × pnl%
    pnlINR=(trade.capital*pnlPct)/100;
  }

  // ── HIT DETECTION ──
  // BUY:  target hit when cur >= t1 | stop loss when cur <= sl
  // SELL: target hit when cur <= t1 | stop loss when cur >= sl
  let autoStatus=trade.status;
  if(trade.status==="ACTIVE"&&curOk&&entryOk){
    if(trade.side==="BUY"){
      if(cur>=trade.t1) autoStatus="TARGET HIT";
      else if(cur<=trade.sl) autoStatus="STOP LOSS";
    } else {
      if(cur<=trade.t1) autoStatus="TARGET HIT";
      else if(cur>=trade.sl) autoStatus="STOP LOSS";
    }
  } else if(trade.status!=="ACTIVE"){
    autoStatus=trade.status;
  }

  // Status display
  let sc="#3b82f6",sbg="#dbeafe";
  if(autoStatus==="TARGET HIT"){sc="#16a34a";sbg="#dcfce7";}
  else if(autoStatus==="STOP LOSS"){sc="#dc2626";sbg="#fee2e2";}
  else if(autoStatus==="CLOSED"){sc="#6b7280";sbg="#f3f4f6";}

  const isFixed=autoStatus==="TARGET HIT"||autoStatus==="STOP LOSS"||autoStatus==="CLOSED";
  const statusLabel=autoStatus==="TARGET HIT"?"🎯 TARGET HIT":autoStatus==="STOP LOSS"?"🛑 STOP LOSS":autoStatus==="ACTIVE"?"● ACTIVE":"✓ CLOSED";

  return(
    <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:14,padding:14,marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <span style={{background:trade.side==="BUY"?"#dcfce7":"#fee2e2",color:trade.side==="BUY"?"#16a34a":"#dc2626",borderRadius:6,padding:"3px 8px",fontSize:11,fontWeight:700}}>{trade.side}</span>
          <span style={{fontWeight:800,fontSize:15}}>{trade.coin}</span>
          {trade.leverage>1&&<span style={{background:"#dbeafe",color:"#1d4ed8",borderRadius:5,padding:"2px 6px",fontSize:10,fontWeight:700}}>{trade.leverage}x</span>}
          <span style={{fontSize:10,color:"#9ca3af"}}>{trade.segment}</span>
        </div>
        <span style={{background:sbg,color:sc,borderRadius:6,padding:"3px 8px",fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>{statusLabel}</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
        {[["Entry",fP(trade.entry),"#374151"],["Stop Loss",fP(trade.sl),"#dc2626"],["Target 1",fP(trade.t1),"#16a34a"]].map(([l,v,c])=>(
          <div key={l} style={{background:"#f9fafb",borderRadius:8,padding:"7px",textAlign:"center"}}>
            <div style={{fontSize:9,color:"#9ca3af",fontWeight:600,marginBottom:2}}>{l}</div>
            <div style={{fontSize:12,fontWeight:800,color:c}}>{v}</div>
            <div style={{fontSize:9,color:"#9ca3af",marginTop:1}}>{fI(parseFloat(v.replace("$","").replace(",",""))||0)}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:pnlPct>=0?"#f0fdf4":"#fef2f2",borderRadius:8,padding:"8px 12px",marginBottom:isFixed?0:8}}>
        <div>
          <div style={{fontSize:9,color:"#9ca3af",fontWeight:600}}>{lp&&lp[trade.coin]?"Live P&L":"P&L"}</div>
          <div style={{fontSize:14,fontWeight:800,color:pnlPct>=0?"#16a34a":"#dc2626"}}>{pnlPct>=0?"+":""}{pnlPct.toFixed(2)}% ({pnlINR>=0?"+":""}{fI(Math.abs(pnlINR))})</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:9,color:"#9ca3af",fontWeight:600}}>Current</div>
          <div style={{fontSize:12,fontWeight:700,color:"#374151"}}>{fP(cur)}</div>
        </div>
      </div>
      {!isFixed&&(
        <div style={{display:"flex",gap:6,marginTop:8}}>
          <input type="number" placeholder="Manual price update" value={mp} onChange={e=>setMp(e.target.value)}
            style={{flex:1,border:"1px solid #e5e7eb",borderRadius:8,padding:"7px 10px",fontSize:12,outline:"none"}}/>
          <button onClick={()=>{if(mp){onUpdate(trade.id,{currentPrice:parseFloat(mp)});setMp("");}}}
            style={{background:"#3b82f6",border:"none",borderRadius:8,padding:"7px 10px",fontSize:11,fontWeight:700,color:"#fff",cursor:"pointer"}}>Update</button>
          <button onClick={()=>onUpdate(trade.id,{status:"CLOSED"})}
            style={{background:"#f3f4f6",border:"none",borderRadius:8,padding:"7px 10px",fontSize:11,fontWeight:700,color:"#6b7280",cursor:"pointer"}}>Close</button>
        </div>
      )}
      {isFixed&&(
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
          <button onClick={()=>onUpdate(trade.id,{_delete:true})}
            style={{background:"transparent",border:"1px solid #fecaca",borderRadius:8,padding:"5px 12px",fontSize:11,fontWeight:600,color:"#dc2626",cursor:"pointer"}}>Remove</button>
        </div>
      )}
    </div>
  );
}

function App(){
  const[tab,setTab]=useState("market");
  const[seg,setSeg]=useState("FUTURES"); // default to FUTURES as requested
  const[coin,setCoin]=useState("BTC");
  const[tt,setTt]=useState("swing");
  const[capVal,setCapVal]=useState("");
  const[lev,setLev]=useState(10);
  const[prices,setPrices]=useState({});
  const[loading,setLoading]=useState({});
  const[res,setRes]=useState(null);
  const[analysing,setAnalysing]=useState(false);
  const[aiTxt,setAiTxt]=useState("");
  const[aiLoad,setAiLoad]=useState(false);
  const[trades,setTrades]=useState(()=>loadTrades());
  const[showAddCoin,setShowAddCoin]=useState(false);
  const[newCoin,setNewCoin]=useState("");
  const initCoins=loadCustomCoins();
  const[spotCoins,setSpotCoins]=useState(initCoins.spot);
  const[futCoins,setFutCoins]=useState(initCoins.fut);

  const COINS=seg==="SPOT"?spotCoins:futCoins;

  function addCoin(){
    const c=newCoin.trim().toUpperCase();
    if(!c)return;
    if(seg==="SPOT"){
      if(spotCoins.includes(c)){alert(c+" आधीच आहे!");return;}
      const updated=[...spotCoins,c];
      setSpotCoins(updated);
      saveCustomCoins(updated,futCoins);
    }else{
      if(futCoins.includes(c)){alert(c+" आधीच आहे!");return;}
      const updated=[...futCoins,c];
      setFutCoins(updated);
      saveCustomCoins(spotCoins,updated);
    }
    setNewCoin("");
    setShowAddCoin(false);
  }

  function removeCoin(c){
    if(seg==="SPOT"){
      const updated=spotCoins.filter(x=>x!==c);
      setSpotCoins(updated);
      saveCustomCoins(updated,futCoins);
    }else{
      const updated=futCoins.filter(x=>x!==c);
      setFutCoins(updated);
      saveCustomCoins(spotCoins,updated);
    }
    if(coin===c)setCoin(COINS.filter(x=>x!==c)[0]||"BTC");
  }
  const capital=parseFloat(capVal)||50000;

  // Load prices fast - 3 parallel at a time
  const fetchAll=useCallback(async(coinList,isFut)=>{
    // Mark all as loading
    const loadMap={};coinList.forEach(c=>loadMap[c]=true);
    setLoading(prev=>({...prev,...loadMap}));
    // Process in chunks of 3 for speed
    const CHUNK=3;
    for(let i=0;i<coinList.length;i+=CHUNK){
      const chunk=coinList.slice(i,i+CHUNK);
      await Promise.all(chunk.map(async c=>{
        const pr=await getPrice(c,isFut);
        if(pr&&pr.p>0){
          setPrices(prev=>({...prev,[c]:pr}));
        }
        setLoading(prev=>({...prev,[c]:false}));
      }));
    }
  },[]);

  useEffect(()=>{
    const isFut=seg==="FUTURES";
    fetchAll(COINS,isFut);
    const interval=setInterval(()=>fetchAll(COINS,isFut),30000);
    return()=>clearInterval(interval);
  },[seg,COINS.join(",")]);

  // Auto-refresh prices for active tracker trades (every 30s)
  useEffect(()=>{
    async function refreshTrackerPrices(){
      const activeTrades=trades.filter(t=>t.status==="ACTIVE");
      const uniqueCoins=[...new Set(activeTrades.map(t=>t.coin))];
      for(const c of uniqueCoins){
        const isFut=activeTrades.find(t=>t.coin===c)?.segment==="FUTURES";
        const pr=await getPrice(c,isFut);
        if(pr&&pr.p>0){
          setPrices(prev=>({...prev,[c]:pr}));
        }
      }
    }
    if(tab==="tracker"){
      refreshTrackerPrices();
      const t=setInterval(refreshTrackerPrices,20000);
      return()=>clearInterval(t);
    }
  },[tab,trades]);

  // Save trades to localStorage whenever trades change
  useEffect(()=>{saveTrades(trades);},[trades]);

  async function analyse(){
    setAnalysing(true);setRes(null);setAiTxt("");
    try{
      const isFut=seg==="FUTURES";
      // ALWAYS fetch fresh price for selected coin — never use stale cache
      const pr=await getPrice(coin,isFut);
      if(!pr||!pr.p||isNaN(pr.p)||pr.p<=0)throw new Error(coin+" live price मिळाला नाही. Internet तपासा आणि retry करा.");
      // Update price cache with fresh data
      setPrices(prev=>({...prev,[coin]:pr}));
      const s=calcAll(pr.p,pr.c);
      const leverage=seg==="FUTURES"?lev:1;
      // Max loss = 2% of capital INR
      const maxLoss=capital*0.02;
      const risk=Math.abs(s.ep-s.sl);
      // Quantity = how many units bought with full capital + leverage
      // capitalUSD = total capital in USD with leverage
      const capitalUSD=(capital/83.5)*leverage;
      const qty=s.ep>0?(capitalUSD/s.ep).toFixed(6):"0";
      // Expected P&L at Target 1 (1:2 RR so profit = maxLoss×2)
      const minProfit=maxLoss*2;
      setRes({...s,price:pr.p,chg:pr.c,leverage,qty,maxLoss,minProfit,isFut:!!pr.isFut,coin,seg});
      setAnalysing(false);
      setAiLoad(true);
      try{
        const tLbl=tt==="swing"?"Swing":tt==="intraday"?"Intraday":"Positional";
        const prompt="Expert crypto analyst. Reply in Marathi only. 3 sentences max.\nCoin:"+coin+" Price:"+fP(pr.p)+" 24h:"+pr.c.toFixed(2)+"% RSI:"+s.rsi+" Signal:"+s.sig+" "+tLbl+" "+seg+(leverage>1?" "+leverage+"x":"")+"\nMarathi only:";
        const ar=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:[{role:"user",content:prompt}]})});
        const ad=await ar.json();
        setAiTxt(ad?.content?.[0]?.text||"");
      }catch(e){
        setAiTxt(s.sig==="BUY"?coin+" खरेदीची संधी. RSI "+s.rsi+". Stop Loss "+fP(s.sl)+" ठेवा. Target "+fP(s.t1)+".":s.sig==="SELL"?coin+" Overbought (RSI "+s.rsi+"). Correction शक्य. सावधगिरीने trade करा.":coin+" Sideways. Signal येईपर्यंत थांबा.");
      }
      setAiLoad(false);
    }catch(e){alert(e.message);setAnalysing(false);}
  }

  function addTrade(){
    if(!res)return;
    // Use res.coin and res.seg to ensure correct coin's data is saved
    const tradeCoin=res.coin||coin;
    const tradeSeg=res.seg||seg;
    // Validate that entry price matches the coin
    if(!res.ep||isNaN(res.ep)||res.ep<=0){
      alert("Price data invalid. Please analyse again.");
      return;
    }
    const t={
      id:Date.now(),
      coin:tradeCoin,
      segment:tradeSeg,
      side:res.sig==="BUY"?"BUY":"SELL",
      entry:res.ep,
      sl:res.sl,
      t1:res.t1,
      t2:res.t2,
      capital,
      leverage:res.leverage,
      status:"ACTIVE",
      currentPrice:res.ep,
      entryDate:new Date().toLocaleString("en-IN")
    };
    const updated=[t,...trades];
    setTrades(updated);
    saveTrades(updated);
    setTab("tracker");
  }

  function updTrade(id,updates){
    if(updates._delete){
      const updated=trades.filter(t=>t.id!==id);
      setTrades(updated);
      saveTrades(updated);
      return;
    }
    const updated=trades.map(t=>t.id===id?{...t,...updates}:t);
    setTrades(updated);
    saveTrades(updated);
  }

  const sigC=res?res.sig==="BUY"?"#16a34a":res.sig==="SELL"?"#dc2626":"#d97706":"#374151";
  const sigBg=res?res.sig==="BUY"?"#dcfce7":res.sig==="SELL"?"#fee2e2":"#fef3c7":"#f8fafc";
  const rsiC=res?(res.rsi<30?"#16a34a":res.rsi>70?"#dc2626":"#d97706"):"#d97706";
  const actT=trades.filter(t=>t.status==="ACTIVE").length;
  const hitT=trades.filter(t=>t.status==="TARGET HIT").length;
  const stpT=trades.filter(t=>t.status==="STOP LOSS").length;
  const clsT=trades.filter(t=>t.status!=="ACTIVE");
  const totPnL=clsT.reduce((sum,t)=>{
    const p=t.side==="BUY"?((t.currentPrice-t.entry)/t.entry*100*t.leverage):((t.entry-t.currentPrice)/t.entry*100*t.leverage);
    return sum+t.capital*p/100;
  },0);

  return(
    <div style={{background:"#f8fafc",minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>
      {/* HEADER */}

            {[[actT,"Active","#3b82f6","#eff6ff"],[hitT,"🎯 Target Hit","#16a34a","#f0fdf4"],[stpT,"🛑 Stop Loss","#dc2626","#fef2f2"]].map(([v,l,c,bg])=>(
              <div key={l} style={{background:bg,border:"1px solid "+c+"30",borderRadius:12,padding:12,textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:10,color:"#64748b",fontWeight:600}}>{l}</div>
              </div>
            ))}
          </div>
          {/* Live sync indicator */}
          {trades.filter(t=>t.status==="ACTIVE").length>0&&(
            <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"8px 14px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,color:"#16a34a",fontWeight:600}}>● Live prices auto-updating every 20s</span>
              <button onClick={async()=>{
                const activeTrades=trades.filter(t=>t.status==="ACTIVE");
                const uniqueCoins=[...new Set(activeTrades.map(t=>t.coin))];
                for(const c of uniqueCoins){
                  const isFut=activeTrades.find(t=>t.coin===c)?.segment==="FUTURES";
                  const pr=await getPrice(c,isFut);
                  if(pr&&pr.p>0)setPrices(prev=>({...prev,[c]:pr}));
                }
              }} style={{background:"#dcfce7",border:"none",borderRadius:7,padding:"4px 10px",fontSize:11,fontWeight:700,color:"#16a34a",cursor:"pointer"}}>↺ Refresh</button>
            </div>
          )}
          {clsT.length>0&&(
            <div style={{background:totPnL>=0?"#f0fdf4":"#fef2f2",border:"1px solid "+(totPnL>=0?"#bbf7d0":"#fecaca"),borderRadius:12,padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:13,fontWeight:700,color:"#374151"}}>Total P&amp;L (Closed)</span>
              <span style={{fontSize:16,fontWeight:800,color:totPnL>=0?"#16a34a":"#dc2626"}}>{totPnL>=0?"+":""}{fI(Math.abs(totPnL))}</span>
            </div>
          )}
          {trades.length===0?(
            <div style={{background:"#fff",borderRadius:16,border:"1px solid #e5e7eb",padding:40,textAlign:"center"}}>
              <div style={{fontSize:40,marginBottom:12}}>📊</div>
              <div style={{fontSize:16,fontWeight:700,color:"#374151",marginBottom:6}}>कोणताही Trade नाही</div>
              <div style={{fontSize:13,color:"#94a3b8",marginBottom:16}}>Analyse tab मधून trade add करा</div>
              <button onClick={()=>setTab("analyse")} style={{background:"#3b82f6",border:"none",borderRadius:10,padding:"10px 20px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Analyse करा →</button>
            </div>
          ):(
            <div>
              {actT>0&&<div style={{fontSize:12,fontWeight:700,color:"#94a3b8",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Active Trades</div>}
              {trades.filter(t=>t.status==="ACTIVE").map(t=><TradeCard key={t.id} trade={t} onUpdate={updTrade} lp={prices}/>)}
              {(hitT>0||stpT>0)&&<div style={{fontSize:12,fontWeight:700,color:"#94a3b8",marginTop:12,marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Target Hit / Stop Loss</div>}
              {trades.filter(t=>t.status==="TARGET HIT"||t.status==="STOP LOSS").map(t=><TradeCard key={t.id} trade={t} onUpdate={updTrade} lp={prices}/>)}
              {trades.filter(t=>t.status==="CLOSED").length>0&&<div style={{fontSize:12,fontWeight:700,color:"#94a3b8",marginTop:12,marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Closed Trades</div>}
              {trades.filter(t=>t.status==="CLOSED").map(t=><TradeCard key={t.id} trade={t} onUpdate={updTrade} lp={prices}/>)}
            </div>
          )}
          <div style={{height:30}}/>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
