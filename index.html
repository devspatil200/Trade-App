<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#ffffff">
<title>Trading Saathi Pro</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh}
input,select,button{font-family:inherit}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px"><div style="width:40px;height:40px;border:3px solid #e5e7eb;border-top:3px solid #3b82f6;border-radius:50%;animation:spin 0.8s linear infinite"></div><p style="color:#6b7280;font-size:14px">Loading Trading Saathi...</p></div></div>
<script>document.head.insertAdjacentHTML('beforeend','<style>@keyframes spin{to{transform:rotate(360deg)}}</style>');</script>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useCallback} = React;
const CAPS={BTC:"bitcoin",ETH:"ethereum",SOL:"solana",BNB:"binance-coin",XRP:"xrp",DOGE:"dogecoin",ADA:"cardano",AVAX:"avalanche",DOT:"polkadot",LINK:"chainlink",MATIC:"polygon"};
const SPOT_COINS=["BTC","ETH","SOL","BNB","XRP","DOGE","ADA","AVAX","LINK","DOT"];
const FUT_COINS=["BTC","ETH","SOL","BNB","XRP","DOGE","ADA","AVAX","LINK","MATIC"];
const LEV_OPTS=[2,5,10,20,25,50];
function capId(s){return CAPS[s.toUpperCase()]||s.toLowerCase();}
function fP(p){if(p>=1000)return"$"+Math.round(p).toLocaleString("en-US");if(p>=1)return"$"+Number(p).toFixed(2);return"$"+Number(p).toFixed(4);}
function fI(u){const n=u*83.5;if(n>=10000000)return"Rs"+(n/10000000).toFixed(2)+"Cr";if(n>=100000)return"Rs"+(n/100000).toFixed(2)+"L";return"Rs"+Math.round(n).toLocaleString("en-IN");}
function fPct(v){return(v>=0?"+":"")+Number(v).toFixed(2)+"%";}
async function getPrice(coin){
  const id=capId(coin);
  try{const r=await fetch("https://api.coincap.io/v2/assets/"+id);if(r.ok){const d=await r.json();if(d?.data?.priceUsd)return{p:parseFloat(d.data.priceUsd),c:parseFloat(d.data.changePercent24Hr||0)};}}catch(e){}
  try{const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids="+id+"&vs_currencies=usd&include_24hr_change=true");if(r.ok){const d=await r.json();if(d?.[id]?.usd)return{p:d[id].usd,c:d[id].usd_24h_change||0};}}catch(e){}
  return null;
}
function calcAll(price,chg){
  const rsi=Math.min(83,Math.max(17,Math.round(50+chg*3.5)));
  const ema20=price*(1-chg*0.003);
  const macd=chg*price*0.0001;
  const v=Math.max(Math.abs(chg)/100,0.015);
  const sr={s1:price*(1-v*1.3),s2:price*(1-v*2.6),r1:price*(1+v*1.3),r2:price*(1+v*2.6)};
  let sig,conf,trend;
  if(rsi<30){sig="BUY";conf="HIGH";trend="BULLISH";}
  else if(rsi>70){sig="SELL";conf="HIGH";trend="BEARISH";}
  else if(chg>1.5&&price>ema20){sig="BUY";conf="MEDIUM";trend="BULLISH";}
  else if(chg<-1.5&&price<ema20){sig="HOLD";conf="MEDIUM";trend="BEARISH";}
  else{sig="HOLD";conf="LOW";trend="SIDEWAYS";}
  const ep=price,sl=sig==="SELL"?sr.r1:sr.s1,risk=Math.abs(ep-sl);
  const t1=sig==="SELL"?ep-risk*2:ep+risk*2;
  const t2=sig==="SELL"?ep-risk*3.5:ep+risk*3.5;
  return{rsi,ema20,macd,sr,sig,conf,trend,ep,sl,t1,t2,risk};
}

function TradeCard({trade,onUpdate,lp}){
  const[mp,setMp]=useState("");
  const cur=lp?.[trade.coin]?.p||(trade.currentPrice||trade.entry);
  const pnlPct=trade.side==="BUY"?((cur-trade.entry)/trade.entry*100*trade.leverage):((trade.entry-cur)/trade.entry*100*trade.leverage);
  const pnlINR=trade.capital*pnlPct/100;
  let status=trade.status,sc="#6b7280",sbg="#f3f4f6";
  if(status==="ACTIVE"){
    if(trade.side==="BUY"){if(cur>=trade.t1){status="TARGET HIT";sc="#16a34a";sbg="#dcfce7";}else if(cur<=trade.sl){status="STOP LOSS";sc="#dc2626";sbg="#fee2e2";}else{sc="#3b82f6";sbg="#dbeafe";}}
    else{if(cur<=trade.t1){status="TARGET HIT";sc="#16a34a";sbg="#dcfce7";}else if(cur>=trade.sl){status="STOP LOSS";sc="#dc2626";sbg="#fee2e2";}else{sc="#3b82f6";sbg="#dbeafe";}}
  }else if(trade.status==="TARGET HIT"){sc="#16a34a";sbg="#dcfce7";}
  else if(trade.status==="STOP LOSS"){sc="#dc2626";sbg="#fee2e2";}
  const isHit=status==="TARGET HIT"||status==="STOP LOSS"||trade.status==="TARGET HIT"||trade.status==="STOP LOSS";
  const statusLabel=status==="TARGET HIT"?"🎯 TARGET HIT":status==="STOP LOSS"?"🛑 STOP LOSS":status==="ACTIVE"?"● ACTIVE":"CLOSED";
  return (
    <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:14,padding:14,marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{background:trade.side==="BUY"?"#dcfce7":"#fee2e2",color:trade.side==="BUY"?"#16a34a":"#dc2626",borderRadius:6,padding:"3px 8px",fontSize:11,fontWeight:700}}>{trade.side}</span>
          <span style={{fontWeight:800,fontSize:15}}>{trade.coin}</span>
          {trade.leverage>1&&<span style={{background:"#dbeafe",color:"#1d4ed8",borderRadius:5,padding:"2px 6px",fontSize:10,fontWeight:700}}>{trade.leverage}x</span>}
          <span style={{fontSize:10,color:"#9ca3af"}}>{trade.segment}</span>
        </div>
        <span style={{background:sbg,color:sc,borderRadius:6,padding:"3px 8px",fontSize:10,fontWeight:700}}>{statusLabel}</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
        {[["Entry",fP(trade.entry),"#374151"],["Stop Loss",fP(trade.sl),"#dc2626"],["Target 1",fP(trade.t1),"#16a34a"]].map(([l,v,c])=>(
          <div key={l} style={{background:"#f9fafb",borderRadius:8,padding:"7px",textAlign:"center"}}>
            <div style={{fontSize:9,color:"#9ca3af",fontWeight:600,marginBottom:2}}>{l}</div>
            <div style={{fontSize:12,fontWeight:800,color:c}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:pnlPct>=0?"#f0fdf4":"#fef2f2",borderRadius:8,padding:"8px 12px",marginBottom:isHit||trade.status!=="ACTIVE"?0:8}}>
        <div>
          <div style={{fontSize:9,color:"#9ca3af",fontWeight:600}}>P&amp;L {lp?.[trade.coin]?"(Live)":""}</div>
          <div style={{fontSize:14,fontWeight:800,color:pnlPct>=0?"#16a34a":"#dc2626"}}>{pnlPct>=0?"+":""}{pnlPct.toFixed(2)}% ({pnlINR>=0?"+":""}{fI(Math.abs(pnlINR))})</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:9,color:"#9ca3af",fontWeight:600}}>Current</div>
          <div style={{fontSize:12,fontWeight:700,color:"#374151"}}>{fP(cur)}</div>
        </div>
      </div>
      {!isHit&&trade.status==="ACTIVE"&&(
        <div style={{display:"flex",gap:6,marginTop:8}}>
          <input type="number" placeholder="Manual price" value={mp} onChange={e=>setMp(e.target.value)} style={{flex:1,border:"1px solid #e5e7eb",borderRadius:8,padding:"7px 10px",fontSize:12,outline:"none"}}/>
          <button onClick={()=>{if(mp){onUpdate(trade.id,{currentPrice:parseFloat(mp)});setMp("");}}} style={{background:"#3b82f6",border:"none",borderRadius:8,padding:"7px 10px",fontSize:11,fontWeight:700,color:"#fff",cursor:"pointer"}}>Update</button>
          <button onClick={()=>onUpdate(trade.id,{status:"CLOSED"})} style={{background:"#f3f4f6",border:"none",borderRadius:8,padding:"7px 10px",fontSize:11,fontWeight:700,color:"#6b7280",cursor:"pointer"}}>Close</button>
        </div>
      )}
    </div>
  );
}

function App(){
  const[tab,setTab]=useState("market");
  const[seg,setSeg]=useState("SPOT");
  const[coin,setCoin]=useState("BTC");
  const[tt,setTt]=useState("swing");
  const[cap,setCap]=useState(50000);
  const[lev,setLev]=useState(10);
  const[prices,setPrices]=useState({});
  const[res,setRes]=useState(null);
  const[loading,setLoading]=useState(false);
  const[aiTxt,setAiTxt]=useState("");
  const[aiLoad,setAiLoad]=useState(false);
  const[trades,setTrades]=useState([]);
  const COINS=seg==="SPOT"?SPOT_COINS:FUT_COINS;
  const loadPrices=useCallback(()=>{COINS.forEach(c=>{getPrice(c).then(pr=>{if(pr)setPrices(p=>({...p,[c]:pr}));});});},[seg]);
  useEffect(()=>{loadPrices();const t=setInterval(loadPrices,30000);return()=>clearInterval(t);},[loadPrices]);

  async function analyse(){
    setLoading(true);setRes(null);setAiTxt("");
    try{
      let pr=prices[coin];if(!pr){pr=await getPrice(coin);if(pr)setPrices(p=>({...p,[coin]:pr}));}
      if(!pr)throw new Error(coin+" price मिळाला नाही");
      const s=calcAll(pr.p,pr.c);
      const leverage=seg==="FUTURES"?lev:1;
      const maxLoss=cap*0.02;
      const qty=(maxLoss/(s.risk*83.5)).toFixed(4);
      setRes({...s,price:pr.p,chg:pr.c,leverage,qty,maxLoss});
      setLoading(false);setAiLoad(true);
      try{
        const tLbl=tt==="swing"?"Swing":tt==="intraday"?"Intraday":"Positional";
        const prompt="Expert crypto analyst. Reply in Marathi only. 3 sentences.\nCoin:"+coin+" Price:"+fP(pr.p)+" 24h:"+pr.c.toFixed(2)+"% RSI:"+s.rsi+" Signal:"+s.sig+" "+tLbl+" "+seg+(leverage>1?" "+leverage+"x":"")+"\nMarathi:";
        const ar=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:[{role:"user",content:prompt}]})});
        const ad=await ar.json();
        setAiTxt(ad?.content?.[0]?.text||"");
      }catch(e){setAiTxt(s.sig==="BUY"?coin+" खरेदीची संधी. RSI "+s.rsi+". Stop Loss "+fP(s.sl)+" ठेवा. Target "+fP(s.t1)+".":s.sig==="SELL"?coin+" Overbought (RSI "+s.rsi+"). Correction शक्य.":coin+" Sideways. Signal येईपर्यंत थांबा.");}
      setAiLoad(false);
    }catch(e){alert(e.message);setLoading(false);}
  }

  function addTrade(){
    if(!res)return;
    const t={id:Date.now(),coin,segment:seg,side:res.sig==="BUY"?"BUY":"SELL",entry:res.ep,sl:res.sl,t1:res.t1,t2:res.t2,capital:cap,leverage:res.leverage,status:"ACTIVE",currentPrice:res.ep};
    setTrades(p=>[t,...p]);setTab("tracker");
  }
  function updTrade(id,u){setTrades(p=>p.map(t=>t.id===id?{...t,...u}:t));}

  const sigC=res?res.sig==="BUY"?"#16a34a":res.sig==="SELL"?"#dc2626":"#d97706":"#374151";
  const sigBg=res?res.sig==="BUY"?"#dcfce7":res.sig==="SELL"?"#fee2e2":"#fef3c7":"#f8fafc";
  const rsiC=res?(res.rsi<30?"#16a34a":res.rsi>70?"#dc2626":"#d97706"):"#d97706";
  const actT=trades.filter(t=>t.status==="ACTIVE").length;
  const hitT=trades.filter(t=>t.status==="TARGET HIT").length;
  const stpT=trades.filter(t=>t.status==="STOP LOSS").length;
  const clsT=trades.filter(t=>t.status!=="ACTIVE");
  const totPnL=clsT.reduce((sum,t)=>{const p=t.side==="BUY"?((t.currentPrice-t.entry)/t.entry*100*t.leverage):((t.entry-t.currentPrice)/t.entry*100*t.leverage);return sum+t.capital*p/100;},0);

  return (
    <div style={{background:"#f8fafc",minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>
      {/* HEADER */}
      <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"12px 16px",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <div style={{width:34,height:34,background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>📈</div>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:"#0f172a"}}>Trading Saathi Pro</div>
              <div style={{fontSize:9,color:"#94a3b8",letterSpacing:.5}}>PROFESSIONAL TRADING TOOL</div>
            </div>
          </div>
          <div style={{background:"#dcfce7",color:"#16a34a",borderRadius:20,padding:"4px 10px",fontSize:10,fontWeight:700}}>● LIVE</div>
        </div>
        <div style={{display:"flex",background:"#f1f5f9",borderRadius:10,padding:3,gap:2}}>
          {[["market","🏠 Market"],["analyse","🔍 Analyse"],["tracker","📊 Tracker"+(actT>0?" ("+actT+")":"")]].map(([t,l])=>(
            <button key={t} onClick={()=>setTab(t)} style={{flex:1,background:tab===t?"#fff":"transparent",border:"none",borderRadius:8,padding:"8px 4px",fontSize:11,fontWeight:tab===t?700:500,color:tab===t?"#1e293b":"#64748b",cursor:"pointer",boxShadow:tab===t?"0 1px 3px rgba(0,0,0,.1)":""}}>{l}</button>
          ))}
        </div>
      </div>

      {/* MARKET */}
      {tab==="market"&&<div style={{padding:"14px 14px 0"}}>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {["SPOT","FUTURES"].map(s=>(
            <button key={s} onClick={()=>setSeg(s)} style={{flex:1,background:seg===s?"#3b82f6":"#fff",color:seg===s?"#fff":"#374151",border:"1px solid "+(seg===s?"#3b82f6":"#e5e7eb"),borderRadius:10,padding:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>{s==="FUTURES"?"⚡ FUTURES":"💰 SPOT"}</button>
          ))}
        </div>
        <div style={{background:"#fff",borderRadius:14,border:"1px solid #e5e7eb",overflow:"hidden"}}>
          <div style={{padding:"12px 16px",borderBottom:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:13,fontWeight:700,color:"#374151"}}>{seg==="SPOT"?"Spot":"Futures"} Coins</span>
            <span style={{fontSize:10,color:"#94a3b8"}}>Tap to analyse →</span>
          </div>
          {COINS.map((c,i)=>{
            const pr=prices[c];const s=pr?calcAll(pr.p,pr.c):null;
            const sc2=s?s.sig==="BUY"?"#16a34a":s.sig==="SELL"?"#dc2626":"#6b7280":"#6b7280";
            const sbg2=s?s.sig==="BUY"?"#dcfce7":s.sig==="SELL"?"#fee2e2":"#f3f4f6":"#f3f4f6";
            return(
              <div key={c} onClick={()=>{setCoin(c);setTab("analyse");}} style={{display:"flex",alignItems:"center",padding:"12px 16px",borderBottom:i<COINS.length-1?"1px solid #f9fafb":"",cursor:"pointer"}}>
                <div style={{width:38,height:38,background:"linear-gradient(135deg,#dbeafe,#ede9fe)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:"#3b82f6",marginRight:12}}>{c[0]}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>{c}</div>
                  <div style={{fontSize:11,color:"#94a3b8"}}>{pr?fI(pr.p):"लोड..."}</div>
                </div>
                <div style={{textAlign:"right",marginRight:10}}>
                  <div style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>{pr?fP(pr.p):"--"}</div>
                  <div style={{fontSize:11,color:pr&&pr.c>=0?"#16a34a":"#dc2626",fontWeight:600}}>{pr?fPct(pr.c):"--"}</div>
                </div>
                {s&&<div style={{background:sbg2,color:sc2,borderRadius:6,padding:"3px 8px",fontSize:10,fontWeight:700,minWidth:40,textAlign:"center"}}>{s.sig}</div>}
              </div>
            );
          })}
        </div>
        {trades.length>0&&<div style={{background:"#fff",borderRadius:14,border:"1px solid #e5e7eb",padding:14,marginTop:12}}>
          <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:8}}>📊 Portfolio</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {[[actT+" Active","#3b82f6"],[clsT.length+" Closed","#6b7280"],[(totPnL>=0?"+":"")+fI(Math.abs(totPnL)),totPnL>=0?"#16a34a":"#dc2626"]].map(([v,c],i)=>(
              <div key={i} style={{background:"#f8fafc",borderRadius:9,padding:8,textAlign:"center"}}>
                <div style={{fontSize:12,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:9,color:"#94a3b8",marginTop:1}}>{"Active/Closed/P&L".split("/")[i]}</div>
              </div>
            ))}
          </div>
        </div>}
        <div style={{height:30}}/>
      </div>}

      {/* ANALYSE */}
      {tab==="analyse"&&<div style={{padding:"14px 14px 0"}}>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {["SPOT","FUTURES"].map(s=>(
            <button key={s} onClick={()=>{setSeg(s);if(s==="SPOT")setLev(1);else setLev(10);}} style={{flex:1,background:seg===s?"#3b82f6":"#fff",color:seg===s?"#fff":"#374151",border:"1px solid "+(seg===s?"#3b82f6":"#e5e7eb"),borderRadius:10,padding:9,fontSize:12,fontWeight:700,cursor:"pointer"}}>{s==="FUTURES"?"⚡ FUTURES":"💰 SPOT"}</button>
          ))}
        </div>
        {seg==="FUTURES"&&<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:12,padding:"10px 14px",marginBottom:10,fontSize:11,color:"#92400e",lineHeight:1.6}}>⚡ Futures मध्ये Leverage असते. जास्त profit पण जास्त risk! Stop Loss नेहमी ठेवा.</div>}
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,marginBottom:12}}>
          {COINS.map(c=>(
            <button key={c} onClick={()=>setCoin(c)} style={{flexShrink:0,background:coin===c?"#3b82f6":"#fff",color:coin===c?"#fff":"#374151",border:"1px solid "+(coin===c?"#3b82f6":"#e5e7eb"),borderRadius:20,padding:"6px 14px",fontSize:12,fontWeight:coin===c?700:500,cursor:"pointer"}}>
              {c}{prices[c]?" "+fP(prices[c].p):""}
            </button>
          ))}
        </div>
        <div style={{background:"#fff",borderRadius:14,border:"1px solid #e5e7eb",padding:14,marginBottom:12}}>
          <div style={{display:"flex",gap:10,marginBottom:10}}>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:"#94a3b8",fontWeight:600,marginBottom:5}}>CAPITAL (INR)</div>
              <input type="number" value={cap} onChange={e=>setCap(parseFloat(e.target.value)||50000)} style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:9,padding:"9px 12px",fontSize:14,fontWeight:700,color:"#1e293b",outline:"none",background:"#f8fafc"}}/>
            </div>
            {seg==="FUTURES"&&<div style={{flex:1}}>
              <div style={{fontSize:10,color:"#94a3b8",fontWeight:600,marginBottom:5}}>LEVERAGE</div>
              <select value={lev} onChange={e=>setLev(parseInt(e.target.value))} style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:9,padding:"9px 12px",fontSize:14,fontWeight:700,color:"#1e293b",outline:"none",background:"#f8fafc"}}>
                {LEV_OPTS.map(l=><option key={l} value={l}>{l}x</option>)}
              </select>
            </div>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
            {[["swing","🔄","Swing","2-5 दिवस"],["intraday","⚡","Intraday","आजच"],["positional","📅","Hold","आठवडे"]].map(([t,ic,nm,sb])=>(
              <button key={t} onClick={()=>setTt(t)} style={{background:tt===t?"#eff6ff":"#f8fafc",border:"1px solid "+(tt===t?"#3b82f6":"#e5e7eb"),borderRadius:9,padding:"9px 4px",cursor:"pointer",color:tt===t?"#1d4ed8":"#6b7280"}}>
                <div style={{fontSize:14}}>{ic}</div>
                <div style={{fontSize:10,fontWeight:700}}>{nm}</div>
                <div style={{fontSize:9,opacity:.7}}>{sb}</div>
              </button>
            ))}
          </div>
        </div>
        <button onClick={analyse} disabled={loading} style={{width:"100%",background:loading?"#94a3b8":"linear-gradient(135deg,#3b82f6,#8b5cf6)",border:"none",borderRadius:13,padding:16,color:"#fff",fontSize:16,fontWeight:800,cursor:loading?"not-allowed":"pointer",marginBottom:16}}>
          {loading?"⏳ Live data येत आहे...":"🔍 "+coin+" विश्लेषण करा"}
        </button>

        {res&&<div>
          {/* Price */}
          <div style={{background:"linear-gradient(135deg,#fff,#f0f9ff)",border:"1px solid #e5e7eb",borderRadius:16,padding:16,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div>
                <div style={{fontSize:22,fontWeight:800,color:"#0f172a"}}>{coin}{seg==="FUTURES"&&res.leverage>1&&<span style={{fontSize:13,background:"#dbeafe",color:"#1d4ed8",borderRadius:6,padding:"2px 8px",marginLeft:6}}>{res.leverage}x</span>}</div>
                <div style={{fontSize:11,color:"#94a3b8"}}>{tt.toUpperCase()} · {seg}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:22,fontWeight:800,color:"#0f172a"}}>{fP(res.price)}</div>
                <div style={{fontSize:12,fontWeight:600,color:res.chg>=0?"#16a34a":"#dc2626"}}>{fPct(res.chg)} (24h)</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
              {[["INR",fI(res.price),"#3b82f6"],["RSI",res.rsi+(res.rsi<30?" 🟢":res.rsi>70?" 🔴":" 🟡"),rsiC],["EMA20",res.price>res.ema20?"↑ Bull":"↓ Bear",res.price>res.ema20?"#16a34a":"#dc2626"]].map(([l,v,c])=>(
                <div key={l} style={{background:"#f8fafc",borderRadius:9,padding:"9px",textAlign:"center"}}>
                  <div style={{fontSize:9,color:"#94a3b8",fontWeight:600,marginBottom:3}}>{l}</div>
                  <div style={{fontSize:12,fontWeight:800,color:c}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
          {/* Signal */}
          <div style={{background:sigBg,border:"2px solid "+sigC,borderRadius:16,padding:16,marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
              <div style={{fontSize:40}}>{res.sig==="BUY"?"🟢":res.sig==="SELL"?"🔴":"🟡"}</div>
              <div>
                <div style={{fontSize:26,fontWeight:800,color:sigC}}>{res.sig==="BUY"?"खरेदी करा":res.sig==="SELL"?"विक्री करा":"थांबा"}</div>
                <div style={{fontSize:11,color:"#6b7280"}}>{res.conf} CONFIDENCE · {res.trend}</div>
              </div>
            </div>
            <div style={{background:"rgba(255,255,255,.8)",borderRadius:10,padding:12,fontSize:13,lineHeight:1.9,color:"#374151"}}>
              {aiLoad?"⏳ AI विश्लेषण होत आहे...":aiTxt||"..."}
            </div>
          </div>
          {/* 1:2 RR */}
          <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:16,padding:16,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:13,fontWeight:700,color:"#374151"}}>Entry · SL · Target</span>
              <span style={{background:"#dbeafe",color:"#1d4ed8",borderRadius:6,padding:"3px 8px",fontSize:10,fontWeight:700}}>1:2 Risk:Reward</span>
            </div>
            <div style={{background:"#f1f5f9",borderRadius:8,padding:10,marginBottom:10}}>
              <div style={{display:"flex",height:24,borderRadius:6,overflow:"hidden",gap:2}}>
                <div style={{flex:1,background:"#fee2e2",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#dc2626"}}>LOSS 1x</div>
                <div style={{flex:2,background:"#dcfce7",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#16a34a"}}>PROFIT 2x</div>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:10,color:"#6b7280"}}>
                <span>Max Loss: {fI(res.maxLoss)}</span>
                <span>Min Profit: {fI(res.maxLoss*2)}</span>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              {[["Entry Price",fP(res.ep),fI(res.ep),"#3b82f6"],["Stop Loss 🛡",fP(res.sl),fI(res.sl),"#dc2626"],["Target 1 🎯",fP(res.t1),fI(res.t1)+" (+2x)","#16a34a"],["Target 2 🚀",fP(res.t2),fI(res.t2)+" (+3.5x)","#8b5cf6"]].map(([l,v,s,c])=>(
                <div key={l} style={{background:"#f8fafc",border:"1px solid #e5e7eb",borderRadius:11,padding:12,textAlign:"center"}}>
                  <div style={{fontSize:9,color:"#94a3b8",fontWeight:600,marginBottom:5}}>{l}</div>
                  <div style={{fontSize:15,fontWeight:800,color:c}}>{v}</div>
                  <div style={{fontSize:9,color:"#94a3b8",marginTop:3}}>{s}</div>
                </div>
              ))}
            </div>
            <div style={{background:"linear-gradient(135deg,#eff6ff,#f5f3ff)",border:"1px solid #bfdbfe",borderRadius:10,padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:10,color:"#64748b",fontWeight:600}}>Quantity · {fI(cap)}</div>
                <div style={{fontSize:13,fontWeight:800,color:"#1e293b"}}>{res.qty} units{res.leverage>1?" ("+res.leverage+"x)":""}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:10,color:"#64748b",fontWeight:600}}>Max Risk (2%)</div>
                <div style={{fontSize:13,fontWeight:800,color:"#dc2626"}}>{fI(res.maxLoss)}</div>
              </div>
            </div>
          </div>
          {/* Indicators */}
          <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:16,padding:16,marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:10}}>📊 Live Indicators</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[["RSI (14)",res.rsi,res.rsi<30?"Oversold":res.rsi>70?"Overbought":"Normal",rsiC,true],["MACD",(res.macd>0?"+":"")+res.macd.toFixed(2),res.macd>0?"Positive":"Negative",res.macd>0?"#16a34a":"#dc2626",false],["EMA20",fP(res.ema20),res.price>res.ema20?"↑ Bull":"↓ Bear",res.price>res.ema20?"#16a34a":"#dc2626",false]].map(([l,v,s,c,bar])=>(
                <div key={l} style={{background:"#f8fafc",borderRadius:10,padding:10,textAlign:"center"}}>
                  <div style={{fontSize:9,color:"#94a3b8",fontWeight:600,marginBottom:6}}>{l}</div>
                  <div style={{fontSize:15,fontWeight:800,color:c,marginBottom:3}}>{v}</div>
                  <div style={{fontSize:9,color:c}}>{s}</div>
                  {bar&&<div style={{height:4,background:"#e5e7eb",borderRadius:2,marginTop:6,overflow:"hidden"}}><div style={{height:"100%",width:res.rsi+"%",background:rsiC,borderRadius:2}}/></div>}
                </div>
              ))}
            </div>
          </div>
          {/* S/R */}
          <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:16,padding:16,marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:10}}>🧲 Support &amp; Resistance</div>
            {[["RESIST 2",res.sr.r2,"#dc2626",90],["RESIST 1",res.sr.r1,"#dc2626",72],["CURRENT",res.price,"#3b82f6",55],["SUPPORT 1",res.sr.s1,"#16a34a",37],["SUPPORT 2",res.sr.s2,"#16a34a",18]].map(([l,v,c,w])=>(
              <div key={l} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{fontSize:9,fontWeight:700,padding:"3px 7px",borderRadius:5,minWidth:68,textAlign:"center",background:c+"18",color:c}}>{l}</span>
                <span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,flex:1,color:c}}>{fP(v)}</span>
                <div style={{flex:2,height:5,background:"#f1f5f9",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:w+"%",background:c,borderRadius:2,opacity:.4}}/></div>
              </div>
            ))}
          </div>
          <button onClick={addTrade} style={{width:"100%",background:"linear-gradient(135deg,#16a34a,#15803d)",border:"none",borderRadius:13,padding:14,color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",marginBottom:8}}>
            ➕ Trade Tracker मध्ये Add करा
          </button>
          <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:12,padding:"10px 14px",marginBottom:20}}>
            <p style={{fontSize:10,color:"#92400e",lineHeight:1.7}}>⚠️ हे tool मार्गदर्शनासाठी आहे. Trading मध्ये risk असतो. Final decision नेहमी तुमचा.</p>
          </div>
        </div>}
      </div>}

      {/* TRACKER */}
      {tab==="tracker"&&<div style={{padding:"14px 14px 0"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          {[[actT,"Active","#3b82f6","#eff6ff"],[hitT,"🎯 Target Hit","#16a34a","#f0fdf4"],[stpT,"🛑 Stop Loss","#dc2626","#fef2f2"]].map(([v,l,c,bg])=>(
            <div key={l} style={{background:bg,border:"1px solid "+c+"30",borderRadius:12,padding:12,textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:800,color:c}}>{v}</div>
              <div style={{fontSize:10,color:"#64748b",fontWeight:600}}>{l}</div>
            </div>
          ))}
        </div>
        {clsT.length>0&&<div style={{background:totPnL>=0?"#f0fdf4":"#fef2f2",border:"1px solid "+(totPnL>=0?"#bbf7d0":"#fecaca"),borderRadius:12,padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:13,fontWeight:700,color:"#374151"}}>Total P&amp;L</span>
          <span style={{fontSize:16,fontWeight:800,color:totPnL>=0?"#16a34a":"#dc2626"}}>{totPnL>=0?"+":""}{fI(Math.abs(totPnL))}</span>
        </div>}
        {trades.length===0?
          <div style={{background:"#fff",borderRadius:16,border:"1px solid #e5e7eb",padding:40,textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:12}}>📊</div>
            <div style={{fontSize:16,fontWeight:700,color:"#374151",marginBottom:6}}>कोणताही Trade नाही</div>
            <div style={{fontSize:13,color:"#94a3b8",marginBottom:16}}>Analyse tab मधून trade add करा</div>
            <button onClick={()=>setTab("analyse")} style={{background:"#3b82f6",border:"none",borderRadius:10,padding:"10px 20px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Analyse करा →</button>
          </div>:
          <div>
            {actT>0&&<div style={{fontSize:12,fontWeight:700,color:"#94a3b8",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Active Trades</div>}
            {trades.filter(t=>t.status==="ACTIVE").map(t=><TradeCard key={t.id} trade={t} onUpdate={updTrade} lp={prices}/>)}
            {clsT.length>0&&<div style={{fontSize:12,fontWeight:700,color:"#94a3b8",marginTop:12,marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Closed Trades</div>}
            {clsT.map(t=><TradeCard key={t.id} trade={t} onUpdate={updTrade} lp={prices}/>)}
          </div>
        }
        <div style={{height:30}}/>
      </div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
