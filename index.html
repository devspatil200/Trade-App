<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Futures Saathi Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#ffffff;
  --bg2:#f5f6fa;
  --card:#ffffff;
  --border:#eef0f5;
  --blue:#3b6ef8;
  --green:#0ecb81;
  --red:#f6465d;
  --yellow:#f0b90b;
  --text:#1a1d2e;
  --sub:#8a8fa8;
  --dark:#0d1117;
}
body{background:var(--bg2);font-family:'DM Sans',sans-serif;min-height:100vh;color:var(--text);max-width:420px;margin:0 auto;position:relative;overflow-x:hidden}
button,input,select{font-family:'DM Sans',sans-serif;border:none;outline:none;background:none;cursor:pointer}

/* STATUS BAR MOCK */
.status-bar{background:#fff;padding:10px 16px 0;display:flex;justify-content:space-between;align-items:center}
.status-time{font-size:12px;font-weight:600;color:var(--text)}
.status-icons{font-size:11px;color:var(--text);font-family:'DM Mono',monospace}

/* TOP NAV */
.top-nav{background:#fff;padding:8px 16px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.nav-avatar{width:34px;height:34px;background:var(--bg2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.nav-toggle{display:flex;background:var(--bg2);border-radius:20px;padding:3px}
.nav-toggle-btn{padding:5px 16px;border-radius:17px;font-size:13px;font-weight:600;color:var(--sub);transition:.2s}
.nav-toggle-btn.active{background:#fff;color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.nav-actions{display:flex;gap:10px}
.nav-icon-btn{width:32px;height:32px;background:var(--bg2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;position:relative}
.notif-dot{position:absolute;top:6px;right:6px;width:6px;height:6px;background:var(--red);border-radius:50%}

/* SCROLL CONTENT */
.scroll-body{overflow-y:auto;padding-bottom:80px}

/* PNL STRIP */
.pnl-strip{background:#fff;padding:8px 16px;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--sub);border-bottom:1px solid var(--border)}
.pnl-val{color:var(--green);font-weight:700;font-family:'DM Mono',monospace}

/* QUICK ACTIONS */
.quick-actions{background:#fff;padding:14px 16px 6px;display:grid;grid-template-columns:repeat(5,1fr);gap:0}
.qa-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:6px 0}
.qa-icon{width:44px;height:44px;background:var(--bg2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:2px}
.qa-label{font-size:10px;font-weight:600;color:var(--sub)}

/* ADD FUNDS */
.add-funds-row{padding:10px 16px;display:flex;gap:10px}
.add-btn{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:11px;font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:center;gap:6px}
.add-btn span{font-size:15px}

/* BANNER */
.banner{margin:0 16px 14px;background:linear-gradient(135deg,#1e2dd4,#0a1580);border-radius:16px;padding:16px;color:#fff;display:flex;align-items:center;justify-content:space-between}
.banner-text{font-size:15px;font-weight:700;line-height:1.4}
.banner-sub{font-size:11px;opacity:.75;margin-top:2px}
.banner-btn{background:#fff;color:#1e2dd4;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;white-space:nowrap}
.banner-icon{font-size:32px;margin-right:10px}

/* SECTION HEADER */
.sec-head{padding:6px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.sec-title{font-size:16px;font-weight:800;color:var(--text)}
.sec-link{font-size:12px;color:var(--blue);font-weight:600}

/* EXPERT PICKS */
.picks-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 16px 12px;scrollbar-width:none}
.picks-scroll::-webkit-scrollbar{display:none}
.pick-card{flex-shrink:0;width:170px;background:#fff;border-radius:16px;padding:14px;border:1px solid var(--border);box-shadow:0 1px 6px rgba(0,0,0,.04)}
.pick-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pick-avatar{width:32px;height:32px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--text)}
.pick-name{font-size:14px;font-weight:800}
.pick-chip{border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700}
.pick-chip.long{background:var(--green);color:#fff}
.pick-chip.short{background:var(--red);color:#fff}
.pick-chip.wait{background:var(--yellow);color:#000}
.pick-row{display:flex;justify-content:space-between;margin-bottom:4px}
.pick-label{font-size:10px;color:var(--sub);font-weight:500}
.pick-val{font-size:11px;font-weight:600;font-family:'DM Mono',monospace}
.pick-profit{background:#e6faf3;border-radius:8px;padding:6px 10px;margin-top:8px;font-size:12px;font-weight:700;color:var(--green)}
.pick-profit.negative{background:#fef0f2;color:var(--red)}
.pick-profit.neutral{background:#fff8e6;color:#c88a00}

/* MOVERS TABS */
.movers-tabs{display:flex;gap:0;padding:0 16px;border-bottom:1px solid var(--border);background:#fff;overflow-x:auto;scrollbar-width:none}
.movers-tabs::-webkit-scrollbar{display:none}
.mover-tab{padding:10px 14px;font-size:13px;font-weight:600;color:var(--sub);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.mover-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.mover-filter{margin-left:auto;background:var(--bg2);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:4px;flex-shrink:0}

/* MOVER LIST */
.mover-list{background:#fff;padding:4px 16px}
.mover-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.mover-row:last-child{border-bottom:none}
.mover-avatar{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;margin-right:12px;font-family:'DM Mono',monospace;flex-shrink:0;position:relative}
.lev-badge{position:absolute;bottom:-2px;right:-2px;background:var(--dark);color:#fff;border-radius:4px;font-size:7px;font-weight:700;padding:1px 3px;font-family:'DM Mono',monospace}
.mover-name{font-weight:700;font-size:13px}
.mover-sub{font-size:10px;color:var(--sub);font-family:'DM Mono',monospace;margin-top:1px}
.mover-price{font-weight:700;font-size:13px;font-family:'DM Mono',monospace}
.mover-chg{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;font-family:'DM Mono',monospace}
.mover-chg.up{background:#e6faf3;color:var(--green)}
.mover-chg.down{background:#fef0f2;color:var(--red)}

/* === INVEST TAB === */
.invest-seg{display:flex;gap:8px;padding:14px 16px 0}
.iseg-btn{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:10px;font-size:12px;font-weight:700;color:var(--sub);transition:.2s}
.iseg-btn.active{border-color:var(--blue);color:var(--blue);background:#eef3ff}

/* COIN LIST (Invest) */
.coin-list{background:#fff;border-radius:0;overflow:hidden;margin-top:12px}
.coin-list-head{display:flex;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border)}
.cl-title{font-size:13px;font-weight:700;color:var(--text)}
.cl-sort{font-size:11px;color:var(--blue);font-weight:600;display:flex;align-items:center;gap:3px}
.cl-row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.1s}
.cl-row:last-child{border-bottom:none}
.cl-row:active{background:var(--bg2)}
.cl-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;margin-right:12px;flex-shrink:0;font-family:'DM Mono',monospace}
.cl-name{font-weight:700;font-size:14px}
.cl-sym{font-size:11px;color:var(--sub);margin-top:1px}
.cl-usd{font-weight:700;font-size:14px;font-family:'DM Mono',monospace}
.cl-chg{font-size:12px;font-weight:600;font-family:'DM Mono',monospace;margin-top:2px}

/* === FUTURES TAB === */
.futures-banner{margin:14px 16px;background:linear-gradient(135deg,#0d1117,#1a2235);border-radius:16px;padding:16px;color:#fff}
.fb-title{font-size:16px;font-weight:800;margin-bottom:4px}
.fb-sub{font-size:11px;opacity:.6;margin-bottom:12px}
.fb-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fb-stat{background:rgba(255,255,255,.07);border-radius:10px;padding:10px;text-align:center}
.fb-stat-val{font-size:14px;font-weight:800;font-family:'DM Mono',monospace}
.fb-stat-label{font-size:9px;opacity:.5;margin-top:2px;letter-spacing:.5px}

/* ANALYSE PANEL */
.analyse-panel{margin:0 16px 12px;background:#fff;border-radius:16px;padding:16px;border:1px solid var(--border)}
.ap-title{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text)}
.ap-coins{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none}
.ap-coins::-webkit-scrollbar{display:none}
.ap-coin{flex-shrink:0;background:var(--bg2);border:1.5px solid var(--border);border-radius:20px;padding:5px 13px;font-size:11px;font-weight:600;color:var(--sub);white-space:nowrap;font-family:'DM Mono',monospace;transition:.15s}
.ap-coin.active{border-color:var(--blue);color:var(--blue);background:#eef3ff}
.ap-fields{display:flex;gap:8px;margin-bottom:10px}
.ap-field{flex:1}
.ap-label{font-size:9px;color:var(--sub);font-weight:600;letter-spacing:.5px;margin-bottom:4px;font-family:'DM Mono',monospace}
.ap-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace}
.ap-input:focus{border-color:var(--blue)}
.ap-select{width:100%;appearance:none;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace}
.tt-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.tt-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center;transition:.15s}
.tt-card.active{border-color:var(--blue);background:#eef3ff}
.tt-icon{font-size:14px;margin-bottom:2px}
.tt-name{font-size:10px;font-weight:700;color:var(--sub)}
.tt-name.active-text{color:var(--blue)}
.tt-sub{font-size:9px;color:var(--sub);opacity:.7}
.analyse-btn{width:100%;background:var(--blue);border-radius:11px;padding:14px;color:#fff;font-size:14px;font-weight:800;letter-spacing:.3px;transition:.15s}
.analyse-btn:disabled{background:#c5cde8;cursor:not-allowed}
.analyse-btn:active:not(:disabled){transform:scale(.98)}

/* RESULT */
.result-wrap{margin:0 16px}
.price-card{background:#fff;border-radius:14px;padding:14px;border:1px solid var(--border);margin-bottom:10px}
.pc-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.pc-coin{font-size:20px;font-weight:800}
.pc-lev{background:#eef3ff;color:var(--blue);border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700;margin-left:6px;font-family:'DM Mono',monospace}
.pc-type{font-size:10px;color:var(--sub);margin-top:3px;font-family:'DM Mono',monospace}
.pc-price{font-size:22px;font-weight:800;text-align:right;font-family:'DM Mono',monospace}
.pc-chg{font-size:12px;font-weight:600;text-align:right;margin-top:2px;font-family:'DM Mono',monospace}
.pc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.pc-stat{background:var(--bg2);border-radius:8px;padding:8px;text-align:center}
.pcs-label{font-size:9px;color:var(--sub);font-weight:600;letter-spacing:.5px;margin-bottom:3px;font-family:'DM Mono',monospace}
.pcs-val{font-size:11px;font-weight:800;font-family:'DM Mono',monospace}

/* SIGNAL CARD */
.signal-card{border-radius:14px;padding:16px;margin-bottom:10px;border:2px solid}
.signal-card.long{background:#f0fdf8;border-color:#0ecb81}
.signal-card.short{background:#fff5f6;border-color:#f6465d}
.signal-card.wait{background:#fffdf0;border-color:#f0b90b}
.sc-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.sc-emoji{font-size:40px}
.sc-action{font-size:26px;font-weight:800;letter-spacing:.5px}
.sc-conf{font-size:10px;color:var(--sub);font-family:'DM Mono',monospace;margin-top:2px}
.sc-bars{display:flex;gap:3px;margin-top:4px}
.sc-bar{width:18px;height:5px;background:var(--border);border-radius:3px}
.sc-bar.g{background:var(--green)}
.sc-bar.r{background:var(--red)}
.sc-bar.y{background:var(--yellow)}
.ai-text{background:rgba(0,0,0,.03);border-radius:10px;padding:11px 12px;font-size:13px;line-height:1.8;color:#444}

/* LEVELS */
.levels-card{background:#fff;border-radius:14px;padding:14px;border:1px solid var(--border);margin-bottom:10px}
.lc-title{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.8px;margin-bottom:10px;font-family:'DM Mono',monospace}
.levels-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lv-box{background:var(--bg2);border-radius:10px;padding:11px;text-align:center}
.lv-label{font-size:9px;color:var(--sub);font-weight:600;letter-spacing:.5px;margin-bottom:4px;font-family:'DM Mono',monospace}
.lv-usd{font-size:15px;font-weight:800;font-family:'DM Mono',monospace}
.lv-inr{font-size:9px;color:var(--sub);margin-top:2px;font-family:'DM Mono',monospace}

/* RISK */
.risk-card{background:#fff;border-radius:14px;padding:14px;border:1px solid var(--border);margin-bottom:10px}
.rr-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.rr-row:last-child{border-bottom:none}
.rr-label{font-size:11px;color:var(--sub);font-family:'DM Mono',monospace}
.rr-val{font-size:13px;font-weight:700;font-family:'DM Mono',monospace}
.rr-bar{height:7px;background:var(--bg2);border-radius:4px;overflow:hidden;display:flex;gap:2px;margin-top:8px}
.rr-loss{flex:1;background:var(--red);opacity:.6;border-radius:3px}
.rr-profit{flex:2;background:var(--green);opacity:.6;border-radius:3px}

/* ADD TRADE */
.add-trade-btn{width:100%;background:var(--green);border-radius:12px;padding:14px;color:#fff;font-size:14px;font-weight:800;margin-bottom:8px;letter-spacing:.3px}
.warn-strip{background:#fffdf0;border:1px solid #f0e080;border-radius:10px;padding:10px 12px;margin-bottom:16px;font-size:10px;color:#9a7a00;line-height:1.7;font-family:'DM Mono',monospace}

/* INDICATORS */
.ind-card{background:#fff;border-radius:14px;padding:14px;border:1px solid var(--border);margin-bottom:10px}
.ind-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.ind-box{background:var(--bg2);border-radius:10px;padding:10px;text-align:center}
.ind-label{font-size:9px;color:var(--sub);font-weight:600;letter-spacing:.5px;margin-bottom:5px;font-family:'DM Mono',monospace}
.ind-val{font-size:16px;font-weight:800;font-family:'DM Mono',monospace;margin-bottom:2px}
.ind-sub{font-size:9px;font-family:'DM Mono',monospace}
.rsi-track{height:4px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden}
.rsi-fill{height:100%;border-radius:2px}

/* SR */
.sr-card{background:#fff;border-radius:14px;padding:14px;border:1px solid var(--border);margin-bottom:10px}
.sr-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sr-tag{font-size:9px;font-weight:700;padding:3px 7px;border-radius:4px;min-width:60px;text-align:center;font-family:'DM Mono',monospace}
.sr-price{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;flex:1}
.sr-track{flex:2;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
.sr-bar{height:100%;border-radius:2px;opacity:.45}

/* === TRACKER === */
.tracker-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:14px 16px}
.ts-box{background:#fff;border-radius:12px;padding:12px;text-align:center;border:1px solid var(--border)}
.ts-num{font-size:22px;font-weight:800;font-family:'DM Mono',monospace}
.ts-label{font-size:9px;color:var(--sub);letter-spacing:.5px;margin-top:2px}
.pnl-total-row{margin:0 16px 12px;background:#fff;border-radius:12px;padding:12px 16px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.pnl-t-label{font-size:13px;font-weight:700}
.pnl-t-val{font-size:16px;font-weight:800;font-family:'DM Mono',monospace}

/* TRADE CARD */
.trade-card{background:#fff;border-radius:14px;padding:14px;border:1px solid var(--border);margin:0 16px 10px}
.tc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tc-side{border-radius:6px;padding:3px 10px;font-size:11px;font-weight:800;font-family:'DM Mono',monospace}
.tc-side.long{background:#e6faf3;color:var(--green)}
.tc-side.short{background:#fef0f2;color:var(--red)}
.tc-coin{font-weight:800;font-size:15px;margin:0 6px}
.tc-lev{background:#eef3ff;color:var(--blue);border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace}
.tc-status{border-radius:5px;padding:3px 8px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace}
.tc-levels{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.tcl-box{background:var(--bg2);border-radius:7px;padding:7px;text-align:center}
.tcl-label{font-size:8px;color:var(--sub);font-weight:600;letter-spacing:.3px;margin-bottom:2px;font-family:'DM Mono',monospace}
.tcl-val{font-size:11px;font-weight:800;font-family:'DM Mono',monospace}
.tc-pnl{display:flex;justify-content:space-between;align-items:center;border-radius:8px;padding:9px 12px;margin-bottom:8px}
.tc-actions{display:flex;gap:6px}
.tc-inp{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;color:var(--text);font-family:'DM Mono',monospace}
.tc-upd{background:var(--blue);border-radius:7px;padding:7px 10px;font-size:11px;font-weight:700;color:#fff}
.tc-cls{background:var(--bg2);border-radius:7px;padding:7px 10px;font-size:11px;font-weight:700;color:var(--sub)}

/* EMPTY */
.empty-box{background:#fff;border-radius:14px;border:1px solid var(--border);padding:40px;text-align:center;margin:0 16px}
.empty-icon-big{font-size:40px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:800;margin-bottom:6px}
.empty-sub{font-size:12px;color:var(--sub);margin-bottom:16px;font-family:'DM Mono',monospace}
.empty-cta{background:var(--blue);border-radius:10px;padding:10px 20px;color:#fff;font-size:13px;font-weight:700}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:#fff;border-top:1px solid var(--border);display:flex;padding:8px 0 16px;z-index:200}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;position:relative}
.bn-icon{font-size:20px;line-height:1}
.bn-label{font-size:10px;font-weight:600;color:var(--sub)}
.bn-label.active{color:var(--blue)}
.bn-dot{position:absolute;top:2px;right:calc(50% - 14px);width:6px;height:6px;background:var(--red);border-radius:50%}
.bn-active-bar{position:absolute;bottom:-8px;width:20px;height:3px;background:var(--blue);border-radius:2px}

/* LOADING */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top:2px solid #fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;margin-right:6px}

/* LIVE BADGE */
.live-chip{display:flex;align-items:center;gap:4px;background:#e6faf3;border-radius:20px;padding:3px 9px;font-size:10px;font-weight:700;color:var(--green)}
.live-pulse{width:6px;height:6px;background:var(--green);border-radius:50%;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.refresh-chip{display:flex;align-items:center;gap:4px;background:var(--bg2);border-radius:8px;padding:4px 9px;font-size:10px;font-weight:600;color:var(--sub);font-family:'DM Mono',monospace}

<script type="text/babel" data-presets="react">
const {useState,useEffect,useCallback,useRef} = React;

const FUT_COINS = ["BTC","ETH","SOL","BNB","XRP","DOGE","ADA","AVAX","LINK","MATIC"];
const INVEST_COINS = ["BTC","ETH","BNB","SOL","XRP","DOGE","ADA","TAO"];
const LEV_OPTS = [2,5,10,20,25,50];
const COIN_IDS = {BTC:"bitcoin",ETH:"ethereum",SOL:"solana",BNB:"binance-coin",XRP:"xrp",DOGE:"dogecoin",ADA:"cardano",AVAX:"avalanche-2",LINK:"chainlink",MATIC:"matic-network",TAO:"bittensor",PAXG:"pax-gold"};
const COIN_COLORS = {BTC:"#f7931a",ETH:"#627eea",SOL:"#9945ff",BNB:"#f3ba2f",XRP:"#00aae4",DOGE:"#c2a633",ADA:"#0033ad",AVAX:"#e84142",LINK:"#2a5ada",MATIC:"#8247e5",TAO:"#333",PAXG:"#c8a83a"};
const COIN_FULL = {BTC:"Bitcoin",ETH:"Ethereum",SOL:"Solana",BNB:"Binance Coin",XRP:"XRP",DOGE:"Dogecoin",ADA:"Cardano",AVAX:"Avalanche",LINK:"Chainlink",MATIC:"Polygon",TAO:"Bittensor",PAXG:"PAX Gold"};

function fP(p){if(!p)return"--";if(p>=1000)return"$"+Math.round(p).toLocaleString();if(p>=1)return"$"+p.toFixed(2);return"$"+p.toFixed(5);}
function fI(u){if(u==null)return"--";const n=u*84;if(n>=10000000)return"₹"+(n/10000000).toFixed(2)+"Cr";if(n>=100000)return"₹"+(n/100000).toFixed(2)+"L";if(n>=1000)return"₹"+Math.round(n).toLocaleString("en-IN");return"₹"+n.toFixed(2);}
function fINR(n){if(n>=10000000)return"₹"+(n/10000000).toFixed(2)+"Cr";if(n>=100000)return"₹"+(n/100000).toFixed(2)+"L";if(n>=1000)return"₹"+Math.round(n).toLocaleString("en-IN");return"₹"+Math.abs(n).toFixed(0);}
function fPct(v){if(v==null)return"--";return(v>=0?"+":"")+Number(v).toFixed(2)+"%";}

async function fetchPrice(coin){
  const id=COIN_IDS[coin]||coin.toLowerCase();
  try{const r=await fetch("https://api.coincap.io/v2/assets/"+id,{signal:AbortSignal.timeout(3500)});if(r.ok){const d=await r.json();if(d?.data?.priceUsd)return{p:parseFloat(d.data.priceUsd),c:parseFloat(d.data.changePercent24Hr||0)};}}catch(e){}
  try{const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${id}&vs_currencies=usd&include_24hr_change=true`,{signal:AbortSignal.timeout(4500)});if(r.ok){const d=await r.json();if(d?.[id]?.usd)return{p:d[id].usd,c:d[id].usd_24h_change||0};}}catch(e){}
  return null;
}

function calcSignal(price,chg){
  const rsi=Math.min(85,Math.max(15,Math.round(50+chg*3.8)));
  const ema20=price*(1-chg*0.003);
  const macd=chg*price*0.0001;
  const v=Math.max(Math.abs(chg)/100,0.012);
  const sr={s1:price*(1-v*1.2),s2:price*(1-v*2.5),r1:price*(1+v*1.2),r2:price*(1+v*2.5)};
  let action,conf,confPct,trend,reason;
  if(rsi<28){action="LONG";conf="HIGH";confPct=82+Math.floor(Math.random()*10);trend="OVERSOLD";reason="RSI oversold — bounce expected";}
  else if(rsi>72){action="SHORT";conf="HIGH";confPct=78+Math.floor(Math.random()*10);trend="OVERBOUGHT";reason="RSI overbought — pullback likely";}
  else if(chg>2&&price>ema20){action="LONG";conf="MEDIUM";confPct=60+Math.floor(Math.random()*12);trend="UPTREND";reason="Bullish momentum above EMA20";}
  else if(chg<-2&&price<ema20){action="SHORT";conf="MEDIUM";confPct=58+Math.floor(Math.random()*12);trend="DOWNTREND";reason="Bearish momentum below EMA20";}
  else if(chg>0.8){action="LONG";conf="LOW";confPct=45+Math.floor(Math.random()*12);trend="WEAK BULL";reason="Mild upward pressure";}
  else if(chg<-0.8){action="SHORT";conf="LOW";confPct=43+Math.floor(Math.random()*12);trend="WEAK BEAR";reason="Mild downward pressure";}
  else{action="WAIT";conf="LOW";confPct=30+Math.floor(Math.random()*15);trend="SIDEWAYS";reason="No clear signal — market consolidating";}
  const ep=price,sl=action==="LONG"?sr.s1:action==="SHORT"?sr.r1:sr.s1;
  const risk=Math.abs(ep-sl);
  const t1=action==="LONG"?ep+risk*2:action==="SHORT"?ep-risk*2:ep+risk*2;
  const t2=action==="LONG"?ep+risk*3.5:action==="SHORT"?ep-risk*3.5:ep+risk*3.5;
  return{rsi,ema20,macd,sr,action,conf,confPct,trend,reason,ep,sl,t1,t2,risk,price};
}

// Expert picks data (mock based on real signals)
const EXPERT_PICKS_BASE = [
  {coin:"BTC",side:"LONG",lev:15,entry:86500,validTill:"22 Apr '26",expectedProfit:28},
  {coin:"ETH",side:"SHORT",lev:5,entry:1640,validTill:"23 Apr '26",expectedProfit:44},

];

function TradeCard({trade,onUpdate,livePrices}){
  const[mp,setMp]=useState("");
  const cur=livePrices?.[trade.coin]?.p||trade.currentPrice||trade.entry;
  const pnlPct=trade.side==="LONG"?(cur-trade.entry)/trade.entry*100*trade.leverage:(trade.entry-cur)/trade.entry*100*trade.leverage;
  const pnlINR=trade.capital*pnlPct/100;
  let status=trade.status;
  if(status==="ACTIVE"){if(trade.side==="LONG"){if(cur>=trade.t1)status="TARGET HIT";else if(cur<=trade.sl)status="STOP LOSS";}else{if(cur<=trade.t1)status="TARGET HIT";else if(cur>=trade.sl)status="STOP LOSS";}}
  const isHit=status==="TARGET HIT"||status==="STOP LOSS";
  const stStyle=status==="TARGET HIT"?{color:"#0ecb81",background:"#e6faf3"}:status==="STOP LOSS"?{color:"#f6465d",background:"#fef0f2"}:{color:"#3b6ef8",background:"#eef3ff"};
  const stLabel=status==="TARGET HIT"?"🎯 TARGET HIT":status==="STOP LOSS"?"🛑 STOP LOSS":"● ACTIVE";
  return(
    <div className="trade-card">
      <div className="tc-head">
        <div style={{display:"flex",alignItems:"center"}}>
          <span className={`tc-side ${trade.side==="LONG"?"long":"short"}`}>{trade.side}</span>
          <span className="tc-coin">{trade.coin}</span>
          <span className="tc-lev">{trade.leverage}x</span>
        </div>
        <span className="tc-status" style={stStyle}>{stLabel}</span>
      </div>
      <div className="tc-levels">
        {[["ENTRY",trade.entry,"#3b6ef8"],["STOP LOSS",trade.sl,"#f6465d"],["TARGET",trade.t1,"#0ecb81"]].map(([l,v,c])=>(
          <div className="tcl-box" key={l}>
            <div className="tcl-label">{l}</div>
            <div className="tcl-val" style={{color:c}}>{fP(v)}</div>
          </div>
        ))}
      </div>
      <div className="tc-pnl" style={{background:pnlPct>=0?"#f0fdf8":"#fff5f6",border:`1px solid ${pnlPct>=0?"#b7f0d8":"#fdd0d5"}`}}>
        <div>
          <div style={{fontSize:9,color:"var(--sub)",fontFamily:"'DM Mono',monospace",marginBottom:2}}>P&L {livePrices?.[trade.coin]?"(LIVE)":""}</div>
          <div style={{fontSize:15,fontWeight:800,color:pnlPct>=0?"#0ecb81":"#f6465d",fontFamily:"'DM Mono',monospace"}}>{pnlPct>=0?"+":""}{pnlPct.toFixed(2)}% ({pnlINR>=0?"+":""}{fINR(Math.abs(pnlINR))})</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:9,color:"var(--sub)",fontFamily:"'DM Mono',monospace",marginBottom:2}}>CURRENT</div>
          <div style={{fontSize:13,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{fP(cur)}</div>
        </div>
      </div>
      {!isHit&&trade.status==="ACTIVE"&&(
        <div className="tc-actions">
          <input className="tc-inp" type="number" placeholder="Manual price" value={mp} onChange={e=>setMp(e.target.value)}/>
          <button className="tc-upd" onClick={()=>{if(mp){onUpdate(trade.id,{currentPrice:parseFloat(mp)});setMp("");}}}>Update</button>
          <button className="tc-cls" onClick={()=>onUpdate(trade.id,{status:"CLOSED"})}>Close</button>
        </div>
      )}
    </div>
  );
}

        const ad=await ar.json();

      }catch(e){setAiTxt(fallback(s,coin));}
      setAiLoad(false);
    }catch(e){alert(e.message);setLoading(false);}
  }

  function fallback(s,c){
    if(s.action==="LONG")return`${c} खरेदीची संधी दिसत आहे. RSI ${s.rsi} — oversold zone जवळ. Entry ${fP(s.ep)} जवळ घ्या, Stop Loss ${fP(s.sl)} ठेवा. Target ${fP(s.t1)} पर्यंत नजर ठेवा.`;
    if(s.action==="SHORT")return`${c} overbought दिसत आहे. RSI ${s.rsi}. Short entry ${fP(s.ep)}, SL ${fP(s.sl)}. Target ${fP(s.t1)}.`;
    return`${c} sideways आहे. Signal येईपर्यंत थांबा. RSI ${s.rsi} neutral zone मध्ये.`;
  }

    if(!res)return;
    const t={id:Date.now(),coin,side:res.action==="SHORT"?"SHORT":"LONG",entry:res.ep,sl:res.sl,t1:res.t1,t2:res.t2,capital:cap,leverage:lev,status:"ACTIVE",currentPrice:res.ep};
    setTrades(p=>[t,...p]);setTab("tracker");
  }
  function updTrade(id,u){setTrades(p=>p.map(t=>t.id===id?{...t,...u}:t));}

  const actT=trades.filter(t=>t.status==="ACTIVE").length;
  const hitT=trades.filter(t=>t.status==="TARGET HIT").length;
  const stpT=trades.filter(t=>t.status==="STOP LOSS").length;

  const confBars=res?Math.ceil((res.confPct||50)/25):0;

  // portfolio PNL mock

          <span style={{marginLeft:"auto",cursor:"pointer"}}>✏️</span>
        </div>

        {/* QUICK ACTIONS */}
        <div className="quick-actions">
          {[["📈","SIP"],["📊","Markets"],["🌐","Global\nFutures"],["⚡","Futures"],["···","More"]].map(([ic,lb])=>(

        {/* Analyse panel */}
        <div className="analyse-panel">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div className="ap-title" style={{marginBottom:0}}>⚡ Futures Analyse</div>
            <div className="live-chip">
              {refreshing?<span style={{width:6,height:6,border:"1.5px solid #0ecb81",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .7s linear infinite",display:"inline-block"}}/>:<span className="live-pulse"/>}
              {lastRef?lastRef.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"LIVE"}
            </div>
          </div>

          {/* Coin pills */}
          <div className="ap-coins">
            {FUT_COINS.map(c=>{
              const pr=prices[c];
              return(
                <button key={c} className={`ap-coin ${coin===c?"active":""}`} onClick={()=>setCoin(c)}>
                  {c}{pr?" "+fP(pr.p):""}
                </button>
              );
            })}
          </div>

          {/* Fields */}
          <div className="ap-fields">
            <div className="ap-field">
              <div className="ap-label">CAPITAL (INR)</div>
              <input className="ap-input" type="number" value={cap} onChange={e=>setCap(parseFloat(e.target.value)||50000)}/>
            </div>
            <div className="ap-field">
              <div className="ap-label">LEVERAGE</div>
              <select className="ap-select" value={lev} onChange={e=>setLev(parseInt(e.target.value))}>
                {LEV_OPTS.map(l=><option key={l} value={l}>{l}x</option>)}
              </select>
            </div>
          </div>
          <div className="tt-row">
            {[["swing","🔄","Swing","2-5 Days"],["intraday","⚡","Intraday","Today"],["positional","📅","Hold","Weeks"]].map(([t,ic,nm,sb])=>(
              <button key={t} className={`tt-card ${tt===t?"active":""}`} onClick={()=>setTt(t)}>
                <div className="tt-icon">{ic}</div>
                <div className={`tt-name ${tt===t?"active-text":""}`}>{nm}</div>
                <div className="tt-sub">{sb}</div>
              </button>
            ))}
          </div>
          <button className="analyse-btn" onClick={analyse} disabled={loading}>
            {loading?<><span className="spinner"/>विश्लेषण होत आहे...</>:`⚡ ${coin} Analyse करा`}
          </button>
        </div>

        {/* Results */}
        {res&&<div className="result-wrap">
          {/* Price card */}
          <div className="price-card">
            <div className="pc-row">
              <div>
                <div style={{display:"flex",alignItems:"center"}}>
                  <span className="pc-coin">{coin}/USDT</span>
                  <span className="pc-lev">{lev}x</span>
                </div>
                <div className="pc-type">{tt.toUpperCase()} · FUTURES</div>
              </div>
              <div>
                <div className="pc-price">{fP(res.price)}</div>
                <div className="pc-chg" style={{color:res.chg>=0?"#0ecb81":"#f6465d"}}>{fPct(res.chg)} 24h</div>
              </div>
            </div>
            <div className="pc-grid">
              {[["INR VALUE",fI(res.price),"#3b6ef8"],["RSI (14)",res.rsi+(res.rsi<30?" 🟢":res.rsi>70?" 🔴":" 🟡"),rsiColor],["TREND",res.trend,sigColor]].map(([l,v,c])=>(
                <div className="pc-stat" key={l}>
                  <div className="pcs-label">{l}</div>
                  <div className="pcs-val" style={{color:c}}>{v}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Signal */}
          <div className={`signal-card ${sigClass}`}>
            <div className="sc-top">
              <div className="sc-emoji">{res.action==="LONG"?"🟢":res.action==="SHORT"?"🔴":"🟡"}</div>
              <div>
                <div className="sc-action" style={{color:sigColor}}>{res.action==="LONG"?"LONG करा":res.action==="SHORT"?"SHORT करा":"थांबा"}</div>
                <div className="sc-conf">{res.conf} · {res.confPct}% CONFIDENCE</div>
                <div className="sc-bars">{[1,2,3,4].map(i=><div key={i} className={`sc-bar ${i<=confBars?barCls:""}`}/>)}</div>
              </div>
            </div>
            <div className="ai-text">{aiLoad?"⏳ AI analysis होत आहे...":aiTxt||res.reason}</div>
          </div>

          {/* Levels */}
          <div className="levels-card">
            <div className="lc-title">📍 ENTRY · SL · TARGETS</div>
            <div className="levels-grid">
              {[["ENTRY PRICE",res.ep,"#3b6ef8"],["STOP LOSS 🛡",res.sl,"#f6465d"],["TARGET 1 🎯",res.t1,"#0ecb81"],["TARGET 2 🚀",res.t2,"#9c5cfa"]].map(([l,v,c])=>(
                <div className="lv-box" key={l}>
                  <div className="lv-label">{l}</div>
                  <div className="lv-usd" style={{color:c}}>{fP(v)}</div>
                  <div className="lv-inr">{fI(v)}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Risk */}
          <div className="risk-card">
            <div style={{fontSize:12,fontWeight:700,color:"var(--sub)",letterSpacing:.8,marginBottom:4,fontFamily:"'DM Mono',monospace"}}>💰 RISK CALC · {lev}x LEVERAGE</div>
            {[["Capital",fINR(cap),"var(--text)"],["Max Risk (2%)",fINR(res.maxLoss),"#f6465d"],["Min Profit (T1)",fINR(res.maxLoss*2),"#0ecb81"],["Max Profit (T2)",fINR(res.maxLoss*3.5),"#9c5cfa"],["Qty",res.qty+" units","#3b6ef8"]].map(([l,v,c])=>(
              <div className="rr-row" key={l}><span className="rr-label">{l}</span><span className="rr-val" style={{color:c}}>{v}</span></div>
            ))}
            <div className="rr-bar"><div className="rr-loss"/><div className="rr-profit"/></div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:9,color:"var(--sub)",fontFamily:"'DM Mono',monospace"}}>
              <span>LOSS 1x</span><span>PROFIT 2x — 1:2 RR</span>
            </div>
          </div>

          {/* Indicators */}
          <div className="ind-card">
            <div style={{fontSize:12,fontWeight:700,color:"var(--sub)",letterSpacing:.8,marginBottom:10,fontFamily:"'DM Mono',monospace"}}>📊 INDICATORS</div>
            <div className="ind-grid">
              <div className="ind-box">
                <div className="ind-label">RSI (14)</div>
                <div className="ind-val" style={{color:rsiColor}}>{res.rsi}</div>
                <div className="ind-sub" style={{color:rsiColor}}>{res.rsi<30?"Oversold":res.rsi>70?"Overbought":"Neutral"}</div>
                <div className="rsi-track"><div className="rsi-fill" style={{width:res.rsi+"%",background:rsiColor}}/></div>
              </div>
              <div className="ind-box">
                <div className="ind-label">MACD</div>
                <div className="ind-val" style={{color:res.macd>0?"#0ecb81":"#f6465d",fontSize:12}}>{(res.macd>0?"+":"")+res.macd.toFixed(3)}</div>
                <div className="ind-sub" style={{color:res.macd>0?"#0ecb81":"#f6465d"}}>{res.macd>0?"Positive":"Negative"}</div>
              </div>
              <div className="ind-box">
                <div className="ind-label">EMA 20</div>
                <div className="ind-val" style={{fontSize:10,color:res.price>res.ema20?"#0ecb81":"#f6465d"}}>{fP(res.ema20)}</div>
                <div className="ind-sub" style={{color:res.price>res.ema20?"#0ecb81":"#f6465d"}}>{res.price>res.ema20?"↑ Above":"↓ Below"}</div>
              </div>
            </div>
          </div>

          {/* S/R */}
          <div className="sr-card">
            <div style={{fontSize:12,fontWeight:700,color:"var(--sub)",letterSpacing:.8,marginBottom:10,fontFamily:"'DM Mono',monospace"}}>🧲 SUPPORT & RESISTANCE</div>
            {[["R2",res.sr.r2,"#f6465d",90],["R1",res.sr.r1,"#f6465d",70],["NOW",res.price,"#3b6ef8",55],["S1",res.sr.s1,"#0ecb81",37],["S2",res.sr.s2,"#0ecb81",18]].map(([l,v,c,w])=>(
              <div className="sr-row" key={l}>
                <span className="sr-tag" style={{background:c+"18",color:c}}>{l}</span>
                <span className="sr-price" style={{color:c}}>{fP(v)}</span>
                <div className="sr-track"><div className="sr-bar" style={{width:w+"%",background:c}}/></div>
              </div>
            ))}
          </div>

          <button className="add-trade-btn" onClick={addTrade}>➕ Trade Tracker मध्ये Add करा</button>
          <div className="warn-strip">⚠️ हे tool फक्त मार्गदर्शनासाठी. Trading मध्ये risk असतो. Final decision नेहमी तुमचाच असतो.</div>
        </div>}
      </>}

      {/* ========== TRACKER ========== */}
      {tab==="tracker"&&<>
        <div className="tracker-stats">
          <div className="ts-box"><div className="ts-num" style={{color:"#3b6ef8"}}>{actT}</div><div className="ts-label">ACTIVE</div></div>
          <div className="ts-box"><div className="ts-num" style={{color:"#0ecb81"}}>{hitT}</div><div className="ts-label">TARGET HIT</div></div>
          <div className="ts-box"><div className="ts-num" style={{color:"#f6465d"}}>{stpT}</div><div className="ts-label">STOP LOSS</div></div>
        </div>
        {clsT.length>0&&(
          <div className="pnl-total-row">
            <span className="pnl-t-label">Total P&L</span>
            <span className="pnl-t-val" style={{color:totPnL>=0?"#0ecb81":"#f6465d"}}>{totPnL>=0?"+":""}{fINR(Math.abs(totPnL))}</span>
          </div>
        )}
        {trades.length===0?(
          <div className="empty-box">
            <div className="empty-icon-big">📊</div>
            <div className="empty-title">कोणताही Trade नाही</div>
            <div className="empty-sub">Futures tab मधून trade add करा</div>
            <button className="empty-cta" onClick={()=>setTab("futures")}>⚡ Futures Analyse →</button>
          </div>
        ):<>
          {actT>0&&<div style={{padding:"0 16px",marginBottom:6,fontSize:11,fontWeight:700,color:"var(--sub)",letterSpacing:.5,fontFamily:"'DM Mono',monospace"}}>ACTIVE TRADES</div>}
          {trades.filter(t=>t.status==="ACTIVE").map(t=><TradeCard key={t.id} trade={t} onUpdate={updTrade} livePrices={prices}/>)}
          {clsT.length>0&&<div style={{padding:"8px 16px 6px",fontSize:11,fontWeight:700,color:"var(--sub)",letterSpacing:.5,fontFamily:"'DM Mono',monospace"}}>CLOSED TRADES</div>}
          {clsT.map(t=><TradeCard key={t.id} trade={t} onUpdate={updTrade} livePrices={prices}/>)}
        </>}
      </>}

      </div>{/* scroll-body end */}

      {/* BOTTOM NAV */}
      <div className="bottom-nav">
        {[["home","🏠","Home"],["invest","📈","Invest"],["futures","⚡","Futures"],["options","🔀","Options"],["tracker","📊","Portfolio"]].map(([t,ic,lb])=>(
          <button key={t} className="bn-item" onClick={()=>setTab(t)}>
            <span className="bn-icon">{ic}</span>
            <span className={`bn-label ${tab===t?"active":""}`}>{lb}{t==="futures"&&actT>0?` (${actT})`:""}</span>
            {tab===t&&<span className="bn-active-bar"/>}
            {t==="futures"&&actT>0&&<span className="bn-dot"/>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
