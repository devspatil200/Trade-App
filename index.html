<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trading Saathi – Live Crypto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+Devanagari:wght@400;500;700;800&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    :root {
      --bg:      #04101f;
      --bg2:     #071628;
      --panel:   #0b1f35;
      --panel2:  #0e2440;
      --border:  rgba(0,168,255,0.12);
      --border2: rgba(0,168,255,0.22);
      --cyan:    #00c8ff;
      --cyan2:   #0099cc;
      --gold:    #f5c542;
      --buy:     #00e676;
      --sell:    #ff4757;
      --hold:    #ffa502;
      --purple:  #bd93f9;
      --text1:   #e8f4fd;
      --text2:   #7eb8d4;
      --text3:   #3d6a8a;
      --mono:    'JetBrains Mono', monospace;

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    @keyframes live-dot {
      0%,100% { opacity:1; transform:scale(1); box-shadow:0 0 0 0 rgba(0,230,118,0.5); }
      50%      { opacity:.8; transform:scale(1.2); box-shadow:0 0 0 5px rgba(0,230,118,0); }
    }
    @keyframes shimmer-btn {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes ticker-scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes glow-buy  { 0%,100%{box-shadow:0 0 12px rgba(0,230,118,0.3)} 50%{box-shadow:0 0 24px rgba(0,230,118,0.6)} }
    @keyframes glow-sell { 0%,100%{box-shadow:0 0 12px rgba(255,71,87,0.3)}  50%{box-shadow:0 0 24px rgba(255,71,87,0.6)} }
    @keyframes badge-pop {
      0%   { transform: scale(0.6); opacity:0; }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1); opacity:1; }
    }
    .fade-up  { animation: fadeUp 0.4s ease forwards; }
    .badge-anim { animation: badge-pop 0.35s ease forwards; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const DEFAULT_COINS = ["BTC","ETH","SOL","BNB","XRP"];
const USD_INR = 83.5;
const MAX_HISTORY = 30;

function getBinanceSym(c) { return c.toUpperCase() + "USDT"; }

function fP(p) {
  if (!p && p!==0) return "$--";
  if (p>=1000) return "$"+Math.round(p).toLocaleString("en-US");
  if (p>=1)    return "$"+Number(p).toFixed(2);
  return "$"+Number(p).toFixed(4);
}
function fINR(usd) {
  const n = usd*USD_INR;
  if (n>=10000000) return "₹"+(n/10000000).toFixed(2)+" Cr";
  if (n>=100000)   return "₹"+(n/100000).toFixed(2)+" L";
  return "₹"+Math.round(n).toLocaleString("en-IN");
}
function fRs(a) { return "₹"+Math.abs(Math.round(a)).toLocaleString("en-IN"); }
function fTime(ts) {
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0")+":"+d.getSeconds().toString().padStart(2,"0");
}

function calcRSI(chg) { return Math.min(83,Math.max(17,Math.round(50+chg*3.5))); }
function rsiStatus(rsi) {
  if (rsi < 30) return "BUY";
  if (rsi > 70) return "SELL";
  return "NEUTRAL";
}

function calcLevels(price,chg,type) {
  const vol = Math.max(Math.abs(chg)/100,0.008);
  const m   = type==="intraday"?0.7:type==="positional"?1.8:1.2;
  const v   = vol*m;
  return { s2:price*(1-v*3.2), s1:price*(1-v*1.6), r1:price*(1+v*1.6), r2:price*(1+v*3.2) };
}

function getSignal(rsi,chg,price,ema20) {
  if (rsi<30)                  return {signal:"BUY",  confidence:"HIGH",   trend:"BULLISH"};
  if (rsi>70)                  return {signal:"SELL", confidence:"HIGH",   trend:"BEARISH"};
  if (chg>2  && price>ema20)   return {signal:"BUY",  confidence:"MEDIUM", trend:"BULLISH"};
  if (chg<-2 && price<ema20)   return {signal:"SELL", confidence:"MEDIUM", trend:"BEARISH"};
  if (chg>0.5)                 return {signal:"BUY",  confidence:"LOW",    trend:"SIDEWAYS"};
  if (chg<-0.5)                return {signal:"HOLD", confidence:"LOW",    trend:"SIDEWAYS"};
  return                              {signal:"HOLD", confidence:"LOW",    trend:"SIDEWAYS"};
}

function fallback(signal,coin,rsi,sl,t1) {
  if (signal==="BUY")  return `${coin} खरेदीसाठी चांगली संधी आहे. RSI ${rsi} Oversold zone मध्ये आहे. Stop Loss ${sl} वर ठेवा.`;
  if (signal==="SELL") return `${coin} Overbought zone मध्ये आहे (RSI ${rsi}). Stop Loss ${sl} वर ठेवा.`;
  return `${coin} सध्या Sideways आहे. RSI ${rsi} Normal zone मध्ये आहे. Strong signal येईपर्यंत थांबा.`;
}

/* ── Web Audio beep ── */
function playBeep(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const freqs = type === "BUY" ? [880, 1100] : [440, 330];
    freqs.forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = "sine";
      const start = ctx.currentTime + i * 0.18;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.35, start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.16);
      osc.start(start); osc.stop(start + 0.18);
    });
  } catch(e) {}
}

/* ── localStorage helpers ── */
function loadCoins() {
  try { const s = localStorage.getItem("ts_coins"); return s ? JSON.parse(s) : DEFAULT_COINS; }
  catch { return DEFAULT_COINS; }
}
function saveCoins(arr) { localStorage.setItem("ts_coins", JSON.stringify(arr)); }
function loadHistory() {
  try { const s = localStorage.getItem("ts_history"); return s ? JSON.parse(s) : []; }
  catch { return []; }
}
function saveHistory(arr) { localStorage.setItem("ts_history", JSON.stringify(arr.slice(0, MAX_HISTORY))); }

/* ── RSI Gauge ── */
function RSIGauge({value, color}) {
  const r=26, cx=34, cy=34, circ=2*Math.PI*r, arc=circ*0.75;
  const fill = arc*((value-17)/(83-17));
  return (
    <svg width={68} height={54} style={{display:"block",margin:"0 auto"}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth={5}
        strokeDasharray={`${arc} ${circ}`} strokeLinecap="round" transform={`rotate(135 ${cx} ${cy})`}/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={5}
        strokeDasharray={`${fill} ${circ}`} strokeLinecap="round" transform={`rotate(135 ${cx} ${cy})`}
        style={{filter:`drop-shadow(0 0 4px ${color})`}}/>
      <text x={cx} y={cy+5} textAnchor="middle" fill={color} fontSize={13} fontWeight="700" fontFamily="var(--mono)">{value}</text>
    </svg>
  );
}

/* ── Settings Modal ── */
function SettingsModal({onClose}) {
  const [key,setKey]     = useState(localStorage.getItem("groq_key")||"");
  const [saved,setSaved] = useState(false);
  function save() {
    localStorage.setItem("groq_key",key.trim());
    setSaved(true);
    setTimeout(()=>{setSaved(false);onClose();},800);
  }
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(4,16,31,0.94)",backdropFilter:"blur(10px)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div className="fade-up" style={{background:"linear-gradient(145deg,#0d2440,#0b1f35)",border:"1px solid rgba(0,200,255,0.25)",borderRadius:24,padding:28,width:"100%",maxWidth:380,boxShadow:"0 24px 64px rgba(0,0,0,0.7)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <div style={{fontFamily:"var(--head)",fontSize:22,fontWeight:700,color:"var(--cyan)",letterSpacing:2}}>⚙ SETTINGS</div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.05)",border:"1px solid var(--border)",width:34,height:34,borderRadius:9,color:"var(--text2)",fontSize:16,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--mono)",marginBottom:8,textTransform:"uppercase",letterSpacing:3}}>Groq API Key</div>
        <input type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="gsk_..."
          style={{width:"100%",background:"rgba(0,0,0,0.35)",border:"1px solid var(--border2)",borderRadius:12,padding:"13px 14px",color:"var(--text1)",fontFamily:"var(--mono)",fontSize:13,outline:"none",marginBottom:10,letterSpacing:2}}/>
        <div style={{fontSize:10,color:"var(--text3)",marginBottom:20,lineHeight:1.8,fontFamily:"var(--mono)"}}>
          🔐 Key फक्त तुमच्या phone मध्येच save होते<br/>
          Free key: <span style={{color:"var(--cyan)"}}>console.groq.com</span>
        </div>
        <button onClick={save} style={{width:"100%",background:saved?"var(--buy)":"linear-gradient(135deg,var(--cyan),var(--cyan2))",border:"none",borderRadius:12,padding:15,color:"#000",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"var(--head)",letterSpacing:2,transition:"all 0.3s"}}>
          {saved?"✅ SAVED!":"💾 SAVE करा"}
        </button>
      </div>
    </div>
  );
}

/* ── Add Coin Modal ── */
function AddCoinModal({existingCoins, onAdd, onClose}) {
  const [sym,setSym]         = useState("");
  const [status,setStatus]   = useState("idle"); // idle | checking | ok | error
  const [errMsg,setErrMsg]   = useState("");

  async function check() {
    const s = sym.toUpperCase().trim();
    if (!s) return;
    if (existingCoins.includes(s)) { setErrMsg(s+" आधीच list मध्ये आहे."); setStatus("error"); return; }
    setStatus("checking"); setErrMsg("");
    try {
      const r = await fetch("https://api.binance.com/api/v3/ticker/price?symbol="+s+"USDT");
      if (!r.ok) throw new Error();
      const d = await r.json();
      if (!d.price) throw new Error();
      setStatus("ok");
    } catch {
      setErrMsg(s+" Binance वर मिळाला नाही. Symbol तपासा (उदा. SOL, ADA, MATIC).");
      setStatus("error");
    }
  }

  function add() {
    const s = sym.toUpperCase().trim();
    onAdd(s);
    onClose();
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(4,16,31,0.94)",backdropFilter:"blur(10px)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div className="fade-up" style={{background:"linear-gradient(145deg,#0d2440,#0b1f35)",border:"1px solid rgba(0,200,255,0.25)",borderRadius:24,padding:28,width:"100%",maxWidth:380,boxShadow:"0 24px 64px rgba(0,0,0,0.7)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <div style={{fontFamily:"var(--head)",fontSize:22,fontWeight:700,color:"var(--cyan)",letterSpacing:2}}>➕ COIN ADD करा</div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.05)",border:"1px solid var(--border)",width:34,height:34,borderRadius:9,color:"var(--text2)",fontSize:16,cursor:"pointer"}}>✕</button>
        </div>

        <div style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--mono)",marginBottom:8,textTransform:"uppercase",letterSpacing:3}}>Coin Symbol</div>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <input
            value={sym}
            onChange={e=>{setSym(e.target.value.toUpperCase());setStatus("idle");setErrMsg("");}}
            onKeyDown={e=>e.key==="Enter"&&check()}
            placeholder="उदा. ADA, DOGE, MATIC"
            maxLength={10}
            style={{flex:1,background:"rgba(0,0,0,0.35)",border:"1px solid "+(status==="ok"?"var(--buy)":status==="error"?"var(--sell)":"var(--border2)"),borderRadius:12,padding:"13px 14px",color:"var(--text1)",fontFamily:"var(--mono)",fontSize:14,outline:"none",textTransform:"uppercase",letterSpacing:2}}
          />
          <button onClick={check} disabled={!sym.trim()||status==="checking"}
            style={{background:"rgba(0,200,255,0.1)",border:"1px solid var(--border2)",borderRadius:12,padding:"0 16px",color:"var(--cyan)",fontFamily:"var(--head)",fontSize:13,fontWeight:700,cursor:"pointer",letterSpacing:1,whiteSpace:"nowrap"}}>
            {status==="checking"?"...":"CHECK"}
          </button>
        </div>

        {status==="error" && <div style={{fontSize:11,color:"var(--sell)",fontFamily:"var(--mono)",marginBottom:12,lineHeight:1.7}}>⚠ {errMsg}</div>}
        {status==="ok"    && <div style={{fontSize:11,color:"var(--buy)",fontFamily:"var(--mono)",marginBottom:12}}>✅ {sym.toUpperCase()} Binance वर उपलब्ध आहे!</div>}

        <div style={{fontSize:10,color:"var(--text3)",marginBottom:18,lineHeight:1.8,fontFamily:"var(--mono)"}}>
          Binance वर उपलब्ध कोणताही coin add करता येतो.<br/>
          उदा: ADA, DOGE, MATIC, AVAX, LINK, DOT, TRX
        </div>

        <button onClick={add} disabled={status!=="ok"}
          style={{width:"100%",background:status==="ok"?"linear-gradient(135deg,var(--buy),#00b050)":"rgba(255,255,255,0.04)",border:"none",borderRadius:12,padding:15,color:status==="ok"?"#000":"var(--text3)",fontSize:15,fontWeight:800,cursor:status==="ok"?"pointer":"not-allowed",fontFamily:"var(--head)",letterSpacing:2,transition:"all 0.3s"}}>
          {status==="ok"?"✅ LIST मध्ये ADD करा":"आधी CHECK करा"}
        </button>
      </div>
    </div>
  );
}

/* ── Call History Panel ── */
function HistoryPanel({history, onClear, onClose}) {
  const sigColor = s => s==="BUY"?"var(--buy)":s==="SELL"?"var(--sell)":"var(--hold)";
  const sigBg    = s => s==="BUY"?"rgba(0,230,118,0.08)":s==="SELL"?"rgba(255,71,87,0.08)":"rgba(255,165,2,0.08)";
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(4,16,31,0.92)",backdropFilter:"blur(10px)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:"0 0 0 0"}}>
      <div className="fade-up" style={{background:"linear-gradient(180deg,#0d2440,#0b1f35)",border:"1px solid rgba(0,200,255,0.2)",borderRadius:"24px 24px 0 0",width:"100%",maxWidth:480,maxHeight:"75vh",display:"flex",flexDirection:"column",boxShadow:"0 -16px 48px rgba(0,0,0,0.6)"}}>
        {/* Header */}
        <div style={{padding:"18px 20px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid var(--border)",flexShrink:0}}>
          <div>
            <div style={{fontFamily:"var(--head)",fontSize:20,fontWeight:700,color:"var(--cyan)",letterSpacing:2}}>📋 CALL HISTORY</div>
            <div style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--mono)",marginTop:3,letterSpacing:1}}>{history.length} CALLS LOGGED</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            {history.length>0&&(
              <button onClick={onClear} style={{background:"rgba(255,71,87,0.08)",border:"1px solid rgba(255,71,87,0.25)",borderRadius:9,padding:"6px 12px",color:"var(--sell)",fontSize:11,cursor:"pointer",fontFamily:"var(--mono)"}}>CLEAR</button>
            )}
            <button onClick={onClose} style={{background:"rgba(255,255,255,0.05)",border:"1px solid var(--border)",width:34,height:34,borderRadius:9,color:"var(--text2)",fontSize:16,cursor:"pointer"}}>✕</button>
          </div>
        </div>

        {/* List */}
        <div style={{overflowY:"auto",flex:1,padding:"12px 16px"}}>
          {history.length===0?(
            <div style={{textAlign:"center",padding:"40px 0",color:"var(--text3)",fontFamily:"var(--mono)",fontSize:12}}>
              <div style={{fontSize:32,marginBottom:12}}>📭</div>
              अजून कोणताही call नाही.<br/>विश्लेषण केल्यावर इथे दिसेल.
            </div>
          ):(
            history.map((item,i)=>(
              <div key={i} style={{background:sigBg(item.signal),border:"1px solid "+(item.signal==="BUY"?"rgba(0,230,118,0.2)":item.signal==="SELL"?"rgba(255,71,87,0.2)":"rgba(255,165,2,0.2)"),borderLeft:"3px solid "+sigColor(item.signal),borderRadius:12,padding:"10px 14px",marginBottom:7,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    <span style={{fontFamily:"var(--head)",fontSize:16,fontWeight:700,color:"var(--text1)",letterSpacing:1}}>{item.coin}</span>
                    <span style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:700,color:sigColor(item.signal),background:sigBg(item.signal),border:"1px solid "+sigColor(item.signal),padding:"2px 7px",borderRadius:5,letterSpacing:1}}>{item.signal}</span>
                    {item.source==="auto"&&<span style={{fontSize:8,color:"var(--text3)",fontFamily:"var(--mono)",background:"rgba(255,255,255,0.04)",border:"1px solid var(--border)",padding:"2px 5px",borderRadius:4}}>AUTO</span>}
                  </div>
                  <div style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)"}}>
                    {item.price&&<span style={{color:"var(--text2)",marginRight:8}}>{fP(item.price)}</span>}
                    RSI {item.rsi} · {item.tradeType||"—"}
                  </div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:12,color:"var(--text2)",fontFamily:"var(--mono)",fontWeight:700}}>{fTime(item.ts)}</div>
                  <div style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--mono)",marginTop:2}}>{new Date(item.ts).toLocaleDateString("en-IN")}</div>
                </div>
              </div>
            ))
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   MAIN APP
══════════════════════════════════════ */
function App() {
  const [coins,        setCoins]        = useState(loadCoins);
  const [coin,         setCoin]         = useState(() => loadCoins()[0] || "BTC");
  const [tradeType,    setTradeType]    = useState("swing");
  const [capital,      setCapital]      = useState(50000);
  const [prices,       setPrices]       = useState({});
  const [rsiMap,       setRsiMap]       = useState({});   // rsi per coin
  const [prevRsiMap,   setPrevRsiMap]   = useState({});   // for crossing detection
  const [result,       setResult]       = useState(null);
  const [loading,      setLoading]      = useState(false);
  const [aiLoading,    setAiLoading]    = useState(false);
  const [error,        setError]        = useState("");
  const [aiAnalysis,   setAiAnalysis]   = useState("");
  const [showSettings, setShowSettings] = useState(false);
  const [showAddCoin,  setShowAddCoin]  = useState(false);
  const [showHistory,  setShowHistory]  = useState(false);
  const [history,      setHistory]      = useState(loadHistory);
  const [hasKey,       setHasKey]       = useState(!!localStorage.getItem("groq_key"));
  const [soundOn,      setSoundOn]      = useState(true);
  const audioUnlocked = useRef(false);

  /* Unlock audio on first tap */
  function unlockAudio() {
    if (audioUnlocked.current) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const buf = ctx.createBuffer(1,1,22050);
      const src = ctx.createBufferSource();
      src.buffer = buf; src.connect(ctx.destination); src.start(0);
      audioUnlocked.current = true;
    } catch {}
  }

  /* Add call to history */
  function addToHistory(entry) {
    setHistory(prev => {
      const next = [entry, ...prev].slice(0, MAX_HISTORY);
      saveHistory(next);
      return next;
    });
  }

  /* Price fetch */
  const loadPrice = useCallback(async (c) => {
    try {
      const r = await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol="+getBinanceSym(c));
      if (!r.ok) throw new Error();
      const d = await r.json();
      const pr = {p:parseFloat(d.lastPrice), c:parseFloat(d.priceChangePercent)};
      const rsi = calcRSI(pr.c);
      setPrices(prev=>({...prev,[c]:pr}));
      setRsiMap(prev => {
        const oldRsi = prev[c];
        const newMap = {...prev,[c]:rsi};
        /* Auto signal detection — only on RSI threshold crossing */
        if (oldRsi !== undefined) {
          const wasNeutral = oldRsi >= 30 && oldRsi <= 70;
          const nowBuy  = rsi < 30;
          const nowSell = rsi > 70;
          if (wasNeutral && nowBuy) {
            const entry = {coin:c, signal:"BUY",  rsi, price:pr.p, ts:Date.now(), source:"auto"};
            setTimeout(()=>{
              addToHistory(entry);
              if (soundOn) playBeep("BUY");
            },0);
          } else if (wasNeutral && nowSell) {
            const entry = {coin:c, signal:"SELL", rsi, price:pr.p, ts:Date.now(), source:"auto"};
            setTimeout(()=>{
              addToHistory(entry);
              if (soundOn) playBeep("SELL");
            },0);
          }
        }
        return newMap;
      });
      return pr;
    } catch {}
    try {
      const r2 = await fetch("https://api.coincap.io/v2/assets/"+c.toLowerCase());
      if (!r2.ok) throw new Error();
      const d2 = await r2.json();
      if (d2?.data?.priceUsd) {
        const pr = {p:parseFloat(d2.data.priceUsd), c:parseFloat(d2.data.changePercent24Hr||0)};
        const rsi = calcRSI(pr.c);
        setPrices(prev=>({...prev,[c]:pr}));
        setRsiMap(prev=>({...prev,[c]:rsi}));
        return pr;
      }
    } catch {}
    return null;
  },[soundOn]);

  useEffect(()=>{
    coins.forEach(c=>loadPrice(c));
    const t = setInterval(()=>coins.forEach(c=>loadPrice(c)),60000);
    return ()=>clearInterval(t);
  },[coins, loadPrice]);

  /* Add coin */
  function handleAddCoin(sym) {
    const next = [...coins, sym];
    setCoins(next);
    saveCoins(next);
    setCoin(sym);
    setTimeout(()=>loadPrice(sym), 200);
  }

  /* Delete coin */
  function handleDeleteCoin(sym) {
    if (coins.length <= 1) return;
    const next = coins.filter(c=>c!==sym);
    setCoins(next);
    saveCoins(next);
    if (coin===sym) setCoin(next[0]);
  }

  /* Main analysis */
  async function analyse() {
    unlockAudio();
    const groqKey = localStorage.getItem("groq_key");
    if (!groqKey) { setShowSettings(true); return; }
    setLoading(true); setError(""); setResult(null); setAiAnalysis("");
    try {
      const pr = await loadPrice(coin);
      if (!pr) throw new Error(coin+" price मिळाला नाही. Internet तपासा.");
      const price=pr.p, chg=pr.c;
      const rsi   = calcRSI(chg);
      const ema20 = price*(1-chg*0.003);
      const macd  = chg*price*0.0001;
      const lv    = calcLevels(price,chg,tradeType);
      const {signal,confidence,trend} = getSignal(rsi,chg,price,ema20);
      const ep=price, sl=signal==="SELL"?lv.r1:lv.s1, t1=signal==="SELL"?lv.s1:lv.r1, t2=signal==="SELL"?lv.s2:lv.r2;
      const slPct     = ((Math.abs(ep-sl)/ep)*100).toFixed(2);
      const t1Pct     = ((Math.abs(t1-ep)/ep)*100).toFixed(2);
      const t2Pct     = ((Math.abs(t2-ep)/ep)*100).toFixed(2);
      const rr        = Math.abs(ep-sl)>0?(Math.abs(t1-ep)/Math.abs(ep-sl)).toFixed(1):"N/A";
      const qty       = (capital/(ep*USD_INR)).toFixed(6);
      const riskAmt   = capital*parseFloat(slPct)/100;
      const profitAmt = capital*parseFloat(t1Pct)/100;
      setResult({price,chg,rsi,ema20,macd,lv,signal,confidence,trend,ep,sl,t1,t2,slPct,t1Pct,t2Pct,rr,qty,riskAmt,profitAmt});
      setLoading(false);

      /* Sound + History for manual analysis */
      if (signal==="BUY"||signal==="SELL") {
        if (soundOn) playBeep(signal);
        addToHistory({coin, signal, rsi, price, tradeType, ts:Date.now(), source:"manual"});
      }

      setAiLoading(true);
      const tLbl = tradeType==="swing"?"Swing (2-5 दिवस)":tradeType==="intraday"?"Intraday (आजच)":"Positional (1-4 आठवडे)";
      const prompt = `तुम्ही expert crypto trading analyst आहात. ${coin} साठी ${tLbl} विश्लेषण फक्त मराठीत 3-4 वाक्यांत लिहा.\nCoin:${coin} Price:${fP(price)} 24h:${chg.toFixed(2)}% RSI:${rsi} Signal:${signal}(${confidence})\nEntry:${fP(ep)} SL:${fP(sl)}(-${slPct}%) T1:${fP(t1)}(+${t1Pct}%) R:R=1:${rr}\nEMA20: price ${price>ema20?"वर (Bullish)":"खाली (Bearish)"}\nफक्त मराठीत उत्तर द्या:`;
      try {
        const res  = await fetch("https://api.groq.com/openai/v1/chat/completions",{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+groqKey},
          body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:300,messages:[{role:"user",content:prompt}]})
        });
        const data = await res.json();
        setAiAnalysis(data?.choices?.[0]?.message?.content||fallback(signal,coin,rsi,fP(sl),fP(t1)));
      } catch { setAiAnalysis(fallback(signal,coin,rsi,fP(sl),fP(t1))); }
      setAiLoading(false);
    } catch(e) { setError(e.message||"Error आला."); setLoading(false); }
  }

      {result&&(
        <div className="fade-up" style={{padding:"0 14px"}}>

                <div style={{display:"flex",alignItems:"center",gap:10,color:"var(--text3)"}}>
                  <span>⏳</span>
                  <span style={{fontFamily:"var(--mono)",fontSize:12}}>AI विश्लेषण होत आहे...</span>
                </div>
              ):(
                <div style={{fontSize:13,lineHeight:2,color:"var(--text1)"}}>{aiAnalysis}</div>
              )}
            </div>
          </div>

          {/* TRADE PLAN */}
          <div style={{background:"var(--panel)",border:"1px solid var(--border)",borderRadius:20,padding:18,marginBottom:10}}>
            <div style={{fontFamily:"var(--head)",fontSize:11,color:"var(--text3)",letterSpacing:3,marginBottom:14}}>📊 TRADE PLAN</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              {[
                ["🎯 ENTRY",    fP(result.ep),  fINR(result.ep),                                         "var(--cyan)"],
                ["🛡 STOP LOSS", fP(result.sl),  "-"+result.slPct+"% · "+fRs(result.riskAmt)+" RISK",     "var(--sell)"],
                ["🎯 TARGET 1",  fP(result.t1),  "+"+result.t1Pct+"% · "+fRs(result.profitAmt)+" PROFIT", "var(--buy)"],
                ["🚀 TARGET 2",  fP(result.t2),  "+"+result.t2Pct+"% · EXTENDED",                         "var(--purple)"],
              ].map(([l,v,s,c])=>(
                <div key={l} style={{background:"var(--panel2)",border:"1px solid var(--border)",borderRadius:14,padding:14,textAlign:"center",borderTop:"2px solid "+c}}>
                  <div style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:1,marginBottom:7}}>{l}</div>
                  <div style={{fontFamily:"var(--mono)",fontSize:17,fontWeight:700,color:c}}>{v}</div>
                  <div style={{fontSize:9,color:"var(--text3)",marginTop:5,fontFamily:"var(--mono)"}}>{s}</div>
                </div>
              ))}
            </div>
            <div style={{background:"linear-gradient(135deg,rgba(0,200,255,0.05),rgba(0,200,255,0.02))",border:"1px solid var(--border)",borderRadius:14,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:1}}>RISK : REWARD</div>
                <div style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)",marginTop:3}}>Capital ₹{capital.toLocaleString("en-IN")}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"var(--mono)",fontSize:22,fontWeight:700,color:"var(--gold)"}}>1 : {result.rr}</div>
                <div style={{fontSize:11,color:"var(--cyan)",fontFamily:"var(--mono)",marginTop:3}}>{result.qty} coins घ्या</div>
              </div>
            </div>
          </div>

          {/* INDICATORS */}
          <div style={{background:"var(--panel)",border:"1px solid var(--border)",borderRadius:20,padding:18,marginBottom:10}}>
            <div style={{fontFamily:"var(--head)",fontSize:11,color:"var(--text3)",letterSpacing:3,marginBottom:14}}>⚡ LIVE INDICATORS</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              <div style={{background:"var(--panel2)",border:"1px solid var(--border)",borderRadius:14,padding:"14px 8px",textAlign:"center"}}>
                <div style={{fontSize:8,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:1,marginBottom:4}}>RSI (14)</div>
                <RSIGauge value={result.rsi} color={rsiC}/>
                <div style={{fontSize:9,color:rsiC,fontFamily:"var(--mono)",marginTop:4}}>{result.rsi<30?"OVERSOLD":result.rsi>70?"OVERBOUGHT":"NORMAL"}</div>
              </div>
              <div style={{background:"var(--panel2)",border:"1px solid var(--border)",borderRadius:14,padding:"14px 8px",textAlign:"center",display:"flex",flexDirection:"column",justifyContent:"center"}}>
                <div style={{fontSize:8,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:1,marginBottom:10}}>MACD</div>
                <div style={{fontFamily:"var(--mono)",fontSize:18,fontWeight:700,color:result.macd>0?"var(--buy)":"var(--sell)"}}>{result.macd>0?"+":""}{result.macd.toFixed(2)}</div>
                <div style={{fontSize:9,color:result.macd>0?"var(--buy)":"var(--sell)",fontFamily:"var(--mono)",marginTop:8}}>{result.macd>0?"POSITIVE":"NEGATIVE"}</div>
              </div>
              <div style={{background:"var(--panel2)",border:"1px solid var(--border)",borderRadius:14,padding:"14px 8px",textAlign:"center",display:"flex",flexDirection:"column",justifyContent:"center"}}>
                <div style={{fontSize:8,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:1,marginBottom:10}}>EMA 20</div>
                <div style={{fontFamily:"var(--mono)",fontSize:13,fontWeight:700,color:result.price>result.ema20?"var(--buy)":"var(--sell)"}}>{fP(result.ema20)}</div>
                <div style={{fontSize:9,color:result.price>result.ema20?"var(--buy)":"var(--sell)",fontFamily:"var(--mono)",marginTop:8}}>{result.price>result.ema20?"ABOVE ↑":"BELOW ↓"}</div>
              </div>
            </div>
          </div>

          {/* S&R */}
          <div style={{background:"var(--panel)",border:"1px solid var(--border)",borderRadius:20,padding:18,marginBottom:10}}>
            <div style={{fontFamily:"var(--head)",fontSize:11,color:"var(--text3)",letterSpacing:3,marginBottom:14}}>📏 SUPPORT & RESISTANCE</div>
            {[
              ["RESIST 2",fP(result.lv.r2),"var(--sell)",88,"rgba(255,71,87,0.45)"],
              ["RESIST 1",fP(result.lv.r1),"var(--sell)",66,"rgba(255,71,87,0.28)"],
              ["CURRENT", fP(result.price),"var(--cyan)",50,"var(--cyan)"],
              ["SUPPORT 1",fP(result.lv.s1),"var(--buy)",33,"rgba(0,230,118,0.45)"],
              ["SUPPORT 2",fP(result.lv.s2),"var(--buy)",14,"rgba(0,230,118,0.28)"],
            ].map(([l,v,c,w,bc])=>(
              <div key={l} style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
                <span style={{fontSize:8,fontWeight:700,fontFamily:"var(--mono)",padding:"3px 8px",borderRadius:6,minWidth:68,textAlign:"center",background:"rgba(0,0,0,0.3)",color:c,letterSpacing:1}}>{l}</span>
                <span style={{fontFamily:"var(--mono)",fontSize:13,fontWeight:700,flex:1,color:c}}>{v}</span>
                <div style={{flex:2,height:4,background:"rgba(255,255,255,0.04)",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:w+"%",background:bc,borderRadius:2,boxShadow:`0 0 6px ${bc}`}}/>
                </div>
              </div>
            ))}
          </div>

          {/* DISCLAIMER */}
          <div style={{background:"rgba(245,197,66,0.03)",border:"1px solid rgba(245,197,66,0.1)",borderRadius:14,padding:"12px 16px",marginBottom:10}}>
            <p style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--text3)",lineHeight:1.9}}>
              <strong style={{color:"var(--gold)"}}>⚠ सूचना:</strong> हे tool फक्त मार्गदर्शनासाठी आहे. Crypto trading मध्ये नेहमी risk असतो.{" "}
              <strong style={{color:"var(--gold)"}}>Final decision नेहमी तुमचा.</strong>
            </p>
          </div>

          <button onClick={()=>{setResult(null);setAiAnalysis("");window.scrollTo(0,0);}}
            style={{width:"100%",background:"transparent",border:"1px solid var(--border)",borderRadius:12,padding:14,color:"var(--text3)",fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:28,fontFamily:"var(--head)",letterSpacing:2}}>
            ↑ पुन्हा विश्लेषण करा
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
