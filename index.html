<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#ffffff">
<title>Trading Saathi Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#1e293b;min-height:100vh}
button,input,select{font-family:inherit;box-sizing:border-box}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .8s linear infinite}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.badge{border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700}
.btn{border:none;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer}
.btn-blue{background:#3b82f6;color:#fff}
.btn-green{background:#16a34a;color:#fff}
.btn-gray{background:#f3f4f6;color:#6b7280}
.tab-row{display:flex;background:#f1f5f9;border-radius:10px;padding:3px;gap:2px;margin-bottom:10px}
.tab-btn{flex:1;border:none;border-radius:8px;padding:8px 4px;font-size:11px;cursor:pointer;font-weight:500;color:#64748b;background:transparent}
.tab-btn.active{background:#fff;font-weight:700;color:#1e293b;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.seg-row{display:flex;gap:8px;margin-bottom:12px}
.seg-btn{flex:1;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #e5e7eb;background:#fff;color:#374151}
.seg-btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.pill-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.pill{flex-shrink:0;border:1px solid #e5e7eb;border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;background:#fff;color:#374151;white-space:nowrap;font-weight:500}
.pill.active{background:#3b82f6;color:#fff;border-color:#3b82f6;font-weight:700}
.meta-box{background:#f8fafc;border-radius:9px;padding:9px;text-align:center}
.meta-label{font-size:9px;color:#94a3b8;font-weight:600;margin-bottom:3px}
.meta-value{font-size:12px;font-weight:800}
.lv-box{background:#f8fafc;border:1px solid #e5e7eb;border-radius:11px;padding:12px;text-align:center}
.lv-label{font-size:9px;color:#94a3b8;font-weight:600;margin-bottom:5px}
.lv-value{font-size:15px;font-weight:800}
.lv-sub{font-size:9px;color:#94a3b8;margin-top:3px}
.ind-box{background:#f8fafc;border-radius:10px;padding:10px;text-align:center}
.sr-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sr-tag{font-size:9px;font-weight:700;padding:3px 7px;border-radius:5px;min-width:70px;text-align:center}
.rr-bar{display:flex;height:22px;border-radius:6px;overflow:hidden;gap:2px;margin-bottom:8px}
.rr-loss{flex:1;background:#fee2e2;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#dc2626}
.rr-profit{flex:2;background:#dcfce7;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#16a34a}
.inp{width:100%;border:1px solid #e5e7eb;border-radius:9px;padding:9px 12px;font-size:14px;font-weight:700;color:#1e293b;outline:none;background:#f8fafc}
.sel{width:100%;border:1px solid #e5e7eb;border-radius:9px;padding:9px 12px;font-size:14px;font-weight:700;color:#1e293b;outline:none;background:#f8fafc}
.big-btn{width:100%;border:none;border-radius:13px;padding:16px;color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-bottom:16px}
.add-btn{width:100%;background:linear-gradient(135deg,#16a34a,#15803d);border:none;border-radius:13px;padding:14px;color:#fff;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:8px}
.warn-box{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:10px 14px;margin-bottom:20px;font-size:10px;color:#92400e;line-height:1.7}
.stat-box{border-radius:12px;padding:12px;text-align:center}
.trade-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.pnl-row{display:flex;justify-content:space-between;align-items:center;border-radius:8px;padding:8px 12px;margin-bottom:8px}
.coinico{width:36px;height:36px;background:linear-gradient(135deg,#dbeafe,#ede9fe);border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#3b82f6;font-size:11px;margin-right:12px;flex-shrink:0}
.header{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 16px;position:sticky;top:0;z-index:50}
.logo{width:34px;height:34px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:800}
#app{max-width:480px;margin:0 auto}
.page{padding:14px 14px 0;display:none}
.page.active{display:block}
.tt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px}
.tt-btn{border-radius:9px;padding:9px 4px;cursor:pointer;text-align:center;border:1px solid #e5e7eb;background:#f8fafc;color:#6b7280}
.tt-btn.active{background:#eff6ff;border-color:#3b82f6;color:#1d4ed8}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:9px">
        <div class="logo">T</div>
        <div>
          <div style="font-size:16px;font-weight:800;color:#0f172a">Trading Saathi Pro</div>
          <div style="font-size:9px;color:#94a3b8">PROFESSIONAL TRADING TOOL</div>
        </div>
      </div>
      <div style="background:#dcfce7;color:#16a34a;border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700" id="liveTag">LIVE</div>
    </div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="showPage('market')">Market</button>
      <button class="tab-btn" onclick="showPage('analyse')">Analyse</button>
      <button class="tab-btn" id="trackerTab" onclick="showPage('tracker')">Tracker</button>
    </div>
  </div>

  <!-- MARKET PAGE -->
  <div id="page-market" class="page active">
    <div class="seg-row">
      <button class="seg-btn active" id="mSeg-SPOT" onclick="setMarketSeg('SPOT')">SPOT</button>
      <button class="seg-btn" id="mSeg-FUTURES" onclick="setMarketSeg('FUTURES')">FUTURES</button>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:12px 14px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;font-weight:700" id="mListTitle">SPOT Coins</span>
        <button class="btn btn-blue" style="font-size:11px;padding:4px 10px" onclick="toggleAddCoin()">+ Add</button>
      </div>
      <div id="addCoinRow" style="display:none;padding:10px 14px;background:#f8fafc;border-bottom:1px solid #f1f5f9">
        <div style="display:flex;gap:8px">
          <input id="newCoinInp" placeholder="Symbol (e.g. NEAR)" maxlength="10" style="flex:1;border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;outline:none" onkeydown="if(event.key==='Enter')doAddCoin()">
          <button class="btn btn-blue" onclick="doAddCoin()">Add</button>
          <button class="btn btn-gray" onclick="toggleAddCoin()">X</button>
        </div>
      </div>
      <div id="coinList"></div>
    </div>
    <div id="portfolioBox" style="display:none" class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">Portfolio</div>
      <div class="grid3" id="portfolioStats"></div>
    </div>
    <div style="height:30px"></div>
  </div>

  <!-- ANALYSE PAGE -->
  <div id="page-analyse" class="page">
    <div class="seg-row">
      <button class="seg-btn" id="aSeg-SPOT" onclick="setAnalyseSeg('SPOT')">SPOT</button>
      <button class="seg-btn active" id="aSeg-FUTURES" onclick="setAnalyseSeg('FUTURES')">FUTURES</button>
    </div>
    <div class="pill-row" id="coinPills"></div>
    <div class="card" style="margin-bottom:12px">
      <div class="grid2" style="margin-bottom:10px">
        <div>
          <div style="font-size:10px;color:#94a3b8;font-weight:600;margin-bottom:5px">CAPITAL (INR)</div>
          <input type="number" id="capInput" placeholder="Capital enter kara" class="inp" oninput="updateCapDisplay()">
          <div id="capHint" style="font-size:10px;color:#6b7280;margin-top:3px"></div>
        </div>
        <div id="levDiv">
          <div style="font-size:10px;color:#94a3b8;font-weight:600;margin-bottom:5px">LEVERAGE</div>
          <select id="levSelect" class="sel">
            <option value="2">2x</option>
            <option value="5">5x</option>
            <option value="10" selected>10x</option>
            <option value="20">20x</option>
            <option value="25">25x</option>
            <option value="50">50x</option>
          </select>
        </div>
      </div>
      <div class="tt-grid">
        <button class="tt-btn active" id="tt-swing" onclick="setTT('swing')"><div style="font-size:10px;font-weight:700">Swing</div><div style="font-size:9px;opacity:.7">2-5 divas</div></button>
        <button class="tt-btn" id="tt-intraday" onclick="setTT('intraday')"><div style="font-size:10px;font-weight:700">Intraday</div><div style="font-size:9px;opacity:.7">Aajach</div></button>
        <button class="tt-btn" id="tt-positional" onclick="setTT('positional')"><div style="font-size:10px;font-weight:700">Hold</div><div style="font-size:9px;opacity:.7">Aathvade</div></button>
      </div>
    </div>
    <button class="big-btn" id="analyseBtn" onclick="doAnalyse()" style="background:linear-gradient(135deg,#3b82f6,#8b5cf6)">Vishleshan Kara</button>
    <div id="analysisResult"></div>
  </div>

  <!-- TRACKER PAGE -->
  <div id="page-tracker" class="page">
    <div class="grid3" style="margin-bottom:10px" id="trackerStats"></div>
    <div id="liveRefreshBar" style="display:none;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:8px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:11px;color:#16a34a;font-weight:600">Live prices every 20s</span>
      <button class="btn" style="background:#dcfce7;color:#16a34a;font-size:11px;padding:4px 10px" onclick="refreshTrackerPrices()">Refresh</button>
    </div>
    <div id="tradeList"></div>
    <div style="height:30px"></div>
  </div>
</div>

<script>
// ── STATE ──
var state = {
  marketSeg: "SPOT",
  analyseSeg: "FUTURES",
  selectedCoin: "BTC",
  tradeType: "swing",
  prices: {},
  trades: loadTrades(),
  spotCoins: loadCoins().spot,
  futCoins: loadCoins().fut,
  res: null,
  fetchTimer: null,
  trackerTimer: null
};

var DEF_SPOT=["BTC","ETH","SOL","BNB","XRP","DOGE","ADA","AVAX","LINK","DOT"];
var DEF_FUT=["BTC","ETH","SOL","BNB","XRP","DOGE","ADA","AVAX","LINK","MATIC"];
var USD=83.5;

// ── STORAGE ──
function loadTrades(){try{var s=localStorage.getItem("ts_tr");return s?JSON.parse(s):[];}catch(e){return[];}}
function saveTrades(){try{localStorage.setItem("ts_tr",JSON.stringify(state.trades));}catch(e){}}
function loadCoins(){try{var s=localStorage.getItem("ts_co");if(s){var d=JSON.parse(s);return{spot:d.s||DEF_SPOT,fut:d.f||DEF_FUT};}}catch(e){}return{spot:DEF_SPOT.slice(),fut:DEF_FUT.slice()};}
function saveCoins(){try{localStorage.setItem("ts_co",JSON.stringify({s:state.spotCoins,f:state.futCoins}));}catch(e){}}

// ── FORMAT ──
function fP(p){
  if(!p||isNaN(p)||p<=0)return"--";
  if(p>=1000)return"$"+Math.round(p).toLocaleString("en-US");
  if(p>=1)return"$"+p.toFixed(2);
  if(p>=0.01)return"$"+p.toFixed(4);
  return"$"+p.toFixed(6);
}
function fINR(n){
  if(!n||isNaN(n))return"--";
  var a=Math.abs(n),s=n<0?"-":"";
  if(a>=10000000)return s+"Rs"+(a/10000000).toFixed(2)+"Cr";
  if(a>=100000)return s+"Rs"+(a/100000).toFixed(2)+"L";
  if(a>=1000)return s+"Rs"+Math.round(a).toLocaleString("en-IN");
  return s+"Rs"+a.toFixed(0);
}
function fI(u){return fINR(u*USD);}
function fPct(v){if(v===undefined||isNaN(v))return"--";return(v>=0?"+":"")+v.toFixed(2)+"%";}

// ── API ──
async function getFutPrice(coin){
  try{
    var r=await fetch("https://fapi.binance.com/fapi/v1/ticker/24hr?symbol="+coin+"USDT");
    if(r.ok){var d=await r.json();if(d&&d.lastPrice&&parseFloat(d.lastPrice)>0)return{p:parseFloat(d.lastPrice),c:parseFloat(d.priceChangePercent||0),isFut:true};}
  }catch(e){}
  return null;
}
async function getSpotPrice(coin){
  try{
    var r=await fetch("https://api.coincap.io/v2/assets/"+capId(coin));
    if(r.ok){var d=await r.json();if(d&&d.data&&parseFloat(d.data.priceUsd)>0)return{p:parseFloat(d.data.priceUsd),c:parseFloat(d.data.changePercent24Hr||0),isFut:false};}
  }catch(e){}
  try{
    var r2=await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol="+coin+"USDT");
    if(r2.ok){var d2=await r2.json();if(d2&&d2.lastPrice&&parseFloat(d2.lastPrice)>0)return{p:parseFloat(d2.lastPrice),c:parseFloat(d2.priceChangePercent||0),isFut:false};}
  }catch(e){}
  return null;
}
async function getPrice(coin,isFut){
  if(isFut){var fp=await getFutPrice(coin);if(fp)return fp;}
  return await getSpotPrice(coin);
}

var CAPS={BTC:"bitcoin",ETH:"ethereum",SOL:"solana",BNB:"binance-coin",XRP:"xrp",DOGE:"dogecoin",ADA:"cardano",AVAX:"avalanche",DOT:"polkadot",LINK:"chainlink",MATIC:"polygon"};
function capId(s){return CAPS[s.toUpperCase()]||s.toLowerCase();}

// ── SIGNAL ──
function calcSig(price,chg){
  var rsi=Math.min(83,Math.max(17,Math.round(50+chg*2.5)));
  var ema20=price*(1-chg*0.002);
  var macd=parseFloat((chg*price*0.0001).toFixed(8));
  var v=Math.max(Math.min(Math.abs(chg)/100,0.03),0.012);
  var sr={s1:Math.max(price*(1-v*1.2),price*0.001),s2:Math.max(price*(1-v*2.4),price*0.001),r1:price*(1+v*1.2),r2:price*(1+v*2.4)};
  var sig,conf,trend;
  if(rsi<30){sig="BUY";conf="HIGH";trend="BULLISH";}
  else if(rsi>70){sig="SELL";conf="HIGH";trend="BEARISH";}
  else if(chg>1.5&&price>ema20){sig="BUY";conf="MEDIUM";trend="BULLISH";}
  else if(chg<-1.5&&price<ema20){sig="HOLD";conf="MEDIUM";trend="BEARISH";}
  else{sig="HOLD";conf="LOW";trend="SIDEWAYS";}
  var sl,t1,t2,risk;
  if(sig==="SELL"){sl=sr.r1;risk=sl-price;t1=Math.max(price-risk*2,price*0.001);t2=Math.max(price-risk*3.5,price*0.001);}
  else{sl=sr.s1;risk=price-sl;t1=price+risk*2;t2=price+risk*3.5;}
  return{rsi,ema20,macd,sr,sig,conf,trend,ep:price,sl,t1,t2,risk};
}

// ── PAGE NAV ──
function showPage(page){
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.remove("active");});
  document.getElementById("page-"+page).classList.add("active");
  var tabs=document.querySelectorAll(".tab-btn");
  var pages=["market","analyse","tracker"];
  tabs[pages.indexOf(page)].classList.add("active");
  if(page==="market"){renderCoinList();startMarketFetch();}
  else if(page==="tracker"){renderTracker();startTrackerFetch();}
  else{stopTrackerFetch();renderAnalysePills();}
}

// ── MARKET ──
function setMarketSeg(s){
  state.marketSeg=s;
  document.getElementById("mSeg-SPOT").classList.toggle("active",s==="SPOT");
  document.getElementById("mSeg-FUTURES").classList.toggle("active",s==="FUTURES");
  document.getElementById("mListTitle").textContent=s+" Coins";
  renderCoinList();
  startMarketFetch();
}

function toggleAddCoin(){
  var row=document.getElementById("addCoinRow");
  row.style.display=row.style.display==="none"?"block":"none";
  if(row.style.display==="block")document.getElementById("newCoinInp").focus();
}

function doAddCoin(){
  var c=document.getElementById("newCoinInp").value.trim().toUpperCase();
  if(!c)return;
  var list=state.marketSeg==="SPOT"?state.spotCoins:state.futCoins;
  if(list.includes(c)){alert(c+" already exists!");return;}
  list.push(c);
  saveCoins();
  document.getElementById("newCoinInp").value="";
  document.getElementById("addCoinRow").style.display="none";
  renderCoinList();
  startMarketFetch();
}

function removeCoinFromList(coin){
  if(state.marketSeg==="SPOT"){state.spotCoins=state.spotCoins.filter(function(c){return c!==coin;});}
  else{state.futCoins=state.futCoins.filter(function(c){return c!==coin;});}
  saveCoins();
  renderCoinList();
}

function renderCoinList(){
  var list=state.marketSeg==="SPOT"?state.spotCoins:state.futCoins;
  var html="";
  list.forEach(function(coin,i){
    var pr=state.prices[coin];
    var s=pr?calcSig(pr.p,pr.c):null;
    var sig=s?s.sig:"--";
    var sigColor=sig==="BUY"?"#16a34a":sig==="SELL"?"#dc2626":"#6b7280";
    var sigBg=sig==="BUY"?"#dcfce7":sig==="SELL"?"#fee2e2":"#f3f4f6";
    var chgColor=pr&&pr.c>=0?"#16a34a":"#dc2626";
    var border=i<list.length-1?"border-bottom:1px solid #f9fafb;":"";
    html+='<div style="display:flex;align-items:center;padding:12px 14px;'+border+'cursor:pointer" onclick="selectCoinAndAnalyse(''+coin+'')">';
    html+='<div class="coinico">'+coin.substring(0,3)+'</div>';
    html+='<div style="flex:1"><div style="font-weight:700;font-size:14px">'+coin+'</div><div style="font-size:11px;color:#94a3b8">'+(pr?fI(pr.p):"Loading...")+'</div></div>';
    html+='<div style="text-align:right;margin-right:8px"><div style="font-weight:700;font-size:14px">'+(pr?fP(pr.p):"--")+'</div><div style="font-size:11px;font-weight:600;color:'+chgColor+'">'+(pr?fPct(pr.c):"")+'</div></div>';
    if(s)html+='<div style="background:'+sigBg+';color:'+sigColor+';border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;min-width:38px;text-align:center;margin-right:4px">'+sig+'</div>';
    html+='<button onclick="event.stopPropagation();removeCoinFromList(''+coin+'')" style="background:transparent;border:none;color:#d1d5db;cursor:pointer;font-size:14px;padding:0 2px">x</button>';
    html+='</div>';
  });
  document.getElementById("coinList").innerHTML=html;
  renderPortfolio();
}

function renderPortfolio(){
  var actT=state.trades.filter(function(t){return t.status==="ACTIVE";}).length;
  var hitT=state.trades.filter(function(t){return t.status==="TARGET HIT";}).length;
  var stpT=state.trades.filter(function(t){return t.status==="STOP LOSS";}).length;
  var box=document.getElementById("portfolioBox");
  if(state.trades.length===0){box.style.display="none";return;}
  box.style.display="block";
  document.getElementById("portfolioStats").innerHTML=
    '<div style="background:#eff6ff;border-radius:9px;padding:8px;text-align:center"><div style="font-size:13px;font-weight:800;color:#3b82f6">'+actT+' Active</div></div>'+
    '<div style="background:#f0fdf4;border-radius:9px;padding:8px;text-align:center"><div style="font-size:13px;font-weight:800;color:#16a34a">'+hitT+' Hit</div></div>'+
    '<div style="background:#fef2f2;border-radius:9px;padding:8px;text-align:center"><div style="font-size:13px;font-weight:800;color:#dc2626">'+stpT+' SL</div></div>';
}

async function fetchMarketPrices(){
  var list=state.marketSeg==="SPOT"?state.spotCoins:state.futCoins;
  var isFut=state.marketSeg==="FUTURES";
  var CHUNK=3;
  for(var i=0;i<list.length;i+=CHUNK){
    var chunk=list.slice(i,i+CHUNK);
    await Promise.all(chunk.map(async function(c){
      var pr=await getPrice(c,isFut);
      if(pr&&pr.p>0){state.prices[c]=pr;renderCoinList();}
    }));
  }
}

function startMarketFetch(){
  if(state.fetchTimer)clearInterval(state.fetchTimer);
  fetchMarketPrices();
  state.fetchTimer=setInterval(fetchMarketPrices,30000);
}

function selectCoinAndAnalyse(coin){
  state.selectedCoin=coin;
  var analyseSeg=state.marketSeg;
  setAnalyseSeg(analyseSeg);
  renderAnalysePills();
  showPage("analyse");
}

// ── ANALYSE ──
function setAnalyseSeg(s){
  state.analyseSeg=s;
  document.getElementById("aSeg-SPOT").classList.toggle("active",s==="SPOT");
  document.getElementById("aSeg-FUTURES").classList.toggle("active",s==="FUTURES");
  document.getElementById("levDiv").style.display=s==="FUTURES"?"block":"none";

async function doAnalyse(){
  var cap=parseFloat(document.getElementById("capInput").value)||0;
  if(cap<=0){alert("Capital enter kara!");return;}
  var lev=state.analyseSeg==="FUTURES"?(parseInt(document.getElementById("levSelect").value)||1):1;
  var btn=document.getElementById("analyseBtn");
  btn.textContent="Loading...";btn.disabled=true;
  btn.style.background="#94a3b8";
  document.getElementById("analysisResult").innerHTML="";

  try{
    var isFut=state.analyseSeg==="FUTURES";
    var pr=await getPrice(state.selectedCoin,isFut);
    if(!pr||!pr.p||pr.p<=0)throw new Error(state.selectedCoin+" price mila nahi.");
    state.prices[state.selectedCoin]=pr;

    var s=calcSig(pr.p,pr.c);
    var capUSD=cap/USD;
    var posUSD=capUSD*lev;
    var qty=s.ep>0?(posUSD/s.ep).toFixed(6):"0";
    var maxL=cap*0.02;
    var minP=maxL*2;

    state.res=Object.assign({},s,{price:pr.p,chg:pr.c,isFut:!!pr.isFut,coin:state.selectedCoin,seg:state.analyseSeg,leverage:lev,qty:qty,capitalINR:cap,maxLossINR:maxL,minProfitINR:minP});

    renderResult(state.res);

    // AI (best effort)
    try{
      var tLbl=state.tradeType==="swing"?"Swing":state.tradeType==="intraday"?"Intraday":"Positional";
      var prompt="Reply in Marathi only. 2 sentences. Coin:"+state.selectedCoin+" Price:"+fP(pr.p)+" RSI:"+s.rsi+" Signal:"+s.sig+" "+tLbl+" "+state.analyseSeg+(lev>1?" "+lev+"x":"");
      var ar=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,messages:[{role:"user",content:prompt}]})});
      var ad=await ar.json();
      var txt=ad&&ad.content&&ad.content[0]?ad.content[0].text:"";
      if(txt)document.getElementById("aiText").textContent=txt;
    }catch(e){
      var fallback=s.sig==="BUY"?state.selectedCoin+" kharedi chi sandhi dikte. RSI "+s.rsi+". SL "+fP(s.sl)+". Target "+fP(s.t1)+".":s.sig==="SELL"?state.selectedCoin+" RSI "+s.rsi+". Khali yeu shakto. Target "+fP(s.t1)+".":state.selectedCoin+" sideways. Signal yeiparyant thamba.";
      document.getElementById("aiText").textContent=fallback;
    }
  }catch(err){alert(err.message);}
  btn.textContent=state.selectedCoin+" Vishleshan Kara";btn.disabled=false;
  btn.style.background="linear-gradient(135deg,#3b82f6,#8b5cf6)";
}

function doAddTrade(){
  var r=state.res;
  if(!r||!r.ep||r.ep<=0){alert("Puha Analyse kara.");return;}
  var t={id:Date.now(),coin:r.coin,segment:r.seg,side:r.sig==="BUY"?"BUY":"SELL",entry:r.ep,sl:r.sl,t1:r.t1,t2:r.t2,capital:r.capitalINR,leverage:r.leverage,status:"ACTIVE",currentPrice:r.ep};

// ── TRACKER ──
function updateTrackerTab(){
  var actT=state.trades.filter(function(t){return t.status==="ACTIVE";}).length;
  document.getElementById("trackerTab").textContent="Tracker"+(actT>0?" ("+actT+")":"");
}

function getTradeStatus(trade){
  var cur=state.prices[trade.coin]?state.prices[trade.coin].p:null;
  if(!cur||!trade.entry)return trade.status;
  if(trade.status==="ACTIVE"){
    if(trade.side==="BUY"){if(cur>=trade.t1)return"TARGET HIT";if(cur<=trade.sl)return"STOP LOSS";}
    else{if(cur<=trade.t1)return"TARGET HIT";if(cur>=trade.sl)return"STOP LOSS";}
  }
  return trade.status;
}

function getTradePnL(trade){
  var cur=(state.prices[trade.coin]&&state.prices[trade.coin].p>0)?state.prices[trade.coin].p:(trade.currentPrice||trade.entry);
  var pnlPct=0;
  if(trade.entry>0&&cur>0){
    if(trade.side==="BUY")pnlPct=((cur-trade.entry)/trade.entry)*100*trade.leverage;
    else pnlPct=((trade.entry-cur)/trade.entry)*100*trade.leverage;
  }
  var pnlINR=trade.capital*pnlPct/100;
  return{cur,pnlPct,pnlINR};
}

function renderTracker(){
  var actT=state.trades.filter(function(t){return getTradeStatus(t)==="ACTIVE";}).length;
  var hitT=state.trades.filter(function(t){return getTradeStatus(t)==="TARGET HIT"||t.status==="TARGET HIT";}).length;
  var stpT=state.trades.filter(function(t){return getTradeStatus(t)==="STOP LOSS"||t.status==="STOP LOSS";}).length;

  document.getElementById("trackerStats").innerHTML=
    '<div class="stat-box" style="background:#eff6ff;border:1px solid #3b82f630"><div style="font-size:22px;font-weight:800;color:#3b82f6">'+actT+'</div><div style="font-size:10px;color:#64748b;font-weight:600">Active</div></div>'+
    '<div class="stat-box" style="background:#f0fdf4;border:1px solid #16a34a30"><div style="font-size:22px;font-weight:800;color:#16a34a">'+hitT+'</div><div style="font-size:10px;color:#64748b;font-weight:600">Target Hit</div></div>'+
    '<div class="stat-box" style="background:#fef2f2;border:1px solid #dc262630"><div style="font-size:22px;font-weight:800;color:#dc2626">'+stpT+'</div><div style="font-size:10px;color:#64748b;font-weight:600">Stop Loss</div></div>';

  var lrb=document.getElementById("liveRefreshBar");
  lrb.style.display=actT>0?"flex":"none";

  if(state.trades.length===0){
    document.getElementById("tradeList").innerHTML='<div class="card" style="text-align:center;padding:40px"><div style="font-size:16px;font-weight:700;margin-bottom:8px">Konatyahi Trade nahi</div><button class="btn btn-blue" onclick="showPage('analyse')">Analyse kara</button></div>';
    return;
  }

  var html="";
  var active=state.trades.filter(function(t){return t.status==="ACTIVE";});
  var closed=state.trades.filter(function(t){return t.status!=="ACTIVE";});

  if(active.length)html+='<div style="font-size:12px;font-weight:700;color:#94a3b8;margin-bottom:8px;text-transform:uppercase">ACTIVE TRADES</div>';
  active.forEach(function(t){html+=renderTradeCard(t);});
  if(closed.filter(function(t){return t.status==="TARGET HIT"||t.status==="STOP LOSS";}).length){
    html+='<div style="font-size:12px;font-weight:700;color:#94a3b8;margin-top:12px;margin-bottom:8px;text-transform:uppercase">TARGET HIT / STOP LOSS</div>';
    closed.filter(function(t){return t.status==="TARGET HIT"||t.status==="STOP LOSS";}).forEach(function(t){html+=renderTradeCard(t);});
  }
  if(closed.filter(function(t){return t.status==="CLOSED";}).length){
    html+='<div style="font-size:12px;font-weight:700;color:#94a3b8;margin-top:12px;margin-bottom:8px;text-transform:uppercase">CLOSED TRADES</div>';
    closed.filter(function(t){return t.status==="CLOSED";}).forEach(function(t){html+=renderTradeCard(t);});
  }
  document.getElementById("tradeList").innerHTML=html;
  updateTrackerTab();
}

  var pnlBg=pnl.pnlPct>=0?"#f0fdf4":"#fef2f2";

  var html='<div class="trade-card">';

  html+='<div style="display:flex;align-items:center;gap:6px">';
  html+='<span class="badge" style="background:'+(trade.side==="BUY"?"#dcfce7":"#fee2e2")+';color:'+(trade.side==="BUY"?"#16a34a":"#dc2626")+'">'+trade.side+'</span>';
  html+='<span style="font-weight:800;font-size:15px">'+trade.coin+'</span>';
  if(trade.leverage>1)html+='<span class="badge" style="background:#dbeafe;color:#1d4ed8">'+trade.leverage+'x</span>';
  html+='<span style="font-size:10px;color:#9ca3af">'+trade.segment+'</span>';
  html+='</div>';
  html+='<span class="badge" style="background:'+sbg+';color:'+sc+'">'+sLbl+'</span>';
  html+='</div>';
  html+='<div class="grid3" style="margin-bottom:8px">';
  html+=tc_box("Entry",fP(trade.entry),fI(trade.entry),"#374151");
  html+=tc_box("Stop Loss",fP(trade.sl),fI(trade.sl)+(trade.side==="BUY"?" kh":" v"),"#dc2626");
  html+=tc_box("Target 1",fP(trade.t1),fI(trade.t1)+(trade.side==="BUY"?" v":" kh"),"#16a34a");
  html+='</div>';
  html+='<div class="pnl-row" style="background:'+pnlBg+';margin-bottom:'+(isHit?0:8)+'px">';
  html+='<div><div style="font-size:9px;color:#9ca3af;font-weight:600">'+(livePr?"Live P&L":"P&L")+'</div>';
  html+='<div style="font-size:14px;font-weight:800;color:'+pnlC+'">'+(pnl.pnlPct>=0?"+":"")+pnl.pnlPct.toFixed(2)+"% ("+(pnl.pnlINR>=0?"+":"")+fINR(pnl.pnlINR)+")"+'</div></div>';
  html+='<div style="text-align:right"><div style="font-size:9px;color:#9ca3af;font-weight:600">Current</div><div style="font-size:12px;font-weight:700">'+fP(pnl.cur)+'</div></div>';
  html+='</div>';
  if(!isHit){
    html+='<div style="display:flex;gap:6px;margin-top:0"><input type="number" placeholder="Manual price" id="mp_'+trade.id+'" style="flex:1;border:1px solid #e5e7eb;border-radius:8px;padding:7px 10px;font-size:12px;outline:none">';
    html+='<button class="btn btn-blue" style="font-size:11px;padding:7px 10px" onclick="manualUpdate('+trade.id+')">Update</button>';

function tc_box(label,val,sub,color){
  return '<div style="background:#f9fafb;border-radius:8px;padding:7px;text-align:center"><div style="font-size:9px;color:#9ca3af;font-weight:600;margin-bottom:2px">'+label+'</div><div style="font-size:12px;font-weight:800;color:'+color+'">'+val+'</div><div style="font-size:9px;color:#9ca3af;margin-top:1px">'+sub+'</div></div>';
}

function manualUpdate(id){
  var inp=document.getElementById("mp_"+id);
  var val=parseFloat(inp.value);
  if(!val||val<=0)return;
  state.trades=state.trades.map(function(t){return t.id===id?Object.assign({},t,{currentPrice:val}):t;});
  saveTrades();inp.value="";renderTracker();
}
function closeTrade(id){
  state.trades=state.trades.map(function(t){return t.id===id?Object.assign({},t,{status:"CLOSED"}):t;});
  saveTrades();renderTracker();
}
function removeTrade(id){
  state.trades=state.trades.filter(function(t){return t.id!==id;});
  saveTrades();renderTracker();
}

async function refreshTrackerPrices(){
  var active=state.trades.filter(function(t){return t.status==="ACTIVE";});
  var coins=[...new Set(active.map(function(t){return t.coin;}))];
  for(var i=0;i<coins.length;i++){
    var c=coins[i];
    var isFut=active.some(function(t){return t.coin===c&&t.segment==="FUTURES";});
    var pr=await getPrice(c,isFut);
    if(pr&&pr.p>0)state.prices[c]=pr;
  }
  renderTracker();
}

function startTrackerFetch(){
  if(state.trackerTimer)clearInterval(state.trackerTimer);
  refreshTrackerPrices();
  state.trackerTimer=setInterval(refreshTrackerPrices,20000);
}
function stopTrackerFetch(){
  if(state.trackerTimer){clearInterval(state.trackerTimer);state.trackerTimer=null;}
}

// ── INIT ──
setAnalyseSeg("FUTURES");
renderAnalysePills();
renderCoinList();
startMarketFetch();
updateTrackerTab();
renderTracker();
</script>
