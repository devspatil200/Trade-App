<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Trading Saathi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#fff;font-family:'DM Sans',sans-serif;color:#111;max-width:430px;margin:0 auto;min-height:100vh}
button,input,select{font-family:'DM Sans',sans-serif;border:none;outline:none;cursor:pointer;background:none}

/* HEADER */
.header{padding:14px 16px 10px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:50}
.h-title{font-size:18px;font-weight:800;color:#111}
.h-live{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:#16a34a;font-family:'DM Mono',monospace}
.h-dot{width:7px;height:7px;background:#16a34a;border-radius:50%;animation:blink 1.3s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* TABS */
.tabs{display:flex;border-bottom:1.5px solid #f0f0f0;background:#fff;position:sticky;top:53px;z-index:49}
.tab{flex:1;padding:11px 0;font-size:13px;font-weight:600;color:#999;text-align:center;border-bottom:2.5px solid transparent;transition:.15s}
.tab.on{color:#111;border-bottom-color:#111;font-weight:800}

/* BODY */
.body{padding-bottom:30px}

/* ── RATES ── */
.rates-list{}
.rate-row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid #f7f7f7;cursor:pointer;transition:.1s}
.rate-row:active{background:#fafafa}
.coin-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;margin-right:12px;flex-shrink:0;font-family:'DM Mono',monospace}
.coin-name{font-size:14px;font-weight:700}
.coin-sym{font-size:10px;color:#aaa;font-family:'DM Mono',monospace;margin-top:1px}
.coin-price{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;text-align:right}
.coin-chg{font-size:11px;font-weight:700;font-family:'DM Mono',monospace;text-align:right;margin-top:2px}
.sig-tag{border-radius:5px;padding:3px 8px;font-size:10px;font-weight:800;font-family:'DM Mono',monospace;margin-left:10px;flex-shrink:0}

/* ── CALL ── */
.call-wrap{padding:16px}
.coins-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.coins-row::-webkit-scrollbar{display:none}
.cpill{flex-shrink:0;border:1.5px solid #e8e8e8;border-radius:20px;padding:5px 13px;font-size:11px;font-weight:700;color:#888;transition:.15s;font-family:'DM Mono',monospace}
.cpill.on{border-color:#111;color:#111;background:#f5f5f5}

.fields-row{display:flex;gap:10px;margin-bottom:12px}
.field{}
.flabel{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.8px;margin-bottom:4px;font-family:'DM Mono',monospace}
.finput{width:100%;border:1.5px solid #e8e8e8;border-radius:9px;padding:9px 11px;font-size:13px;font-weight:700;color:#111;font-family:'DM Mono',monospace;transition:.15s}
.finput:focus{border-color:#111}
.fselect{width:100%;border:1.5px solid #e8e8e8;border-radius:9px;padding:9px 11px;font-size:13px;font-weight:700;color:#111;font-family:'DM Mono',monospace;appearance:none}

.call-btn{width:100%;background:#111;border-radius:11px;padding:14px;color:#fff;font-size:14px;font-weight:800;letter-spacing:.3px;transition:.1s;margin-bottom:16px}
.call-btn:disabled{background:#ddd;color:#aaa;cursor:not-allowed}
.call-btn:active:not(:disabled){transform:scale(.98)}

/* RESULT */
.result{}

/* signal hero */
.sig-hero{border-radius:14px;padding:18px;margin-bottom:12px;border:2px solid}
.sig-hero.long{background:#f0fdf6;border-color:#16a34a}
.sig-hero.short{background:#fff5f5;border-color:#e53e3e}
.sig-hero.wait{background:#fffdf0;border-color:#d97706}
.sh-top{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.sh-emoji{font-size:40px}
.sh-action{font-size:26px;font-weight:800}
.sh-conf{font-size:10px;color:#888;font-family:'DM Mono',monospace;margin-top:3px}
.sh-bars{display:flex;gap:3px;margin-top:5px}
.sh-bar{width:18px;height:5px;border-radius:3px;background:#e5e5e5}
.ai-box{background:rgba(0,0,0,.04);border-radius:9px;padding:11px 12px;font-size:13px;line-height:1.85;color:#333}

/* price row */
.pr-row{display:flex;justify-content:space-between;background:#f7f7f7;border-radius:10px;padding:11px 14px;margin-bottom:10px;align-items:center}
.pr-left{font-size:13px;font-weight:600;color:#555}
.pr-right{font-size:14px;font-weight:800;font-family:'DM Mono',monospace}

/* levels grid */
.lvl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.lvl-box{background:#f7f7f7;border-radius:10px;padding:12px;text-align:center}
.lvl-label{font-size:9px;font-weight:700;color:#aaa;letter-spacing:.7px;margin-bottom:4px;font-family:'DM Mono',monospace}
.lvl-usd{font-size:15px;font-weight:800;font-family:'DM Mono',monospace}
.lvl-inr{font-size:9px;color:#aaa;margin-top:2px;font-family:'DM Mono',monospace}

/* risk */
.risk-box{background:#f7f7f7;border-radius:10px;padding:12px 14px;margin-bottom:12px}
.rr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #efefef}
.rr:last-child{border:none}
.rr-l{font-size:11px;color:#888;font-family:'DM Mono',monospace}
.rr-v{font-size:12px;font-weight:700;font-family:'DM Mono',monospace}

.add-btn{width:100%;background:#16a34a;border-radius:11px;padding:13px;color:#fff;font-size:14px;font-weight:800;margin-bottom:8px}
.warn{font-size:10px;color:#aaa;text-align:center;line-height:1.7;margin-bottom:6px;font-family:'DM Mono',monospace}

/* ── TRACKER ── */
.tracker-wrap{padding:14px 16px}
.tr-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.tr-stat{background:#f7f7f7;border-radius:10px;padding:12px;text-align:center}
.tr-stat-num{font-size:22px;font-weight:800;font-family:'DM Mono',monospace}
.tr-stat-lbl{font-size:9px;color:#aaa;letter-spacing:.5px;margin-top:1px}
.pnl-row{background:#f7f7f7;border-radius:10px;padding:11px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.pnl-lbl{font-size:13px;font-weight:700}
.pnl-val{font-size:16px;font-weight:800;font-family:'DM Mono',monospace}

.tc{background:#fff;border:1.5px solid #efefef;border-radius:13px;padding:13px;margin-bottom:10px}
.tc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.tc-side{border-radius:5px;padding:3px 9px;font-size:11px;font-weight:800;font-family:'DM Mono',monospace}
.tc-side.l{background:#dcfce7;color:#16a34a}
.tc-side.s{background:#fee2e2;color:#e53e3e}
.tc-coin-nm{font-weight:800;font-size:15px;margin:0 6px}
.tc-lev{background:#f0f0f0;color:#555;border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace}
.tc-status{border-radius:5px;padding:3px 8px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace}
.tc-lvls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:8px}
.tcl{background:#f7f7f7;border-radius:7px;padding:7px;text-align:center}
.tcl-lbl{font-size:8px;color:#aaa;font-weight:700;letter-spacing:.3px;margin-bottom:2px;font-family:'DM Mono',monospace}
.tcl-val{font-size:11px;font-weight:800;font-family:'DM Mono',monospace}
.tc-pnl{display:flex;justify-content:space-between;align-items:center;border-radius:8px;padding:8px 11px;margin-bottom:7px}
.tc-actions{display:flex;gap:5px}
.tc-inp{flex:1;background:#f7f7f7;border:1px solid #e8e8e8;border-radius:7px;padding:7px 9px;font-size:12px;color:#111;font-family:'DM Mono',monospace}
.tc-upd{background:#111;border-radius:7px;padding:7px 10px;font-size:11px;font-weight:700;color:#fff}
.tc-cls{background:#f0f0f0;border-radius:7px;padding:7px 10px;font-size:11px;font-weight:700;color:#666}

.empty{padding:50px 20px;text-align:center}
.empty-ic{font-size:42px;margin-bottom:12px}
.empty-t{font-size:15px;font-weight:800;margin-bottom:6px}
.empty-s{font-size:12px;color:#aaa;font-family:'DM Mono',monospace}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useCallback,useRef} = React;

const COINS = ["BTC","ETH","SOL","BNB","XRP","DOGE","ADA","AVAX","LINK","MATIC"];
const IDS = {BTC:"bitcoin",ETH:"ethereum",SOL:"solana",BNB:"binance-coin",XRP:"xrp",DOGE:"dogecoin",ADA:"cardano",AVAX:"avalanche-2",LINK:"chainlink",MATIC:"matic-network"};
const NAMES = {BTC:"Bitcoin",ETH:"Ethereum",SOL:"Solana",BNB:"Binance Coin",XRP:"XRP",DOGE:"Dogecoin",ADA:"Cardano",AVAX:"Avalanche",LINK:"Chainlink",MATIC:"Polygon"};
const CLRS = {BTC:"#f7931a",ETH:"#627eea",SOL:"#9945ff",BNB:"#f3ba2f",XRP:"#00aae4",DOGE:"#c2a633",ADA:"#0033ad",AVAX:"#e84142",LINK:"#2a5ada",MATIC:"#8247e5"};

const fP=p=>{if(!p)return"--";return p>=1000?"$"+Math.round(p).toLocaleString():p>=1?"$"+p.toFixed(2):"$"+p.toFixed(5)};
const fI=u=>{if(u==null)return"--";const n=u*84;return n>=1e7?"₹"+(n/1e7).toFixed(2)+"Cr":n>=1e5?"₹"+(n/1e5).toFixed(2)+"L":n>=1000?"₹"+Math.round(n).toLocaleString("en-IN"):"₹"+n.toFixed(2)};
const fINR=n=>{const a=Math.abs(n);return a>=1e7?"₹"+(a/1e7).toFixed(2)+"Cr":a>=1e5?"₹"+(a/1e5).toFixed(2)+"L":a>=1000?"₹"+Math.round(a).toLocaleString("en-IN"):"₹"+a.toFixed(0)};
const fPct=v=>v==null?"--":(v>=0?"+":"")+Number(v).toFixed(2)+"%";

async function fetchPrice(coin){
  const id=IDS[coin]||coin.toLowerCase();
  try{const r=await fetch("https://api.coincap.io/v2/assets/"+id,{signal:AbortSignal.timeout(3500)});if(r.ok){const d=await r.json();if(d?.data?.priceUsd)return{p:parseFloat(d.data.priceUsd),c:parseFloat(d.data.changePercent24Hr||0)};}}catch(e){}
  try{const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${id}&vs_currencies=usd&include_24hr_change=true`,{signal:AbortSignal.timeout(4500)});if(r.ok){const d=await r.json();if(d?.[id]?.usd)return{p:d[id].usd,c:d[id].usd_24h_change||0};}}catch(e){}
  return null;
}

function signal(price,chg){
  const rsi=Math.min(85,Math.max(15,Math.round(50+chg*3.8)));
  const ema20=price*(1-chg*0.003);
  const v=Math.max(Math.abs(chg)/100,0.012);
  const sr={s1:price*(1-v*1.2),s2:price*(1-v*2.5),r1:price*(1+v*1.2),r2:price*(1+v*2.5)};
  let action,conf,pct;
  if(rsi<28){action="LONG";conf="HIGH";pct=82+Math.floor(Math.random()*10);}
  else if(rsi>72){action="SHORT";conf="HIGH";pct=78+Math.floor(Math.random()*10);}
  else if(chg>2&&price>ema20){action="LONG";conf="MEDIUM";pct=60+Math.floor(Math.random()*12);}
  else if(chg<-2&&price<ema20){action="SHORT";conf="MEDIUM";pct=58+Math.floor(Math.random()*12);}
  else if(chg>0.8){action="LONG";conf="LOW";pct=45+Math.floor(Math.random()*12);}
  else if(chg<-0.8){action="SHORT";conf="LOW";pct=43+Math.floor(Math.random()*12);}
  else{action="WAIT";conf="LOW";pct=30+Math.floor(Math.random()*15);}
  const ep=price,sl=action==="LONG"?sr.s1:action==="SHORT"?sr.r1:sr.s1;
  const risk=Math.abs(ep-sl);
  const t1=action==="LONG"?ep+risk*2:action==="SHORT"?ep-risk*2:ep+risk*2;
  const t2=action==="LONG"?ep+risk*3.5:action==="SHORT"?ep-risk*3.5:ep+risk*3.5;
  return{rsi,ema20,macd:chg*price*0.0001,sr,action,conf,pct,ep,sl,t1,t2,risk,price};
}

function TradeCard({trade,onUpdate,prices}){
  const[mp,setMp]=useState("");
  const cur=prices?.[trade.coin]?.p||trade.currentPrice||trade.entry;
  const pnl=trade.side==="LONG"?(cur-trade.entry)/trade.entry*100*trade.leverage:(trade.entry-cur)/trade.entry*100*trade.leverage;
  const pnlINR=trade.capital*pnl/100;
  let st=trade.status;
  if(st==="ACTIVE"){
    if(trade.side==="LONG"){if(cur>=trade.t1)st="TARGET HIT";else if(cur<=trade.sl)st="STOP LOSS";}
    else{if(cur<=trade.t1)st="TARGET HIT";else if(cur>=trade.sl)st="STOP LOSS";}
  }
  const isHit=st==="TARGET HIT"||st==="STOP LOSS";
  const stC=st==="TARGET HIT"?"#16a34a":st==="STOP LOSS"?"#e53e3e":"#3b6ef8";
  const stBg=st==="TARGET HIT"?"#dcfce7":st==="STOP LOSS"?"#fee2e2":"#eff3ff";
  const stLbl=st==="TARGET HIT"?"🎯 TARGET HIT":st==="STOP LOSS"?"🛑 STOP LOSS":"● ACTIVE";
  return(
    <div className="tc">
      <div className="tc-head">
        <div style={{display:"flex",alignItems:"center"}}>
          <span className={`tc-side ${trade.side==="LONG"?"l":"s"}`}>{trade.side}</span>
          <span className="tc-coin-nm">{trade.coin}</span>
          <span className="tc-lev">{trade.leverage}x</span>
        </div>
        <span className="tc-status" style={{color:stC,background:stBg}}>{stLbl}</span>
      </div>
      <div className="tc-lvls">
        {[["ENTRY",trade.entry,"#3b6ef8"],["STOP LOSS",trade.sl,"#e53e3e"],["TARGET",trade.t1,"#16a34a"]].map(([l,v,c])=>(
          <div className="tcl" key={l}><div className="tcl-lbl">{l}</div><div className="tcl-val" style={{color:c}}>{fP(v)}</div></div>
        ))}
      </div>
      <div className="tc-pnl" style={{background:pnl>=0?"#f0fdf6":"#fff5f5",border:`1px solid ${pnl>=0?"#bbf7d0":"#fecaca"}`}}>
        <div>
          <div style={{fontSize:9,color:"#aaa",fontFamily:"'DM Mono',monospace",marginBottom:2}}>P&L {prices?.[trade.coin]?"(LIVE)":""}</div>
          <div style={{fontSize:15,fontWeight:800,color:pnl>=0?"#16a34a":"#e53e3e",fontFamily:"'DM Mono',monospace"}}>{pnl>=0?"+":""}{pnl.toFixed(2)}%&nbsp;({pnlINR>=0?"+":""}{fINR(pnlINR)})</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:9,color:"#aaa",fontFamily:"'DM Mono',monospace",marginBottom:2}}>NOW</div>
          <div style={{fontSize:13,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{fP(cur)}</div>
        </div>
      </div>
      {!isHit&&trade.status==="ACTIVE"&&(
        <div className="tc-actions">
          <input className="tc-inp" type="number" placeholder="Manual price" value={mp} onChange={e=>setMp(e.target.value)}/>
          <button className="tc-upd" onClick={()=>{if(mp){onUpdate(trade.id,{currentPrice:parseFloat(mp)});setMp("");}}}>Update</button>
          <button className="tc-cls" onClick={()=>onUpdate(trade.id,{status:"CLOSED"})}>Close</button>
        </div>
      )}
    </div>
  );
}

function App(){
  const[tab,setTab]=useState("rates");
  const[prices,setPrices]=useState({});
  const[coin,setCoin]=useState("BTC");
  const[lev,setLev]=useState(10);
  const[cap,setCap]=useState(50000);
  const[loading,setLoading]=useState(false);
  const[res,setRes]=useState(null);
  const[aiTxt,setAiTxt]=useState("");
  const[aiLoad,setAiLoad]=useState(false);
  const[trades,setTrades]=useState([]);
  const[ts,setTs]=useState(null);

  const load=useCallback(async(silent=false)=>{
    const results=await Promise.allSettled(COINS.map(c=>fetchPrice(c).then(pr=>({c,pr}))));
    const u={};results.forEach(r=>{if(r.status==="fulfilled"&&r.value.pr)u[r.value.c]=r.value.pr;});
    if(Object.keys(u).length){setPrices(p=>({...p,...u}));setTs(new Date());}
  },[]);

  useEffect(()=>{load();const t=setInterval(()=>load(true),5000);return()=>clearInterval(t);},[load]);

  async function getCall(){
    setLoading(true);setRes(null);setAiTxt("");
    try{
      let pr=prices[coin];if(!pr){pr=await fetchPrice(coin);if(pr)setPrices(p=>({...p,[coin]:pr}));}
      if(!pr)throw new Error(coin+" price मिळाला नाही");
      const s=signal(pr.p,pr.c);
      const maxLoss=cap*0.02;
      const qty=(maxLoss/(s.risk*84)).toFixed(4);
      setRes({...s,chg:pr.c,leverage:lev,qty,maxLoss});
      setLoading(false);setAiLoad(true);
      try{
        const prompt=`Expert crypto futures trader आहात. Marathi मध्ये 3-4 sentences:\nCoin: ${coin}/USDT | Price: ${fP(pr.p)} | 24h: ${pr.c.toFixed(2)}% | RSI: ${s.rsi} | Signal: ${s.action} | Lev: ${lev}x\nEntry ${fP(s.ep)}, SL ${fP(s.sl)}, T1 ${fP(s.t1)} clearly सांगा. एक risk warning द्या.`;
        const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:350,messages:[{role:"user",content:prompt}]})});
        const d=await r.json();setAiTxt(d?.content?.[0]?.text||fb(s,coin));
      }catch(e){setAiTxt(fb(s,coin));}
      setAiLoad(false);
    }catch(e){alert(e.message);setLoading(false);}
  }

  const fb=(s,c)=>s.action==="LONG"?`${c} Long ची संधी. Entry ${fP(s.ep)}, SL ${fP(s.sl)}, T1 ${fP(s.t1)}.`:s.action==="SHORT"?`${c} Short signal. Entry ${fP(s.ep)}, SL ${fP(s.sl)}, T1 ${fP(s.t1)}.`:`${c} sideways — signal येईपर्यंत थांबा.`;

  function addTrade(){
    if(!res)return;
    setTrades(p=>[{id:Date.now(),coin,side:res.action==="SHORT"?"SHORT":"LONG",entry:res.ep,sl:res.sl,t1:res.t1,t2:res.t2,capital:cap,leverage:lev,status:"ACTIVE",currentPrice:res.ep},...p]);
    setTab("tracker");
  }
  function upd(id,u){setTrades(p=>p.map(t=>t.id===id?{...t,...u}:t));}

  const actT=trades.filter(t=>t.status==="ACTIVE").length;
  const hitT=trades.filter(t=>t.status==="TARGET HIT").length;
  const stpT=trades.filter(t=>t.status==="STOP LOSS").length;
  const closed=trades.filter(t=>t.status!=="ACTIVE");
  const totPnL=closed.reduce((s,t)=>{const p=t.side==="LONG"?(t.currentPrice-t.entry)/t.entry*100*t.leverage:(t.entry-t.currentPrice)/t.entry*100*t.leverage;return s+t.capital*p/100;},0);

  const sc=res?(res.action==="LONG"?"#16a34a":res.action==="SHORT"?"#e53e3e":"#d97706"):"#d97706";
  const scls=res?(res.action==="LONG"?"long":res.action==="SHORT"?"short":"wait"):"wait";
  const bars=res?Math.ceil((res.pct||40)/25):0;
  const bcol=res?(res.action==="LONG"?"#16a34a":res.action==="SHORT"?"#e53e3e":"#d97706"):"#e5e5e5";

  return(
    <div>
      {/* HEADER */}
      <div className="header">
        <div className="h-title">Trading Saathi</div>
        <div className="h-live">
          <span className="h-dot"/>
          LIVE {ts?ts.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):""}
        </div>
      </div>

      {/* TABS */}
      <div className="tabs">
        <button className={`tab ${tab==="rates"?"on":""}`} onClick={()=>setTab("rates")}>📊 Rates</button>
        <button className={`tab ${tab==="call"?"on":""}`} onClick={()=>setTab("call")}>⚡ Call</button>
        <button className={`tab ${tab==="tracker"?"on":""}`} onClick={()=>setTab("tracker")}>📋 Tracker{actT>0?` (${actT})`:""}</button>
      </div>

      <div className="body">

      {/* ── RATES ── */}
      {tab==="rates"&&<div className="rates-list">
        {COINS.map(c=>{
          const pr=prices[c];
          const s=pr?signal(pr.p,pr.c):null;
          const sc2=s?(s.action==="LONG"?"#16a34a":s.action==="SHORT"?"#e53e3e":"#888"):"#ccc";
          const sbg2=s?(s.action==="LONG"?"#dcfce7":s.action==="SHORT"?"#fee2e2":"#f5f5f5"):"#f5f5f5";
          return(
            <div className="rate-row" key={c} onClick={()=>{setCoin(c);setTab("call");}}>
              <div className="coin-dot" style={{background:CLRS[c]+"18",color:CLRS[c]}}>{c.slice(0,2)}</div>
              <div style={{flex:1}}>
                <div className="coin-name">{NAMES[c]}</div>
                <div className="coin-sym">{c}/USDT</div>
              </div>
              <div style={{textAlign:"right",marginRight:4}}>
                <div className="coin-price">{pr?fP(pr.p):"..."}</div>
                <div className="coin-chg" style={{color:pr&&pr.c>=0?"#16a34a":"#e53e3e"}}>{pr?fPct(pr.c):"--"}</div>
              </div>
              <span className="sig-tag" style={{background:sbg2,color:sc2}}>{s?s.action:"--"}</span>
            </div>
          );
        })}
        <div style={{padding:"10px 16px",fontSize:10,color:"#bbb",textAlign:"center",fontFamily:"'DM Mono',monospace"}}>Tap any coin → Call मिळवा</div>
      </div>}

      {/* ── CALL ── */}
      {tab==="call"&&<div className="call-wrap">
        {/* Coin pills */}
        <div className="coins-row">
          {COINS.map(c=>{
            const pr=prices[c];
            return <button key={c} className={`cpill ${coin===c?"on":""}`} onClick={()=>setCoin(c)}>{c}{pr?" "+fP(pr.p):""}</button>;
          })}
        </div>

        {/* Fields */}
        <div className="fields-row">
          <div className="field" style={{flex:1}}>
            <div className="flabel">CAPITAL (₹)</div>
            <input className="finput" type="number" value={cap} onChange={e=>setCap(parseFloat(e.target.value)||50000)}/>
          </div>
          <div className="field" style={{flex:1}}>
            <div className="flabel">LEVERAGE</div>
            <select className="fselect" value={lev} onChange={e=>setLev(parseInt(e.target.value))}>
              {[2,5,10,20,25,50].map(l=><option key={l} value={l}>{l}x</option>)}
            </select>
          </div>
        </div>

        <button className="call-btn" onClick={getCall} disabled={loading}>
          {loading?"⏳ येत आहे...":"⚡ "+coin+" Call मिळवा"}
        </button>

        {res&&<div className="result">
          {/* Signal hero */}
          <div className={`sig-hero ${scls}`}>
            <div className="sh-top">
              <div className="sh-emoji">{res.action==="LONG"?"🟢":res.action==="SHORT"?"🔴":"🟡"}</div>
              <div>
                <div className="sh-action" style={{color:sc}}>{res.action==="LONG"?"LONG करा":res.action==="SHORT"?"SHORT करा":"थांबा"}</div>
                <div className="sh-conf">{res.conf} · {res.pct}% CONFIDENCE</div>
                <div className="sh-bars">{[1,2,3,4].map(i=><div key={i} className="sh-bar" style={{background:i<=bars?bcol:"#e5e5e5"}}/>)}</div>
              </div>
            </div>
            <div className="ai-box">{aiLoad?"⏳ AI analysis होत आहे...":aiTxt}</div>
          </div>

          {/* Current price */}
          <div className="pr-row">
            <span className="pr-left">{coin}/USDT · {lev}x · {fPct(res.chg)} 24h</span>
            <span className="pr-right">{fP(res.price)}</span>
          </div>

          {/* Levels */}
          <div className="lvl-grid">
            {[["ENTRY",res.ep,"#3b6ef8"],["STOP LOSS 🛡",res.sl,"#e53e3e"],["TARGET 1 🎯",res.t1,"#16a34a"],["TARGET 2 🚀",res.t2,"#7c3aed"]].map(([l,v,c])=>(
              <div className="lvl-box" key={l}>
                <div className="lvl-label">{l}</div>
                <div className="lvl-usd" style={{color:c}}>{fP(v)}</div>
                <div className="lvl-inr">{fI(v)}</div>
              </div>
            ))}
          </div>

          {/* Risk */}
          <div className="risk-box">
            {[["Capital",fINR(cap),"#111"],["Max Risk (2%)",fINR(res.maxLoss),"#e53e3e"],["Min Profit (T1)","+ "+fINR(res.maxLoss*2),"#16a34a"],["Max Profit (T2)","+ "+fINR(res.maxLoss*3.5),"#7c3aed"],["Quantity",res.qty+" units","#555"]].map(([l,v,c])=>(
              <div className="rr" key={l}><span className="rr-l">{l}</span><span className="rr-v" style={{color:c}}>{v}</span></div>
            ))}
          </div>

          <button className="add-btn" onClick={addTrade}>➕ Tracker मध्ये Add करा</button>
          <div className="warn">⚠️ हे tool फक्त मार्गदर्शनासाठी. Trading मध्ये risk असतो.</div>
        </div>}
      </div>}

      {/* ── TRACKER ── */}
      {tab==="tracker"&&<div className="tracker-wrap">
        <div className="tr-stats">
          <div className="tr-stat"><div className="tr-stat-num" style={{color:"#3b6ef8"}}>{actT}</div><div className="tr-stat-lbl">ACTIVE</div></div>
          <div className="tr-stat"><div className="tr-stat-num" style={{color:"#16a34a"}}>{hitT}</div><div className="tr-stat-lbl">TARGET HIT</div></div>
          <div className="tr-stat"><div className="tr-stat-num" style={{color:"#e53e3e"}}>{stpT}</div><div className="tr-stat-lbl">STOP LOSS</div></div>
        </div>
        {closed.length>0&&(
          <div className="pnl-row">
            <span className="pnl-lbl">Total P&L</span>
            <span className="pnl-val" style={{color:totPnL>=0?"#16a34a":"#e53e3e"}}>{totPnL>=0?"+":""}{fINR(totPnL)}</span>
          </div>
        )}
        {trades.length===0?(
          <div className="empty">
            <div className="empty-ic">📋</div>
            <div className="empty-t">Trade नाही अजून</div>
            <div className="empty-s">Call tab मधून trade add करा</div>
          </div>
        ):<>
          {actT>0&&<div style={{fontSize:11,fontWeight:700,color:"#aaa",letterSpacing:.5,marginBottom:8,fontFamily:"'DM Mono',monospace"}}>ACTIVE</div>}
          {trades.filter(t=>t.status==="ACTIVE").map(t=><TradeCard key={t.id} trade={t} onUpdate={upd} prices={prices}/>)}
          {closed.length>0&&<div style={{fontSize:11,fontWeight:700,color:"#aaa",letterSpacing:.5,margin:"10px 0 8px",fontFamily:"'DM Mono',monospace"}}>CLOSED</div>}
          {closed.map(t=><TradeCard key={t.id} trade={t} onUpdate={upd} prices={prices}/>)}
        </>}
      </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
